# Codex CLI configuration for Simple Language project
# AGENTS.md is read natively — no fallback needed
# Add CLAUDE.md as fallback for shared project knowledge
project_doc_fallback_filenames = ["CLAUDE.md"]

# MCP Servers

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]
enabled = true

[mcp_servers.simple-mcp]
command = "bin/simple_mcp_server"
args = []
enabled = true

[mcp_servers.simple-mcp.env]
SIMPLE_LOG = "error"
RUST_LOG = "error"

[mcp_servers.simple-lsp-mcp]
command = "bin/simple_lsp_mcp_server"
args = []
enabled = true

[mcp_servers.simple-lsp-mcp.env]
SIMPLE_LOG = "error"
RUST_LOG = "error"

[mcp_servers.t32-mcp]
command = "bin/t32_mcp_server"
args = []
enabled = true

[mcp_servers.t32-mcp.env]
SIMPLE_LOG = "error"
RUST_LOG = "error"

[mcp_servers.t32-lsp-mcp]
command = "bin/t32_lsp_mcp_server"
args = []
enabled = true

[mcp_servers.t32-lsp-mcp.env]
SIMPLE_LOG = "error"
RUST_LOG = "error"
