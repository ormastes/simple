# Codex CLI configuration for Simple Language project
# AGENTS.md is read natively — no fallback needed
# Add CLAUDE.md as fallback for shared project knowledge
project_doc_fallback_filenames = ["CLAUDE.md"]

# MCP Servers

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp"]
enabled = true

[mcp_servers.chrome-devtools]
command = "node"
args = ["bin/codex_chrome_devtools_mcp.js"]
enabled = true
startup_timeout_ms = 20000

[mcp_servers.stitch-mcp]
command = "node"
args = ["bin/codex_stitch_mcp.js"]
enabled = true
startup_timeout_ms = 20000

# Simple/T32 MCP servers use absolute paths in ~/.codex/config.toml.
# Project-level relative paths break: Codex resolves commands from its own CWD,
# not from the cwd config field. Do not duplicate them here.
