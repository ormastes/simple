<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="flexbox">
<meta name="test-feature" content="flex-grow">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<!-- Equal grow -->
<div style="display: flex; width: 600px; height: 60px; background: #E8EAF6; margin: 20px;">
  <div style="flex-grow: 1; height: 60px; background: #F44336;"></div>
  <div style="flex-grow: 1; height: 60px; background: #4CAF50;"></div>
  <div style="flex-grow: 1; height: 60px; background: #2196F3;"></div>
</div>
<!-- Proportional grow: 1:2:3 -->
<div style="display: flex; width: 600px; height: 60px; background: #E8EAF6; margin: 20px;">
  <div style="flex-grow: 1; height: 60px; background: #F44336;"></div>
  <div style="flex-grow: 2; height: 60px; background: #4CAF50;"></div>
  <div style="flex-grow: 3; height: 60px; background: #2196F3;"></div>
</div>
<!-- One grows, others fixed -->
<div style="display: flex; width: 600px; height: 60px; background: #E8EAF6; margin: 20px;">
  <div style="width: 100px; height: 60px; background: #F44336;"></div>
  <div style="flex-grow: 1; height: 60px; background: #4CAF50;"></div>
  <div style="width: 100px; height: 60px; background: #2196F3;"></div>
</div>
</body>
</html>
