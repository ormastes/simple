<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="flexbox">
<meta name="test-feature" content="flex-shrink">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<!-- All items wider than container, default shrink distributes equally -->
<div style="display: flex; width: 400px; height: 60px; background: #E8EAF6; margin: 20px;">
  <div style="width: 200px; flex-shrink: 1; height: 60px; background: #F44336;"></div>
  <div style="width: 200px; flex-shrink: 1; height: 60px; background: #4CAF50;"></div>
  <div style="width: 200px; flex-shrink: 1; height: 60px; background: #2196F3;"></div>
</div>
<!-- One item refuses to shrink -->
<div style="display: flex; width: 400px; height: 60px; background: #E8EAF6; margin: 20px;">
  <div style="width: 200px; flex-shrink: 0; height: 60px; background: #F44336;"></div>
  <div style="width: 200px; flex-shrink: 1; height: 60px; background: #4CAF50;"></div>
  <div style="width: 200px; flex-shrink: 1; height: 60px; background: #2196F3;"></div>
</div>
</body>
</html>
