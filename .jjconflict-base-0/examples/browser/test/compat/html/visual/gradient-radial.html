<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="visual">
<meta name="test-feature" content="gradient-radial">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="display: flex; flex-wrap: wrap; gap: 15px; padding: 20px;">
  <div style="width: 150px; height: 150px; background: radial-gradient(circle, #F44336, #2196F3);"></div>
  <div style="width: 150px; height: 150px; background: radial-gradient(circle, #fff, #000);"></div>
  <div style="width: 150px; height: 150px; background: radial-gradient(circle at top left, #FFEB3B, #4CAF50);"></div>
  <div style="width: 150px; height: 150px; background: radial-gradient(ellipse, #FF9800, #9C27B0);"></div>
  <div style="width: 150px; height: 150px; background: radial-gradient(circle, red, orange, yellow, green, blue);"></div>
</div>
</body>
</html>
