<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="box-model">
<meta name="test-feature" content="margin-collapse">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<!-- Adjacent siblings: 30px bottom + 20px top should collapse to 30px -->
<div style="margin-bottom: 30px; width: 300px; height: 60px; background: #F44336;"></div>
<div style="margin-top: 20px; width: 300px; height: 60px; background: #4CAF50;"></div>
<!-- Another pair: 40px bottom + 40px top should collapse to 40px -->
<div style="margin-bottom: 40px; width: 300px; height: 60px; background: #2196F3;"></div>
<div style="margin-top: 40px; width: 300px; height: 60px; background: #FF9800;"></div>
</body>
</html>
