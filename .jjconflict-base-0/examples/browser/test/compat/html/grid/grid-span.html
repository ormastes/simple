<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="grid">
<meta name="test-feature" content="grid-span">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="display: grid; grid-template-columns: 100px 100px 100px; grid-template-rows: 60px 60px 60px; gap: 5px; padding: 20px; background: #E8EAF6; width: 360px; margin: 20px;">
  <!-- Spans 2 columns -->
  <div style="grid-column: span 2; background: #F44336;"></div>
  <div style="background: #4CAF50;"></div>
  <!-- Spans 2 rows -->
  <div style="grid-row: span 2; background: #2196F3;"></div>
  <div style="background: #FF9800;"></div>
  <div style="background: #9C27B0;"></div>
  <div style="background: #009688;"></div>
</div>
</body>
</html>
