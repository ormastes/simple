<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="typography">
<meta name="test-feature" content="line-height">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white; font-family: sans-serif; font-size: 16px; color: #333;">
<div style="display: flex; gap: 20px; padding: 20px;">
  <div style="width: 200px; line-height: 1.0; background: #FFCDD2; padding: 10px;">
    Line height 1.0. This text shows tight spacing between lines of text that wrap.
  </div>
  <div style="width: 200px; line-height: 1.5; background: #C8E6C9; padding: 10px;">
    Line height 1.5. This text shows normal spacing between lines of text that wrap.
  </div>
  <div style="width: 200px; line-height: 2.0; background: #BBDEFB; padding: 10px;">
    Line height 2.0. This text shows double spacing between lines of text that wrap.
  </div>
</div>
</body>
</html>
