<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="transform">
<meta name="test-feature" content="transform-origin">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="display: flex; gap: 50px; padding: 50px; flex-wrap: wrap;">
  <!-- Default origin (center) -->
  <div style="width: 80px; height: 80px; background: #F44336; transform: rotate(45deg); transform-origin: center;"></div>
  <!-- Top-left origin -->
  <div style="width: 80px; height: 80px; background: #4CAF50; transform: rotate(45deg); transform-origin: top left;"></div>
  <!-- Bottom-right origin -->
  <div style="width: 80px; height: 80px; background: #2196F3; transform: rotate(45deg); transform-origin: bottom right;"></div>
  <!-- Pixel offset -->
  <div style="width: 80px; height: 80px; background: #FF9800; transform: rotate(45deg); transform-origin: 20px 20px;"></div>
  <!-- Scale from top-left -->
  <div style="width: 80px; height: 80px; background: #9C27B0; transform: scale(1.5); transform-origin: top left;"></div>
</div>
</body>
</html>
