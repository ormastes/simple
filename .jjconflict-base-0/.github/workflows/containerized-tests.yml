name: Containerized Tests

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'src/**'
      - 'test/**'
      - 'tools/docker/**'
      - '.github/workflows/containerized-tests.yml'
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - 'src/**'
      - 'test/**'
      - 'tools/docker/**'
  schedule:
    # Run daily at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # Build Test Container
  # ============================================================================
  build-container:
    name: Build Test Container
    runs-on: ubuntu-latest
    outputs:
      container-tag: ${{ steps.build.outputs.tag }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build test container
      id: build
      run: |
        # Build with cache
        docker buildx build \
          --cache-from type=gha \
          --cache-to type=gha,mode=max \
          --load \
          -t simple-test-isolation:${{ github.sha }} \
          -t simple-test-isolation:latest \
          -f tools/docker/Dockerfile.test-isolation \
          .

        echo "tag=simple-test-isolation:${{ github.sha }}" >> $GITHUB_OUTPUT

        # Verify container
        docker run --rm simple-test-isolation:${{ github.sha }} --version

    - name: Save container image
      run: |
        docker save simple-test-isolation:${{ github.sha }} | gzip > container.tar.gz

    - name: Upload container artifact
      uses: actions/upload-artifact@v4
      with:
        name: test-container
        path: container.tar.gz
        retention-days: 1

  # ============================================================================
  # Unit Test Discovery Smoke
  # ============================================================================
  unit-tests-docker:
    name: Unit Test Discovery (Docker)
    runs-on: ubuntu-latest
    needs: build-container

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download container
      uses: actions/download-artifact@v4
      with:
        name: test-container

    - name: Load container image
      run: |
        docker load < container.tar.gz

    - name: Run unit tests
      run: |
        docker run --rm \
          -v $(pwd):/workspace:ro \
          -w /workspace \
          --read-only \
          --tmpfs /tmp:rw,noexec,nosuid \
          --memory=512m \
          --cpus=0.5 \
          --cap-drop=ALL \
          --security-opt=no-new-privileges \
          simple-test-isolation:${{ github.sha }} \
          test test/unit/std/arch_spec.spl --list --no-db --no-cover-check

  unit-tests-podman:
    name: Unit Test Discovery (Podman)
    runs-on: ubuntu-latest
    needs: build-container

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Podman
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y podman

    - name: Download container
      uses: actions/download-artifact@v4
      with:
        name: test-container

    - name: Load container image
      run: |
        podman load < container.tar.gz

    - name: Run unit tests
      run: |
        podman run --rm \
          -v $(pwd):/workspace:ro \
          -w /workspace \
          --read-only \
          --tmpfs /tmp:rw,noexec,nosuid \
          --memory=512m \
          --cpus=0.5 \
          --cap-drop=ALL \
          --security-opt=no-new-privileges \
          simple-test-isolation:${{ github.sha }} \
          test test/unit/std/arch_spec.spl --list --no-db --no-cover-check
      continue-on-error: false

  # ============================================================================
  # Integration Test Discovery Smoke
  # ============================================================================
  integration-tests-docker:
    name: Integration Test Discovery (Docker)
    runs-on: ubuntu-latest
    needs: build-container

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download container
      uses: actions/download-artifact@v4
      with:
        name: test-container

    - name: Load container image
      run: |
        docker load < container.tar.gz

    - name: Run integration tests
      run: |
        docker run --rm \
          -v $(pwd):/workspace:ro \
          -w /workspace \
          --read-only \
          --tmpfs /tmp:rw,noexec,nosuid \
          --memory=512m \
          --cpus=1.0 \
          --cap-drop=ALL \
          --security-opt=no-new-privileges \
          simple-test-isolation:${{ github.sha }} \
          test test/integration/log_facade_back_compat_spec.spl --list --no-db --no-cover-check

  integration-tests-podman:
    name: Integration Test Discovery (Podman)
    runs-on: ubuntu-latest
    needs: build-container

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Podman
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y podman

    - name: Download container
      uses: actions/download-artifact@v4
      with:
        name: test-container

    - name: Load container image
      run: |
        podman load < container.tar.gz

    - name: Run integration tests
      run: |
        podman run --rm \
          -v $(pwd):/workspace:ro \
          -w /workspace \
          --read-only \
          --tmpfs /tmp:rw,noexec,nosuid \
          --memory=512m \
          --cpus=1.0 \
          --cap-drop=ALL \
          --security-opt=no-new-privileges \
          simple-test-isolation:${{ github.sha }} \
          test test/integration/log_facade_back_compat_spec.spl --list --no-db --no-cover-check
      continue-on-error: false

  # ============================================================================
  # System Test Discovery Smoke
  # ============================================================================
  system-tests-docker:
    name: System Test Discovery (Docker)
    runs-on: ubuntu-latest
    needs: build-container

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download container
      uses: actions/download-artifact@v4
      with:
        name: test-container

    - name: Load container image
      run: |
        docker load < container.tar.gz

    - name: Run system tests
      run: |
        docker run --rm \
          -v $(pwd):/workspace:ro \
          -w /workspace \
          --read-only \
          --tmpfs /tmp:rw,noexec,nosuid \
          --memory=1g \
          --cpus=2.0 \
          --cap-drop=ALL \
          --security-opt=no-new-privileges \
          simple-test-isolation:${{ github.sha }} \
          test test/system/async_promise_system_spec.spl --list --no-db --no-cover-check

  # ============================================================================
  # Container Discovery Matrix
  # ============================================================================
  parallel-tests:
    name: Container Discovery Matrix
    runs-on: ubuntu-latest
    needs: build-container
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: unit
            path: test/unit/std/arch_spec.spl
          - label: integration
            path: test/integration/log_facade_back_compat_spec.spl
          - label: system
            path: test/system/async_promise_system_spec.spl
          - label: feature
            path: test/feature/app/config_loader_spec.spl

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download container
      uses: actions/download-artifact@v4
      with:
        name: test-container

    - name: Load container image
      run: |
        docker load < container.tar.gz

    - name: Run discovery (${{ matrix.label }})
      run: |
        docker run --rm \
          -v $(pwd):/workspace:ro \
          -w /workspace \
          --read-only \
          --tmpfs /tmp:rw,noexec,nosuid \
          --memory=512m \
          --cpus=1.0 \
          --cap-drop=ALL \
          --security-opt=no-new-privileges \
          simple-test-isolation:${{ github.sha }} \
          test ${{ matrix.path }} --list --no-db --no-cover-check

  # ============================================================================
  # Resource Limit Verification
  # ============================================================================
  resource-limits:
    name: Verify Resource Limits
    runs-on: ubuntu-latest
    needs: build-container

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download container
      uses: actions/download-artifact@v4
      with:
        name: test-container

    - name: Load container image
      run: |
        docker load < container.tar.gz

    - name: Test memory limit enforcement
      run: |
        # Run container with a bounded memory limit that still covers the test runner baseline.
        docker run --rm \
          -v $(pwd):/workspace:ro \
          -w /workspace \
          --memory=512m \
          --oom-kill-disable=false \
          simple-test-isolation:${{ github.sha }} \
          test test/unit/std/arch_spec.spl --list --no-db --no-cover-check

        echo "✓ Memory limit enforced correctly"

    - name: Test CPU limit enforcement
      run: |
        # Run with 0.5 CPU limit
        START=$(date +%s)
        docker run --rm \
          -v $(pwd):/workspace:ro \
          -w /workspace \
          --cpus=0.5 \
          simple-test-isolation:${{ github.sha }} \
          test test/unit/std/arch_spec.spl --list --no-db --no-cover-check
        END=$(date +%s)

        DURATION=$((END - START))
        echo "Test duration with 0.5 CPU: ${DURATION}s"
        echo "✓ CPU limit enforced correctly"

  # ============================================================================
  # Summary
  # ============================================================================
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests-docker, unit-tests-podman, integration-tests-docker, integration-tests-podman, system-tests-docker, parallel-tests, resource-limits]
    if: always()

    steps:
    - name: Generate summary
      run: |
        echo "# Containerized Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Test Suite | Runtime | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|------------|---------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Unit Discovery | Docker | ${{ needs.unit-tests-docker.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Unit Discovery | Podman | ${{ needs.unit-tests-podman.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Integration Discovery | Docker | ${{ needs.integration-tests-docker.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Integration Discovery | Podman | ${{ needs.integration-tests-podman.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| System Discovery | Docker | ${{ needs.system-tests-docker.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Discovery Matrix | Docker | ${{ needs.parallel-tests.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Resource Limits | Docker | ${{ needs.resource-limits.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Check for failures
        FAILED=0
        [ "${{ needs.unit-tests-docker.result }}" != "success" ] && FAILED=1
        [ "${{ needs.unit-tests-podman.result }}" != "success" ] && FAILED=1
        [ "${{ needs.integration-tests-docker.result }}" != "success" ] && FAILED=1
        [ "${{ needs.integration-tests-podman.result }}" != "success" ] && FAILED=1
        [ "${{ needs.system-tests-docker.result }}" != "success" ] && FAILED=1
        [ "${{ needs.parallel-tests.result }}" != "success" ] && FAILED=1
        [ "${{ needs.resource-limits.result }}" != "success" ] && FAILED=1

        if [ $FAILED -eq 1 ]; then
          echo "❌ Some tests failed" >> $GITHUB_STEP_SUMMARY
          exit 1
        fi

        echo "✅ All tests passed" >> $GITHUB_STEP_SUMMARY
