<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
html,body{margin:0;width:80px;height:50px;background:#fff7ed;}
body[data-state="final"] .one{height:24px;background:#fff7ed;}
body[data-state="final"] .two{height:18px;background:#f97316;}
body[data-state="final"] .three{height:8px;background:#7c2d12;}
.one{width:80px;height:10px;background:#fff7ed;}
.two{width:80px;height:14px;background:#f97316;}
.three{width:80px;height:26px;background:#7c2d12;}
</style>
</head>
<body data-state="final">
<div class="one"></div><div class="two"></div><div class="three"></div>
<script>document.addEventListener('DOMContentLoaded',function(){document.body.setAttribute('data-state','final');});</script>
</body>
</html>
