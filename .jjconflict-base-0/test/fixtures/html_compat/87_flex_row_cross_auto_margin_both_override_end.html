<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>flex row cross auto margin both override end</title>
<style>
html, body { margin: 0; padding: 0; }
.wrap {
  display: flex;
  width: 180px;
  height: 100px;
  padding: 10px;
  align-items: flex-end;
  background: #eeeeee;
}
.a { width: 40px; height: 20px; background: #dd3333; }
.b { width: 40px; height: 40px; margin-top: auto; margin-bottom: auto; background: #33aa33; }
.c { width: 40px; height: 30px; background: #3333dd; }
</style>
</head>
<body>
<div class="wrap" id="row_cross_auto_both_shell" data-geom-label="row_cross_auto_both_shell">
  <div class="a" id="row_cross_auto_both_a" data-geom-label="row_cross_auto_both_a"></div>
  <div class="b" id="row_cross_auto_both_b" data-geom-label="row_cross_auto_both_b"></div>
  <div class="c" id="row_cross_auto_both_c" data-geom-label="row_cross_auto_both_c"></div>
</div>
</body>
</html>
