<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>relative offset basic</title>
<style>
html, body { margin: 0; padding: 0; }
.shell {
  width: 200px;
  padding: 10px;
  border: 2px solid #334155;
  background: #eeeeee;
}
.relative {
  position: relative;
  left: 15px;
  top: 8px;
  width: 60px;
  height: 30px;
  background: #bfdbfe;
}
.after {
  width: 20px;
  height: 10px;
  background: #fed7aa;
}
</style>
</head>
<body>
<section class="shell" id="relative_offset_shell" data-geom-label="relative_offset_shell">
  <div class="relative" id="relative_offset_child" data-geom-label="relative_offset_child"></div>
  <div class="after" id="relative_offset_after" data-geom-label="relative_offset_after"></div>
</section>
</body>
</html>
