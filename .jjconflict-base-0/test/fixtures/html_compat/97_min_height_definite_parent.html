<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>min height definite parent</title>
<style>
html, body { margin: 0; padding: 0; }
.shell {
  position: relative;
  width: 200px;
  min-height: 120px;
  padding: 10px;
  border: 2px solid #334155;
  background: #eeeeee;
}
.child {
  position: absolute;
  left: 20px;
  top: 15px;
  width: 40px;
  height: 50%;
  background: #bfdbfe;
}
.after {
  width: 20px;
  height: 10px;
  background: #fed7aa;
}
</style>
</head>
<body>
<section class="shell" id="min_height_shell" data-geom-label="min_height_shell">
  <div class="child" id="min_height_abs_child" data-geom-label="min_height_abs_child"></div>
  <div class="after" id="min_height_after" data-geom-label="min_height_after"></div>
</section>
</body>
</html>
