<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>flex order basic</title>
<style>
html, body { margin: 0; padding: 0; }
.wrap {
  display: flex;
  width: 180px;
  height: 52px;
  padding: 10px;
  gap: 4px;
  background: #eeeeee;
}
.a { order: 2; width: 40px; height: 20px; background: #dd3333; }
.b { order: -1; width: 40px; height: 24px; background: #33aa33; }
.c { order: 1; width: 40px; height: 28px; background: #3333dd; }
</style>
</head>
<body>
<div class="wrap" id="flex_order_shell" data-geom-label="flex_order_shell">
  <div class="a" id="flex_order_a" data-geom-label="flex_order_a"></div>
  <div class="b" id="flex_order_b" data-geom-label="flex_order_b"></div>
  <div class="c" id="flex_order_c" data-geom-label="flex_order_c"></div>
</div>
</body>
</html>
