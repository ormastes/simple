# spl_gpu_transfer — sibling SFFI cdylib exporting a bulk pixel-staging API.
#
# Loaded at runtime via the SFFI dynamic loader (spl_dlopen/spl_dlsym) so the
# deployed self-hosted `simple` binary — which does NOT register the one-call
# upload extern rt_write_u32s_to_raw (#28 finding: readback rt_u32s_from_raw is
# registered, upload is not; rt_array_data_ptr is also absent from the interpret
# dispatch, so the [u32] backing pointer cannot be taken directly) — can still
# move a full pixel block into a Metal host staging buffer with ~1 FFI call per
# 16 pixels instead of one interpreted round-trip per pixel.
#
# Pure C-ABI, zero dependencies. Standalone crate: the empty [workspace] table
# stops cargo walking up into the compiler_rust workspace.
[workspace]

[package]
name = "spl_gpu_transfer"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"

[lib]
name = "spl_gpu_transfer"
crate-type = ["cdylib"]

[profile.release]
opt-level = 3
