{{#layout "layouts/application"}}

<div class="auth-page">
    <div class="auth-card auth-card-wide">
        <h1>Edit Profile</h1>

        {{#if error_message}}
        <div class="flash flash-error">{{error_message}}</div>
        {{/if}}

        <form action="/profile/update" method="post" class="auth-form">
            <div class="form-group">
                <label for="display_name">Display Name</label>
                <input type="text" id="display_name" name="display_name" value="{{display_name}}" required class="form-input" maxlength="100">
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{email}}" required class="form-input">
            </div>

            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea id="bio" name="bio" class="form-input form-textarea" rows="4" maxlength="500">{{bio}}</textarea>
                <small class="form-hint">Up to 500 characters</small>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Save Changes</button>
                <a href="/profile" class="btn btn-text">Cancel</a>
            </div>
        </form>
    </div>
</div>

{{/layout}}
