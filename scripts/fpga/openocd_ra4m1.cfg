# OpenOCD config for Renesas RA4M1 (R7FA4M1AB) — Arduino UNO R4 WiFi
# Cortex-M4, 256KB Flash @ 0x00000000, 32KB SRAM @ 0x20000000
# CMSIS-DAP via ESP32-S3 bridge

source [find interface/cmsis-dap.cfg]
transport select swd
adapter speed 4000

set _CHIPNAME ra4m1
set _WORKAREASIZE 0x2000

swd newdap $_CHIPNAME cpu -irlen 4 -expected-id 0x5ba02477
dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu
target create $_CHIPNAME.cpu cortex_m -dap $_CHIPNAME.dap

$_CHIPNAME.cpu configure -work-area-phys 0x20000000 -work-area-size $_WORKAREASIZE -work-area-backup 1
