# openocd_kv260_pmod_raw.cfg — RECOMMENDED zero-risk path (Option B).
# Drives the inner Simple RISC-V debug TAP (jtag_debug_chain) as RAW JTAG on a
# 3.3V FTDI adapter wired to the PMOD tck/tms/tdi/tdo pins. NO BSCANE2 tunnel, so
# the OpenOCD-vs-v1-bridge framing mismatch is bypassed entirely. Exercises the
# SAME landed inner TAP -> DTM -> CDC -> DM -> hart back-end.
#
# Wiring: FT2232H channel A MPSSE -> PMOD J2 tck/tms/tdi/tdo (+ GND, +3V3 ref).
# Make sure Vivado hw_server / xsdb do NOT hold this adapter.

adapter driver ftdi
ftdi vid_pid 0403 6010          ;# set to YOUR 3.3V FT2232H
ftdi channel 0
adapter speed 1000
transport select jtag
ftdi layout_init 0x0008 0x000b  ;# TCK/TDI/TMS out, TDO in (adjust to your cable)

# ---- Inner Simple RISC-V DTM: the ONLY tap on the raw PMOD chain ----------
set _CHIPNAME simplerv
jtag newtap $_CHIPNAME dtm -irlen 5 -expected-id 0x15350067

target create $_CHIPNAME.rv riscv -chain-position $_CHIPNAME.dtm

# Simple DTM custom IR opcodes (5-bit IR): DTMCS=0x10, DMI=0x11, abits=7.
riscv set_ir dtmcs 0x10
riscv set_ir dmi   0x11

riscv set_mem_access sysbus          ;# progbufsize=0: SBA is the mem path
riscv set_command_timeout_sec 5

init
