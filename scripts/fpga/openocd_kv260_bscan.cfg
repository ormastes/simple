# openocd_kv260_bscan.cfg — Lane B: attach OpenOCD to the Simple RISC-V debug
# module inside the KV260 rv32 SoC through the Xilinx BSCANE2 USER4 tunnel, over
# the SAME FT4232H programming chain (no extra cabling).
#
# *** JTAG CHAIN IS SINGLE-CLIENT ***  Vivado hw_server / xsdb and OpenOCD MUST
# NOT hold the FT4232H at the same time. Before running OpenOCD:
#     pkill -f hw_server ; pkill -f 'lnx64.o/vivado'   # (pattern avoids self-match)
# and close any Vivado Hardware Manager. Program the debug-enabled bitstream
# FIRST (G_DEBUG_JTAG=true), release the chain, THEN attach OpenOCD.
#
# *** BOARD-VERIFY (Phase 3) ***  The FPGA implements "Simple nested-TAP tunnel
# v1" (see bscane2_tap_bridge.vhd), proven self-consistent in GHDL. Bit-exact
# interop with OpenOCD's built-in `riscv use_bscan_tunnel` DATA_REGISTER/
# NESTED_TAP encoding is confirmed at board bring-up; if it does not match, use
# the raw-JTAG PMOD fallback (a 3.3V FT2232H on tck/tms/tdi/tdo straight into
# jtag_debug_chain, standard `ftdi` — zero tunnel risk) or a small tcl tunnel
# shim. Do NOT claim interop until a board transcript exists.

# ---- Adapter: KV260 on-board FT4232H, channel A (JTAG MPSSE) ----------------
adapter driver ftdi
ftdi vid_pid 0403 6011
ftdi channel 0
# usb path is host-specific; set to the KV260's location (from `lsusb -t`).
adapter usb location 3-2
adapter speed 1000
transport select jtag

# KV260 FT4232H channel-A MPSSE signal layout (nTRST/nSRST unused on this path).
ftdi layout_init 0x0088 0x008b

# ---- Zynq UltraScale+ (XCK26 / ZU5EV) PS TAP -------------------------------
# Confirm the idcode/irlen at bring-up with `xsdb -> jtag targets` (the exact
# idcode is device/step-specific; this is the ZU+ PS DAP tap).
set _CHIPNAME zynqmp
jtag newtap $_CHIPNAME tap -irlen 12 -ircapture 0x1 -irmask 0x03 \
    -expected-id 0x14738093 -expected-id 0x04738093

# ---- RISC-V debug module behind the BSCANE2 tunnel -------------------------
target create $_CHIPNAME.rv riscv -chain-position $_CHIPNAME.tap
# The Simple DTM's inner IR is 5 bits (IDCODE/DTMCS/DMI/BYPASS); tunnel type 1 =
# DATA_REGISTER. Enable BEFORE examine.
$_CHIPNAME.rv configure -work-area-phys 0 -work-area-size 0
riscv use_bscan_tunnel 5 1

# SBA is the only memory path in this SoC (progbufsize=0); GPR/CSR come via
# abstract commands.
riscv set_mem_access sysbus

# Faster, quieter examine for a soft TAP.
riscv set_command_timeout_sec 5

init
# `targets` / `halt` are driven by the check scripts, not here, so this cfg can
# be sourced read-only.
