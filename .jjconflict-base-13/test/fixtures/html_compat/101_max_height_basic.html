<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>max height basic</title>
<style>
html, body { margin: 0; padding: 0; }
.shell {
  width: 200px;
  padding: 10px;
  border: 2px solid #334155;
  background: #eeeeee;
}
.child {
  width: 60px;
  height: 90px;
  max-height: 40px;
  background: #bfdbfe;
}
.after {
  width: 20px;
  height: 10px;
  background: #fed7aa;
}
</style>
</head>
<body>
<section class="shell" id="max_height_shell" data-geom-label="max_height_shell">
  <div class="child" id="max_height_child" data-geom-label="max_height_child"></div>
  <div class="after" id="max_height_after" data-geom-label="max_height_after"></div>
</section>
</body>
</html>
