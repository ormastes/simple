<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GUI Perf Benchmark - JavaScript Canvas</title>
<style>body{margin:0;overflow:hidden;background:#262630}</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// GUI Perf Benchmark — JavaScript Canvas 8K fill + widget render
// Open in browser or run headless: node bench_js_node.js
// Params via URL: ?width=7680&height=4320&frames=60

const params = new URLSearchParams(location.search);
const W = parseInt(params.get("width") || "7680");
const H = parseInt(params.get("height") || "4320");
const FRAMES = parseInt(params.get("frames") || "60");

const canvas = document.getElementById("c");
canvas.width = W;
canvas.height = H;
const ctx = canvas.getContext("2d");

const frameTimes = [];
let frameCount = 0;
let coldStart = performance.now();
let warmStart = null;

function drawFrame() {
    const t0 = performance.now();
    if (frameCount === 0) warmStart = t0;

    // Background fill — 8K pixel work
    ctx.fillStyle = "#262630";
    ctx.fillRect(0, 0, W, H);

    // Title bar
    ctx.fillStyle = "#3366CC";
    ctx.fillRect(0, 0, W, 48);

    // Sidebar
    ctx.fillStyle = "#1F1F28";
    ctx.fillRect(0, 48, 280, H - 48);

    // Content text-like rectangles
    ctx.fillStyle = "#E5E5E5";
    for (let i = 0; i < 40; i++) {
        const w = 400 + (i % 5) * 80;
        ctx.fillRect(300, 70 + i * 24, w, 16);
    }

    // Buttons
    const colors = ["#3380CC","#3D85C6","#4791BF","#519CB9",
                     "#5BA8B2","#66B3AB","#70BFA5","#7ACA9E"];
    for (let i = 0; i < 8; i++) {
        ctx.fillStyle = colors[i];
        const bx = 300 + (i % 4) * 200;
        const by = H - 200 + Math.floor(i / 4) * 60;
        ctx.fillRect(bx, by, 160, 40);
    }

    const t1 = performance.now();
    frameTimes.push(t1 - t0);
    frameCount++;

    if (frameCount < FRAMES) {
        requestAnimationFrame(drawFrame);
    } else {
        report();
    }
}

function report() {
    const n = frameTimes.length;
    const s = [...frameTimes].sort((a, b) => a - b);
    const p50 = s[Math.floor(n / 2)];
    const p95 = s[Math.floor(n * 0.95)];
    const avg = frameTimes.reduce((a, b) => a + b, 0) / n;
    const coldMs = warmStart - coldStart;
    const warmMs = performance.now() - warmStart;

    const lines = [
        `gui_perf_benchmark_backend=javascript_canvas`,
        `gui_perf_benchmark_resolution=${W}x${H}`,
        `gui_perf_benchmark_frames=${n}`,
        `gui_perf_benchmark_cold_startup_ms=${coldMs.toFixed(2)}`,
        `gui_perf_benchmark_warm_total_ms=${warmMs.toFixed(2)}`,
        `gui_perf_benchmark_frame_time_avg_ms=${avg.toFixed(3)}`,
        `gui_perf_benchmark_frame_time_p50_ms=${p50.toFixed(3)}`,
        `gui_perf_benchmark_frame_time_p95_ms=${p95.toFixed(3)}`,
        `gui_perf_benchmark_frame_time_max_ms=${s[n-1].toFixed(3)}`,
        `gui_perf_benchmark_pixel_count=${W * H}`,
        `gui_perf_benchmark_bytes_per_frame=${W * H * 4}`,
        `gui_perf_benchmark_status=completed`
    ];

    // Display in page
    const pre = document.createElement("pre");
    pre.style.cssText = "position:fixed;top:10px;left:10px;color:#0f0;font:14px monospace;z-index:999";
    pre.textContent = lines.join("\n");
    document.body.appendChild(pre);

    // Console output for headless capture
    lines.forEach(l => console.log(l));
}

requestAnimationFrame(drawFrame);
</script>
</body>
</html>
