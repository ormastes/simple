<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>Simple 2D Canvas</title><style>body{background:#06070c;margin:0;display:flex;flex-direction:column;align-items:center;gap:16px;padding:24px;font-family:-apple-system,sans-serif;color:#f5f5f7}h2{font-weight:600;font-size:17px}</style></head><body><h2>Simple GUI 2D — Tauri mobile canvas backend</h2><canvas id="scene_main" class="widget-canvas" width="320" height="240" style="max-width:100%;height:auto;border-radius:12px;background:#0b1020;"></canvas><script>var el_scene_main=document.getElementById('scene_main');var c=el_scene_main.getContext('2d');c.textBaseline='top';c.fillStyle='#101828';c.fillRect(0,0,320,240);c.fillStyle='#f5f5f7';c.font='18px -apple-system,sans-serif';c.fillText('Simple 2D on Canvas',16,14);c.fillStyle='#e53935';c.fillRect(24,60,70,70);c.fillStyle='#43a047';c.beginPath();c.arc(165,95,38,0,6.2832);c.fill();c.strokeStyle='#1e88e5';c.lineWidth=4;c.strokeRect(230,60,70,70);c.strokeStyle='#ffb300';c.lineWidth=5;c.beginPath();c.moveTo(24,170);c.lineTo(300,210);c.stroke();c.fillStyle='#9aa4b2';c.font='13px -apple-system,sans-serif';c.fillText('rect / circle / stroke / line',24,196);</script></body></html>
