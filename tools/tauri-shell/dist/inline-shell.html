<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Simple UI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0A0A0F; color: #F5F5F7;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    #app { width: 100%; min-height: 100%; }
  </style>
</head>
<body>
  <!--
    Real bundled base document for the mobile Tauri shell. The shell navigates the
    webview here (http://tauri.localhost/inline-shell.html) and then injects the
    Simple-generated UI via eval (inline_shell_document_script + render handler).
    iOS WKWebView only paints injected DOM when the base navigation SUCCEEDS, so
    this must exist as a real served asset (Android tolerates a 404; iOS does not).
  -->
  <div id="app"></div>
</body>
</html>
