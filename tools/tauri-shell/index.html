<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple UI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, monospace;
      background: #1e1e2e;
      color: #cdd6f4;
      width: 100vw;
      height: 100vh;
      overflow: auto;
    }
    #app { width: 100%; min-height: 100%; }
    #debug {
      position: fixed; top: 0; right: 0;
      background: rgba(0,0,0,0.85); color: #a6e3a1;
      font-size: 11px; padding: 8px; max-width: 400px;
      max-height: 200px; overflow-y: auto; z-index: 9999;
      border-left: 2px solid #a6e3a1; border-bottom: 2px solid #a6e3a1;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <div id="app">
    <div style="padding:40px;text-align:center">
      <h2 style="color:#89b4fa">Simple UI — Tauri</h2>
      <p style="margin:16px 0;color:#a6adc8">Initializing...</p>
      <div id="init-status" style="color:#f9e2af"></div>
    </div>
  </div>
  <div id="debug"></div>

  <!-- Fallback demo UI: shown when subprocess doesn't send a render within 5s -->
  <template id="demo-ui">
    <div style="display:flex;flex-direction:column;height:100vh;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#1e1e2e;color:#cdd6f4">
      <!-- Title bar -->
      <div style="background:#181825;padding:12px 20px;display:flex;align-items:center;border-bottom:1px solid #313244">
        <span style="font-size:20px;font-weight:600;color:#89b4fa">Simple UI</span>
        <span style="margin-left:12px;font-size:12px;color:#6c7086;background:#313244;padding:2px 8px;border-radius:4px">Tauri v2</span>
        <span style="margin-left:auto;font-size:12px;color:#a6adc8" id="demo-platform"></span>
      </div>
      <!-- Main content -->
      <div style="flex:1;display:flex;overflow:hidden">
        <!-- Sidebar -->
        <div style="width:220px;background:#181825;border-right:1px solid #313244;padding:16px;display:flex;flex-direction:column;gap:4px">
          <div style="font-size:11px;color:#6c7086;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">Navigation</div>
          <div class="nav-item active" data-action="nav_dashboard" style="padding:8px 12px;border-radius:6px;cursor:pointer;background:#313244;color:#cdd6f4">Dashboard</div>
          <div class="nav-item" data-action="nav_widgets" style="padding:8px 12px;border-radius:6px;cursor:pointer;color:#a6adc8">Widgets</div>
          <div class="nav-item" data-action="nav_forms" style="padding:8px 12px;border-radius:6px;cursor:pointer;color:#a6adc8">Forms</div>
          <div class="nav-item" data-action="nav_settings" style="padding:8px 12px;border-radius:6px;cursor:pointer;color:#a6adc8">Settings</div>
          <div style="flex:1"></div>
          <div style="font-size:11px;color:#585b70;padding:8px 12px">v0.1.0 &middot; Demo Mode</div>
        </div>
        <!-- Content area -->
        <div style="flex:1;padding:24px;overflow-y:auto">
          <h2 style="margin-bottom:16px;font-weight:500">Dashboard</h2>
          <!-- Stats row -->
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px">
            <div style="background:#313244;border-radius:8px;padding:16px">
              <div style="font-size:12px;color:#6c7086">Widgets</div>
              <div style="font-size:28px;font-weight:600;color:#89b4fa;margin-top:4px">23</div>
            </div>
            <div style="background:#313244;border-radius:8px;padding:16px">
              <div style="font-size:12px;color:#6c7086">Backends</div>
              <div style="font-size:28px;font-weight:600;color:#a6e3a1;margin-top:4px">7</div>
            </div>
            <div style="background:#313244;border-radius:8px;padding:16px">
              <div style="font-size:12px;color:#6c7086">Status</div>
              <div style="font-size:28px;font-weight:600;color:#f9e2af;margin-top:4px">OK</div>
            </div>
          </div>
          <!-- Widget demos -->
          <div style="background:#313244;border-radius:8px;padding:20px;margin-bottom:16px">
            <h3 style="font-size:14px;color:#a6adc8;margin-bottom:12px">Interactive Controls</h3>
            <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
              <button data-action="btn_primary" style="background:#89b4fa;color:#1e1e2e;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500">Primary</button>
              <button data-action="btn_success" style="background:#a6e3a1;color:#1e1e2e;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500">Success</button>
              <button data-action="btn_warning" style="background:#f9e2af;color:#1e1e2e;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500">Warning</button>
              <button data-action="btn_danger" style="background:#f38ba8;color:#1e1e2e;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500">Danger</button>
            </div>
            <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
              <input type="text" placeholder="Type something..." style="background:#45475a;border:1px solid #585b70;color:#cdd6f4;padding:8px 12px;border-radius:6px;font-size:13px;outline:none;width:200px" />
              <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px">
                <input type="checkbox" checked style="accent-color:#89b4fa" /> Enable
              </label>
              <select style="background:#45475a;border:1px solid #585b70;color:#cdd6f4;padding:8px 12px;border-radius:6px;font-size:13px;outline:none">
                <option>Tauri</option><option>Electron</option><option>TUI</option><option>Web</option>
              </select>
            </div>
          </div>
          <!-- Progress -->
          <div style="background:#313244;border-radius:8px;padding:20px;margin-bottom:16px">
            <h3 style="font-size:14px;color:#a6adc8;margin-bottom:12px">Progress</h3>
            <div style="background:#45475a;border-radius:4px;height:8px;overflow:hidden;margin-bottom:8px">
              <div id="demo-progress" style="background:#89b4fa;height:100%;width:72%;border-radius:4px;transition:width 0.5s"></div>
            </div>
            <div style="font-size:12px;color:#6c7086">Build Progress: 72%</div>
          </div>
          <!-- Table -->
          <div style="background:#313244;border-radius:8px;padding:20px">
            <h3 style="font-size:14px;color:#a6adc8;margin-bottom:12px">Recent Activity</h3>
            <table style="width:100%;border-collapse:collapse;font-size:13px">
              <thead><tr style="border-bottom:1px solid #45475a">
                <th style="text-align:left;padding:8px;color:#6c7086;font-weight:500">Platform</th>
                <th style="text-align:left;padding:8px;color:#6c7086;font-weight:500">Build</th>
                <th style="text-align:left;padding:8px;color:#6c7086;font-weight:500">Status</th>
              </tr></thead>
              <tbody>
                <tr style="border-bottom:1px solid #313244"><td style="padding:8px">macOS Desktop</td><td style="padding:8px">Tauri v2</td><td style="padding:8px"><span style="color:#a6e3a1">Verified</span></td></tr>
                <tr style="border-bottom:1px solid #313244"><td style="padding:8px">iOS Simulator</td><td style="padding:8px">iPhone 17 Pro</td><td style="padding:8px"><span style="color:#a6e3a1">Verified</span></td></tr>
                <tr><td style="padding:8px">Android Emulator</td><td style="padding:8px">Pixel 7</td><td style="padding:8px"><span style="color:#a6e3a1">Verified</span></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
      <!-- Status bar -->
      <div style="background:#181825;padding:6px 16px;display:flex;align-items:center;font-size:11px;color:#585b70;border-top:1px solid #313244">
        <span>Simple UI &middot; Tauri v2 Shell</span>
        <span style="margin-left:auto" id="demo-time"></span>
      </div>
    </div>
  </template>

  <script>
    const dbg = document.getElementById("debug");
    const status = document.getElementById("init-status");
    window.simpleStatus = function(msg) {
      status.textContent = msg;
      log("status: " + msg);
    };
    function log(msg) {
      const t = new Date().toLocaleTimeString('en',{hour12:false});
      const line = document.createElement("div");
      line.textContent = `[${t}] ${msg}`;
      dbg.appendChild(line);
      dbg.scrollTop = dbg.scrollHeight;
      console.log(`[tauri-debug] ${msg}`);
    }

    log("Page loaded");
    log("window.__TAURI__: " + (typeof window.__TAURI__));

    async function init() {
      const appEl = document.getElementById("app");

      // Check if Tauri API is available
      if (!window.__TAURI__) {
        log("ERROR: window.__TAURI__ not found!");
        window.simpleStatus("Tauri API not available. withGlobalTauri may be false.");
        return;
      }

      log("Tauri API found. Keys: " + Object.keys(window.__TAURI__).join(", "));

      // Try different API paths for Tauri v2
      let listenFn = null;
      let invokeFn = null;

      if (window.__TAURI__.event && window.__TAURI__.event.listen) {
        listenFn = window.__TAURI__.event.listen;
        log("Found event.listen");
      } else if (window.__TAURI__.event && window.__TAURI__.event.TauriEvent) {
        log("Found event.TauriEvent but no listen");
      } else {
        log("event keys: " + (window.__TAURI__.event ? Object.keys(window.__TAURI__.event).join(", ") : "N/A"));
      }

      if (window.__TAURI__.core && window.__TAURI__.core.invoke) {
        invokeFn = window.__TAURI__.core.invoke;
        log("Found core.invoke");
      } else if (window.__TAURI__.tauri && window.__TAURI__.tauri.invoke) {
        invokeFn = window.__TAURI__.tauri.invoke;
        log("Found tauri.invoke (legacy)");
      } else {
        log("core keys: " + (window.__TAURI__.core ? Object.keys(window.__TAURI__.core).join(", ") : "N/A"));
      }

      if (!listenFn) {
        // Try alternative: use window.__TAURI_INTERNALS__
        if (window.__TAURI_INTERNALS__) {
          log("Found __TAURI_INTERNALS__");
        }
        window.simpleStatus("Cannot find listen function");
        // Fallback: poll or try alternatives
      }

      // Listen for render events
      if (listenFn) {
        try {
          await listenFn("render", (event) => {
            renderReceived = true;
            log("Render event received! payload type=" + typeof event.payload + " len=" + (event.payload ? event.payload.length : 0));
            appEl.innerHTML = event.payload;
            status.textContent = "";
            // Hide debug after first successful render
            dbg.style.maxHeight = "100px";
          });
          log("Listening for 'render' events");
          window.simpleStatus("Listening for render events from subprocess...");
        } catch(e) {
          log("listen error: " + e.message);
          window.simpleStatus("Listen error: " + e.message);
        }
      }

      // Forward keyboard events
      if (invokeFn) {
        document.addEventListener("keydown", (e) => {
          let key = e.key;
          if (key.length === 1 || ["Enter","Escape","Backspace","Tab","Delete",
              "ArrowUp","ArrowDown","ArrowLeft","ArrowRight"].includes(key)) {
            invokeFn("send_keypress", { key }).catch(err => log("invoke err: " + err));
            log("Key: " + key);
          }
        });

        // Forward clicks on data-action elements
        document.addEventListener("click", (e) => {
          const btn = e.target.closest("[data-action]");
          if (btn) {
            const name = btn.getAttribute("data-action");
            invokeFn("send_action", { name }).catch(err => log("invoke err: " + err));
            log("Click: " + name);
          }
        });

        // Forward resize
        let resizeTimer = null;
        window.addEventListener("resize", () => {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(() => {
            invokeFn("send_resize", {
              width: Math.round(window.innerWidth),
              height: Math.round(window.innerHeight)
            }).catch(() => {});
          }, 150);
        });

        log("Event forwarding active");
      }
    }

    // Fallback: show demo UI if no render event within 5s
    let renderReceived = false;
    function showDemoUI() {
      if (renderReceived) return;
      const tpl = document.getElementById("demo-ui");
      if (!tpl) return;
      const appEl = document.getElementById("app");
      appEl.innerHTML = tpl.innerHTML;
      // Hide debug panel in demo mode
      dbg.style.display = "none";
      // Set platform info
      const platEl = document.getElementById("demo-platform");
      if (platEl) {
        const ua = navigator.userAgent;
        if (/iPhone|iPad/.test(ua)) platEl.textContent = "iOS Simulator";
        else if (/Android/.test(ua)) platEl.textContent = "Android Emulator";
        else platEl.textContent = "macOS Desktop";
      }
      // Animate clock
      const timeEl = document.getElementById("demo-time");
      if (timeEl) setInterval(() => {
        timeEl.textContent = new Date().toLocaleTimeString("en", {hour12:false});
      }, 1000);
      // Nav click handling
      appEl.addEventListener("click", (e) => {
        const item = e.target.closest(".nav-item");
        if (item) {
          appEl.querySelectorAll(".nav-item").forEach(n => {
            n.style.background = "transparent"; n.style.color = "#a6adc8";
          });
          item.style.background = "#313244"; item.style.color = "#cdd6f4";
        }
      });
      log("Demo UI activated (subprocess unavailable)");
    }
    setTimeout(showDemoUI, 5000);

    // Try init immediately and also on DOMContentLoaded
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", init);
    } else {
      init();
    }
  </script>
</body>
</html>
