<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple UI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    #app {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #app.loading {
      font-size: 1.2rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div id="app" class="loading">Loading...</div>

  <script>
    // Wait for Tauri APIs to be available
    document.addEventListener("DOMContentLoaded", async () => {
      const { listen } = window.__TAURI__.event;
      const { invoke } = window.__TAURI__.core;

      const appEl = document.getElementById("app");

      // ---------------------------------------------------------------
      // Listen for render events from the Rust backend
      // ---------------------------------------------------------------
      await listen("render", (event) => {
        appEl.classList.remove("loading");
        appEl.innerHTML = event.payload;
      });

      // ---------------------------------------------------------------
      // Forward keyboard events to the subprocess via Tauri invoke
      // ---------------------------------------------------------------
      document.addEventListener("keydown", (e) => {
        // Build a key string compatible with the IPC protocol
        let key = e.key;
        if (key.length === 1 || [
          "Enter", "Escape", "Backspace", "Tab", "Delete",
          "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight",
          "Home", "End", "PageUp", "PageDown",
          "F1","F2","F3","F4","F5","F6","F7","F8","F9","F10","F11","F12"
        ].includes(key)) {
          invoke("send_keypress", { key: key });
        }
      });

      // ---------------------------------------------------------------
      // Forward resize events to the subprocess
      // ---------------------------------------------------------------
      let resizeTimeout = null;
      window.addEventListener("resize", () => {
        clearTimeout(resizeTimeout);
        resizeTimeout = setTimeout(() => {
          invoke("send_resize", {
            width: Math.round(window.innerWidth),
            height: Math.round(window.innerHeight)
          });
        }, 150);
      });

      // ---------------------------------------------------------------
      // Delegate clicks on [data-action] elements
      // ---------------------------------------------------------------
      document.addEventListener("click", (e) => {
        const actionEl = e.target.closest("[data-action]");
        if (actionEl) {
          const name = actionEl.getAttribute("data-action");
          invoke("send_action", { name: name });
        }
      });
    });
  </script>
</body>
</html>
