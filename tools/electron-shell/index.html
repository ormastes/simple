<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
    <title>Simple UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1e1e2e;
            color: #cdd6f4;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        #app {
            width: 100%;
            height: 100%;
            padding: 8px;
            overflow: auto;
        }
        #app.loading {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6c7086;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="app" class="loading">Loading...</div>
    <script>
        const appEl = document.getElementById('app');

        // Receive rendered HTML from the Simple process
        window.simpleUI.onRender(function(html) {
            appEl.classList.remove('loading');
            appEl.innerHTML = html;
        });

        // Forward keyboard events to the Simple process
        document.addEventListener('keydown', function(e) {
            // Map special keys to readable names
            let key = e.key;
            if (key === ' ') key = 'Space';
            window.simpleUI.sendKeypress(key);
        });

        // Notify Simple process on window close
        window.addEventListener('beforeunload', function() {
            window.simpleUI.sendQuit();
        });
    </script>
</body>
</html>
