<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline';">
    <title>Simple UI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1e1e2e;
            color: #cdd6f4;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            font-size: 14px;
            line-height: 1.5;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }
        #app {
            width: 100%;
            height: 100%;
            padding: 8px;
            overflow: auto;
        }
        #app.loading {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #6c7086;
            font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="app" class="loading">Loading...</div>
    <script>
        const appEl = document.getElementById('app');

        function normalizeRenderedHtml(html) {
            if (typeof html !== 'string') return '';
            if (html.indexOf('<html') === -1) return html;
            try {
                var parser = new DOMParser();
                var doc = parser.parseFromString(html, 'text/html');
                if (doc.title) document.title = doc.title;
                return doc.body ? doc.body.innerHTML : html;
            } catch (e) {
                return html;
            }
        }

        // Receive rendered HTML from the Simple process
        window.simpleUI.onRender(function(html) {
            appEl.classList.remove('loading');
            appEl.innerHTML = normalizeRenderedHtml(html);
        });

        // Forward keyboard events (skip when focused on form elements)
        document.addEventListener('keydown', function(e) {
            var tag = e.target.tagName.toLowerCase();
            if (tag === 'input' || tag === 'textarea' || tag === 'select') return;
            var key = e.key;
            if (key === ' ') key = 'Space';
            window.simpleUI.sendKeypress(key);
            if (['j','k','Tab','Escape',':','i'].indexOf(key) >= 0) e.preventDefault();
        });

        // Click event delegation for all widget types
        document.addEventListener('click', function(e) {
            var el = e.target;

            // Button clicks (data-action)
            var btn = el.closest('.widget-button, [data-action]');
            if (btn) {
                var action = btn.getAttribute('data-action');
                if (action) window.simpleUI.sendAction(action);
                return;
            }

            // Checkbox toggle
            var cb = el.closest('.widget-checkbox');
            if (cb) {
                var action = cb.getAttribute('data-action');
                if (action) window.simpleUI.sendAction(action);
                return;
            }

            // List item selection
            var li = el.closest('.list-item');
            if (li) {
                var list = li.closest('.widget-list');
                if (list) {
                    var items = list.querySelectorAll('.list-item');
                    for (var i = 0; i < items.length; i++) {
                        if (items[i] === li) {
                            window.simpleUI.sendAction('select_' + list.id + '_' + i);
                            break;
                        }
                    }
                }
                return;
            }

            // Tab switching
            var tab = el.closest('.tab-item');
            if (tab) {
                var tabs = tab.parentElement;
                if (tabs) {
                    var items = tabs.querySelectorAll('.tab-item');
                    for (var i = 0; i < items.length; i++) {
                        items[i].classList.remove('active');
                        if (items[i] === tab) {
                            tab.classList.add('active');
                            window.simpleUI.sendAction('tab_' + tabs.id + '_' + i);
                        }
                    }
                }
                return;
            }

            // Tree node toggle
            var toggle = el.closest('.tree-toggle');
            if (toggle) {
                var action = toggle.getAttribute('data-action');
                if (action) window.simpleUI.sendAction(action);
                return;
            }

            // Table header sort
            var th = el.closest('th[data-action]');
            if (th) {
                var action = th.getAttribute('data-action');
                if (action) window.simpleUI.sendAction(action);
                return;
            }

            // Submenu item clicks
            var sub = el.closest('.submenu-item');
            if (sub) {
                var action = sub.getAttribute('data-action');
                if (action) window.simpleUI.sendAction(action);
                return;
            }
        });

        // Dropdown change handler
        document.addEventListener('change', function(e) {
            var dd = e.target.closest('.widget-dropdown');
            if (dd) {
                window.simpleUI.sendAction('select_' + dd.id + '_' + e.target.selectedIndex);
                return;
            }
            var inp = e.target.closest('.widget-input, .widget-textfield');
            if (inp && inp.id) window.simpleUI.sendAction('change_' + inp.id);
            var ta = e.target.closest('.widget-textarea');
            if (ta && ta.id) window.simpleUI.sendAction('change_' + ta.id);
        });

        // Table filter input handler
        document.addEventListener('input', function(e) {
            if (e.target.classList.contains('table-filter')) {
                var action = e.target.getAttribute('data-action');
                if (action) window.simpleUI.sendAction(action);
            }
        });

        // Notify Simple process on window close
        window.addEventListener('beforeunload', function() {
            window.simpleUI.sendQuit();
        });
    </script>
</body>
</html>
