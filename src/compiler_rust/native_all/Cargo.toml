[package]
name = "simple-native-all"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
crate-type = ["staticlib"]

# NOTE: `spl_hosted_runtime` lives outside the usual `src/compiler_rust/*`
# tree (in `src/runtime/hosted/`) so that the hosted-compositor SFFI
# bindings ship alongside the C runtime. It's pulled in here so that its
# `rt_cocoa_*` / `rt_win32_*` / `rt_hosted_select_surface` no_mangle
# symbols are rolled into `libsimple_native_all.a` and resolved at the
# Simple link step. The crate's default feature set is "stubs only" —
# real Cocoa / Win32 backends are opt-in via `cocoa-real` / `win32-real`.

[lints]
workspace = true

[features]
default = []  # Cranelift is sufficient; enable "llvm" explicitly when needed
llvm = ["simple-compiler/llvm"]
gui = ["simple-compiler/gui"]

[dependencies]
simple-common = { path = "../common" }
simple-compiler = { path = "../compiler" }
simple-runtime = { path = "../runtime", features = ["driver-hooks"] }
simple-driver = { path = "../driver" }
# Row 3 hosted-compositor SFFI bindings. Path is relative to this crate,
# so it points into `src/runtime/hosted/`. Default features keep this as
# a "stubs only" no-op on every host.
spl_hosted_runtime = { path = "../../runtime/hosted" }
