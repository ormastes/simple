[package]
name = "simple-common"
version = "0.1.0"
edition = "2021"
license = "MIT"

[lints]
workspace = true

[dependencies]
# Infrastructure & Dependencies (#839)
# Hash trait interface
ahash.workspace = true           # Fast hashing for HashMap defaults
tracing.workspace = true

# Memory-mapped file reading (#820)
memmap2.workspace = true         # 15% faster file reading for large files

# Serialization for JSON error format (#888) and protocol transport
serde.workspace = true
serde_json = "1.0"

# Error handling for protocol transport
thiserror = "2.0"

[dev-dependencies]
tempfile = "3.8"
