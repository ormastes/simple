[package]
name = "simple-native-loader"
version = "0.1.0"
edition = "2021"
license = "MIT"

[lints]
workspace = true

[dependencies]
libloading = "0.8"
thiserror.workspace = true
simple-common = { path = "../common" }
simple-runtime = { path = "../runtime" }
libc = "0.2"

[target.'cfg(windows)'.dependencies]
windows-sys = { version = "0.59", features = [
    "Win32_Foundation",
    "Win32_System_LibraryLoader",
] }

[dev-dependencies]
tempfile = "3"
cc = "1"
