optional = true

[dependencies.flume]
version = "0.11"
optional = true

[dependencies.fxhash]
version = "0.2"

[dependencies.lazy_static]
version = "1"
optional = true

[dependencies.libc]
version = "0.2"

[dependencies.memchr]
version = "2.7"

[dependencies.mio]
version = "0.8"
features = [
    "net",
    "os-poll",
    "os-ext",
]
optional = true

[dependencies.monoio-macros]
version = "0.1.0"
optional = true

[dependencies.once_cell]
version = "1.19.0"
optional = true

[dependencies.pin-project-lite]
version = "0.2"

[dependencies.socket2]
version = "0.5"
