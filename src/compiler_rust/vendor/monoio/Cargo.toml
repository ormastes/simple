    "flume",
    "threadpool",
    "once_cell",
]
tokio-compat = ["tokio"]
unlinkat = []
unstable = []
utils = ["nix"]
zero-copy = []

[target.'cfg(target_os = "linux")'.dependencies.io-uring]
version = "0.6"
optional = true

[target."cfg(unix)".dependencies.nix]
version = "0.26"
optional = true

[target."cfg(windows)".dependencies.windows-sys]
version = "0.48.0"
features = [
    "Win32_Foundation",
    "Win32_Networking_WinSock",
    "Win32_System_IO",
    "Win32_Storage_FileSystem",
    "Win32_Security",
]

