[package]
name = "spl_hosted_runtime"
version = "0.1.0"
edition = "2021"
description = "Rust SFFI bindings for hosted compositor surfaces (Cocoa / Win32)"
license = "Apache-2.0"

[lib]
name = "spl_hosted_runtime"
path = "lib.rs"
crate-type = ["staticlib", "rlib"]

# macOS-only Cocoa / Core Graphics bindings. Gated so linux/windows CI does
# not try to pull these crates down.
[target.'cfg(target_os = "macos")'.dependencies]
objc2 = { version = "0.5", optional = true }
core-graphics = { version = "0.23", optional = true }

# Windows-only Win32 bindings.
[target.'cfg(target_os = "windows")'.dependencies]
windows-sys = { version = "0.52", features = [
    "Win32_Foundation",
    "Win32_Graphics_Gdi",
    "Win32_UI_WindowsAndMessaging",
    "Win32_System_LibraryLoader",
], optional = true }

[features]
# Default is "stubs only": all SFFI symbols exist but are no-ops. Turn on
# `cocoa-real` / `win32-real` when the real host-side crates are available.
default = []
cocoa-real = ["dep:objc2", "dep:core-graphics"]
win32-real = ["dep:windows-sys"]
