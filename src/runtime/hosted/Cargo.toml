[package]
name = "spl_hosted_runtime"
version = "0.1.0"
edition = "2021"
description = "Rust SFFI bindings for hosted compositor surfaces (Cocoa / Win32 / WebGPU)"
license = "Apache-2.0"

[lib]
name = "spl_hosted_runtime"
path = "lib.rs"
crate-type = ["staticlib", "rlib"]

# macOS-only Cocoa / Core Graphics bindings. Gated so linux/windows CI does
# not try to pull these crates down.
[target.'cfg(target_os = "macos")'.dependencies]
objc2 = { version = "0.5", optional = true }
objc2-foundation = { version = "0.2", optional = true, features = [
    "NSString",
    "NSDate",
    "NSRunLoop",
    "NSGeometry",
    "NSThread",
] }
objc2-app-kit = { version = "0.2", optional = true, features = [
    "NSApplication",
    "NSWindow",
    "NSView",
    "NSControl",
    "NSImageView",
    "NSImage",
    "NSImageRep",
    "NSResponder",
    "NSEvent",
    "NSColor",
    "NSGraphics",
    "NSGraphicsContext",
    "NSBitmapImageRep",
    "NSRunningApplication",
] }
core-graphics = { version = "0.23", optional = true }
block2 = { version = "0.5", optional = true }

# Windows-only Win32 bindings.
[target.'cfg(target_os = "windows")'.dependencies]
windows-sys = { version = "0.52", features = [
    "Win32_Foundation",
    "Win32_Graphics_Gdi",
    "Win32_UI_WindowsAndMessaging",
    "Win32_System_LibraryLoader",
], optional = true }

# Cross-platform WebGPU binding (wgpu). Optional — only pulled in when the
# `webgpu-real` feature is enabled so linux/mac/windows default builds stay
# dep-free. `pollster` lets us block on wgpu's async device requests from a
# sync SFFI boundary.
[dependencies]
wgpu = { version = "0.20", optional = true, default-features = false, features = ["wgsl"] }
pollster = { version = "0.3", optional = true }
rquickjs = { version = "0.6", optional = true }

[features]
# Default is "stubs only": all SFFI symbols exist but are no-ops. Turn on
# `cocoa-real` / `win32-real` / `webgpu-real` when the real host-side crates
# are available.
default = []
cocoa-real = [
    "dep:objc2",
    "dep:objc2-foundation",
    "dep:objc2-app-kit",
    "dep:core-graphics",
    "dep:block2",
]
win32-real = ["dep:windows-sys"]
webgpu-real = ["dep:wgpu", "dep:pollster"]
test262-real = ["dep:rquickjs"]
