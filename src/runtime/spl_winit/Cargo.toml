# spl_winit — sibling SFFI cdylib exporting the rt_winit_* window API.
#
# Loaded at runtime via the SFFI dynamic loader (spl_dlopen/spl_dlsym) so that
# the deployed self-hosted `simple` binary — which does NOT register the
# rt_winit_* extern family — can still open a real OS window without a full
# runtime redeploy (blocked, see #21). Mirrors the seed interpreter's
# winit_sffi behaviour byte-for-byte (event type constants, keycode/mouse
# mappings, softbuffer present) but with a pure C-ABI + explicit NSApp
# activation so a CLI-spawned window is frontmost/draggable/clickable.
#
# Standalone crate: the empty [workspace] table stops cargo from walking up
# into the compiler_rust workspace.
[workspace]

[package]
name = "spl_winit"
version = "0.1.0"
edition = "2021"
license = "Apache-2.0"

[lib]
name = "spl_winit"
crate-type = ["cdylib"]

[dependencies]
# Match the versions winit 0.30.12 already pulls in (see compiler_rust Cargo.lock)
# so the objc2 window-handle types line up.
winit = "0.30"
softbuffer = "0.4.8"
raw-window-handle = "0.6"

[target.'cfg(target_os = "macos")'.dependencies]
objc2 = "0.5.2"
objc2-app-kit = "0.2.2"
objc2-foundation = "0.2.2"

[profile.release]
opt-level = 2
