[package]
name = "hello-simpleos"
version = "0.1.0"
edition = "2021"
description = "Minimal #![no_std] Rust binary for SimpleOS (validates cross-compile toolchain)"
publish = false

[[bin]]
name = "hello-simpleos"
path = "src/main.rs"

[profile.release]
panic = "abort"
lto = true
codegen-units = 1
opt-level = "s"
strip = true

[profile.dev]
panic = "abort"
