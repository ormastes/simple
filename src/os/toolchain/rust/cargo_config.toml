# .cargo/config.toml for SimpleOS Rust projects
# Copy to your project's .cargo/config.toml

[build]
target = "path/to/x86_64-unknown-simpleos.json"

[target.x86_64-unknown-simpleos]
linker = "clang"
rustflags = [
    "-C", "link-arg=-nostdlib",
    "-C", "link-arg=-ffreestanding",
    "-C", "link-arg=-fuse-ld=lld",
    "-C", "link-arg=-Lpath/to/src/os/libc",
    "-C", "link-arg=-lsimpleos_c",
]

[unstable]
build-std = ["core", "alloc"]
build-std-features = ["compiler-builtins-mem"]
