# .cargo/config.toml for SimpleOS Rust projects
#
# Copy to your project's .cargo/config.toml and adjust TARGET_SPEC_DIR
# and LIBC_DIR to point to your repo checkout.
#
# Example (from repo root):
#   mkdir -p .cargo
#   sed 's|REPO_ROOT|.|g' src/os/toolchain/rust/cargo_config.toml > .cargo/config.toml

[build]
target = "REPO_ROOT/src/os/toolchain/rust/x86_64-unknown-simpleos.json"

[target.x86_64-unknown-simpleos]
linker = "clang"
rustflags = [
    "-C", "link-arg=-nostdlib",
    "-C", "link-arg=-ffreestanding",
    "-C", "link-arg=-fuse-ld=lld",
    "-C", "link-arg=-LREPO_ROOT/build/os/sysroot/lib",
    "-C", "link-arg=-lsimpleos_c",
    "-C", "link-arg=-TREPO_ROOT/build/os/sysroot/share/simpleos/simpleos.ld",
]

[target.aarch64-unknown-simpleos]
linker = "clang"
rustflags = [
    "-C", "link-arg=-nostdlib",
    "-C", "link-arg=-ffreestanding",
    "-C", "link-arg=-fuse-ld=lld",
    "-C", "link-arg=--target=aarch64-unknown-none-elf",
    "-C", "link-arg=-LREPO_ROOT/build/os/sysroot/lib",
    "-C", "link-arg=-lsimpleos_c",
]

[target.riscv64gc-unknown-simpleos]
linker = "clang"
rustflags = [
    "-C", "link-arg=-nostdlib",
    "-C", "link-arg=-ffreestanding",
    "-C", "link-arg=-fuse-ld=lld",
    "-C", "link-arg=--target=riscv64-unknown-none-elf",
    "-C", "link-arg=-LREPO_ROOT/build/os/sysroot/lib",
    "-C", "link-arg=-lsimpleos_c",
]

[target.riscv32imac-unknown-simpleos]
linker = "clang"
rustflags = [
    "-C", "link-arg=-nostdlib",
    "-C", "link-arg=-ffreestanding",
    "-C", "link-arg=-fuse-ld=lld",
    "-C", "link-arg=--target=riscv32-unknown-none-elf",
    "-C", "link-arg=-LREPO_ROOT/build/os/sysroot/lib",
    "-C", "link-arg=-lsimpleos_c",
]

[unstable]
build-std = ["core", "alloc"]
build-std-features = ["compiler-builtins-mem"]
