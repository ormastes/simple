# openocd_riscv_sim.cfg — attach OpenOCD to the GHDL-simulated RISC-V debug
# stack (jtag_tap + riscv_dtm + dmi_bus + riscv_debug_module + sba_test_mem)
# served by tb_openocd_bitbang.vhd over the remote_bitbang protocol.
#
# Attach procedure: see openocd_attach.md (same directory). Short form:
#   terminal 1:  ghdl -r --std=08 tb_openocd_bitbang       # blocks, listens
#   terminal 2:  openocd -f openocd_riscv_sim.cfg \
#                  -c "init; targets; riscv dmi_read 0x11; shutdown"
#
# Notes for this stub DM (hart integration still deferred):
#   * The hart is a testbench model: halt/resume/step and GPR access work,
#     but there is no real ISA state — misa reads report "not supported"
#     (abstract CSR support is dcsr/dpc only, progbufsize=0).
#   * Memory access must use the system bus: `riscv set_mem_access sysbus`
#     (SBA v1.0/0.13, sbasize=64, 32/64-bit accesses).

adapter driver remote_bitbang
remote_bitbang host 127.0.0.1
remote_bitbang port 9999

transport select jtag

# The bitbang sim executes one protocol byte per 5 ns of sim time but is
# wall-clock bound by the TCP round trips; keep OpenOCD patient.
adapter speed 10000

set _CHIPNAME riscv
jtag newtap $_CHIPNAME cpu -irlen 5 -expected-id 0x15350067

set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME riscv -chain-position $_TARGETNAME

riscv set_reset_timeout_sec 120
riscv set_command_timeout_sec 120
riscv set_mem_access sysbus
