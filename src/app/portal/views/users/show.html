{{#layout "layouts/application"}}

<div class="profile-page">
    <div class="profile-header">
        <div class="profile-avatar">
            <div class="avatar-placeholder">{{username}}</div>
        </div>
        <div class="profile-info">
            <h1>{{display_name}}</h1>
            <p class="profile-username">@{{username}}</p>
            {{#if bio}}
            <p class="profile-bio">{{bio}}</p>
            {{/if}}
            <p class="profile-meta">Member since {{member_since}}</p>
        </div>
        <div class="profile-actions">
            <a href="/profile/edit" class="btn btn-secondary">Edit Profile</a>
        </div>
    </div>

    <section class="profile-packages">
        <h2>Published Packages</h2>
        {{{packages_html}}}
    </section>
</div>

{{/layout}}
