{{#layout "layouts/application"}}

<div class="page-header">
    <h1>{{title}}</h1>
    <div class="package-search-form">
        <form action="/packages" method="get">
            <input type="text" name="q" value="{{search_query}}" placeholder="Search packages..." class="search-input search-input-lg" autofocus>
            <button type="submit" class="btn btn-primary">Search</button>
        </form>
    </div>
</div>

{{#if search_query}}
<div class="search-results-info">
    <p>{{result_count}} results for "<strong>{{search_query}}</strong>"</p>
</div>
{{/if}}

{{{packages_html}}}

{{>_pagination}}

{{/layout}}
