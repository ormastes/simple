name: DirectX Windows Validation

# P3 of gpu_backend_dx_harden_followup_plan: run the DirectX 2D engine spec on
# a real Windows host (native D3D11; WARP software rasterizer on GPU-less
# runners). The Linux side is covered by the DXVK path.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/lib/gc_async_mut/gpu/engine2d/backend_directx.spl'
      - 'test/01_unit/lib/gc_async_mut/gpu/engine2d/backend_directx_spec.spl'
      - '.github/workflows/directx-windows-validation.yml'

jobs:
  directx-windows:
    name: DirectX spec — Windows native D3D11
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/compiler_rust/target
          key: dxwin-cargo-${{ runner.os }}-${{ hashFiles('src/compiler_rust/Cargo.lock') }}
          restore-keys: |
            dxwin-cargo-${{ runner.os }}-

      - name: Build bootstrap seed
        working-directory: src/compiler_rust
        run: cargo build --profile bootstrap -p simple-driver -p simple-native-all

      - name: Run DirectX backend spec (interpreter mode)
        shell: bash
        run: |
          ./src/compiler_rust/target/bootstrap/simple.exe test \
            test/01_unit/lib/gc_async_mut/gpu/engine2d/backend_directx_spec.spl

      - name: Capture probe evidence
        shell: bash
        run: |
          cat > /tmp/dxprobe_run.spl <<'EOF'
          use std.gpu.engine2d.backend_directx.{dx_platform_probe, probe_directx}

          fn main():
              val p = dx_platform_probe()
              val r = probe_directx()
              print("PLATFORM: " + p.platform)
              print("LEAF: " + p.leaf)
              print("EVIDENCE: " + p.evidence)
              print("REASON: " + r.reason)

          main()
          EOF
          ./src/compiler_rust/target/bootstrap/simple.exe run /tmp/dxprobe_run.spl
