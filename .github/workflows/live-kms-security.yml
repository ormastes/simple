name: Live KMS Security Gates

on:
  workflow_dispatch:
    inputs:
      provider:
        description: 'Live KMS provider to exercise'
        required: true
        default: 'aws'
        type: choice
        options:
          - aws
          - gcp
          - azure
          - hsm
          - all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.provider }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  aws-live-kms:
    name: AWS KMS live sign
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.provider == 'aws' || inputs.provider == 'all') }}
    runs-on: ubuntu-latest
    environment: live-kms-aws
    timeout-minutes: 20
    env:
      SIMPLE_LIVE_KMS_PROVIDER: aws
      SIMPLE_LIVE_KMS_AWS_ENDPOINT: ${{ secrets.SIMPLE_LIVE_KMS_AWS_ENDPOINT }}
      SIMPLE_LIVE_KMS_AWS_KEY_ID: ${{ secrets.SIMPLE_LIVE_KMS_AWS_KEY_ID }}
      SIMPLE_LIVE_KMS_AWS_AUTHORIZATION: ${{ secrets.SIMPLE_LIVE_KMS_AWS_AUTHORIZATION }}
      SIMPLE_LIVE_KMS_AWS_ALGORITHM: ${{ secrets.SIMPLE_LIVE_KMS_AWS_ALGORITHM || 'RSASSA_PSS_SHA_256' }}
      SIMPLE_LIVE_KMS_PAYLOAD: ${{ secrets.SIMPLE_LIVE_KMS_PAYLOAD || 'simple-live-kms-ci' }}
    steps:
      - uses: actions/checkout@v4
      - name: Build bootstrap runtime
        run: cargo build --manifest-path src/compiler_rust/Cargo.toml --profile bootstrap -p simple-driver
      - name: Require AWS live KMS credentials
        run: |
          missing=0
          for name in SIMPLE_LIVE_KMS_AWS_ENDPOINT SIMPLE_LIVE_KMS_AWS_KEY_ID SIMPLE_LIVE_KMS_AWS_AUTHORIZATION; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for AWS live KMS"
              missing=1
            fi
          done
          exit "$missing"
      - name: Run AWS live KMS gate
        run: SIMPLE_LIB=src src/compiler_rust/target/bootstrap/simple test test/integration/lib/security/live_kms_transport_spec.spl --mode=interpreter

  gcp-live-kms:
    name: GCP Cloud KMS live sign
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.provider == 'gcp' || inputs.provider == 'all') }}
    runs-on: ubuntu-latest
    environment: live-kms-gcp
    timeout-minutes: 20
    env:
      SIMPLE_LIVE_KMS_PROVIDER: gcp
      SIMPLE_LIVE_KMS_GCP_ENDPOINT: ${{ secrets.SIMPLE_LIVE_KMS_GCP_ENDPOINT }}
      SIMPLE_LIVE_KMS_GCP_KEY_VERSION: ${{ secrets.SIMPLE_LIVE_KMS_GCP_KEY_VERSION }}
      SIMPLE_LIVE_KMS_GCP_BEARER: ${{ secrets.SIMPLE_LIVE_KMS_GCP_BEARER }}
      SIMPLE_LIVE_KMS_DIGEST_SHA256: ${{ secrets.SIMPLE_LIVE_KMS_DIGEST_SHA256 }}
    steps:
      - uses: actions/checkout@v4
      - name: Build bootstrap runtime
        run: cargo build --manifest-path src/compiler_rust/Cargo.toml --profile bootstrap -p simple-driver
      - name: Require GCP live KMS credentials
        run: |
          missing=0
          for name in SIMPLE_LIVE_KMS_GCP_ENDPOINT SIMPLE_LIVE_KMS_GCP_KEY_VERSION SIMPLE_LIVE_KMS_GCP_BEARER SIMPLE_LIVE_KMS_DIGEST_SHA256; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for GCP live KMS"
              missing=1
            fi
          done
          exit "$missing"
      - name: Run GCP live KMS gate
        run: SIMPLE_LIB=src src/compiler_rust/target/bootstrap/simple test test/integration/lib/security/live_kms_transport_spec.spl --mode=interpreter

  azure-live-kms:
    name: Azure Key Vault live sign
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.provider == 'azure' || inputs.provider == 'all') }}
    runs-on: ubuntu-latest
    environment: live-kms-azure
    timeout-minutes: 20
    env:
      SIMPLE_LIVE_KMS_PROVIDER: azure
      SIMPLE_LIVE_KMS_AZURE_VAULT: ${{ secrets.SIMPLE_LIVE_KMS_AZURE_VAULT }}
      SIMPLE_LIVE_KMS_AZURE_KEY: ${{ secrets.SIMPLE_LIVE_KMS_AZURE_KEY }}
      SIMPLE_LIVE_KMS_AZURE_BEARER: ${{ secrets.SIMPLE_LIVE_KMS_AZURE_BEARER }}
      SIMPLE_LIVE_KMS_AZURE_ALGORITHM: ${{ secrets.SIMPLE_LIVE_KMS_AZURE_ALGORITHM || 'PS256' }}
      SIMPLE_LIVE_KMS_DIGEST_BASE64URL: ${{ secrets.SIMPLE_LIVE_KMS_DIGEST_BASE64URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Build bootstrap runtime
        run: cargo build --manifest-path src/compiler_rust/Cargo.toml --profile bootstrap -p simple-driver
      - name: Require Azure live KMS credentials
        run: |
          missing=0
          for name in SIMPLE_LIVE_KMS_AZURE_VAULT SIMPLE_LIVE_KMS_AZURE_KEY SIMPLE_LIVE_KMS_AZURE_BEARER SIMPLE_LIVE_KMS_DIGEST_BASE64URL; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for Azure live KMS"
              missing=1
            fi
          done
          exit "$missing"
      - name: Run Azure live KMS gate
        run: SIMPLE_LIB=src src/compiler_rust/target/bootstrap/simple test test/integration/lib/security/live_kms_transport_spec.spl --mode=interpreter

  hsm-live-kms:
    name: PKCS11 HSM live sign
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.provider == 'hsm' || inputs.provider == 'all') }}
    runs-on: ubuntu-latest
    environment: live-kms-hsm
    timeout-minutes: 20
    env:
      SIMPLE_LIVE_KMS_PROVIDER: hsm
      SIMPLE_LIVE_KMS_HSM_ENDPOINT: ${{ secrets.SIMPLE_LIVE_KMS_HSM_ENDPOINT }}
      SIMPLE_LIVE_KMS_HSM_SLOT: ${{ secrets.SIMPLE_LIVE_KMS_HSM_SLOT }}
      SIMPLE_LIVE_KMS_HSM_KEY: ${{ secrets.SIMPLE_LIVE_KMS_HSM_KEY }}
      SIMPLE_LIVE_KMS_HSM_AUTHORIZATION: ${{ secrets.SIMPLE_LIVE_KMS_HSM_AUTHORIZATION }}
      SIMPLE_LIVE_KMS_HSM_MECHANISM: ${{ secrets.SIMPLE_LIVE_KMS_HSM_MECHANISM || 'CKM_ECDSA_SHA256' }}
      SIMPLE_LIVE_KMS_PAYLOAD: ${{ secrets.SIMPLE_LIVE_KMS_PAYLOAD || 'simple-live-kms-ci' }}
    steps:
      - uses: actions/checkout@v4
      - name: Build bootstrap runtime
        run: cargo build --manifest-path src/compiler_rust/Cargo.toml --profile bootstrap -p simple-driver
      - name: Require HSM live KMS credentials
        run: |
          missing=0
          for name in SIMPLE_LIVE_KMS_HSM_ENDPOINT SIMPLE_LIVE_KMS_HSM_SLOT SIMPLE_LIVE_KMS_HSM_KEY SIMPLE_LIVE_KMS_HSM_AUTHORIZATION; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is required for HSM live KMS"
              missing=1
            fi
          done
          exit "$missing"
      - name: Run HSM live KMS gate
        run: SIMPLE_LIB=src src/compiler_rust/target/bootstrap/simple test test/integration/lib/security/live_kms_transport_spec.spl --mode=interpreter
