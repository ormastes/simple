name: GUI Hardening Evidence

on:
  push:
    branches: [main]
    paths:
      - 'scripts/check/check-gui-hardening-open-gates.shs'
      - 'src/lib/gc_async_mut/gpu/browser_engine/script/event_loop.spl'
      - 'src/lib/gc_async_mut/gpu/browser_engine/script/timer_api.spl'
      - 'test/fixtures/browser/event_loop_set_timeout_standalone.spl'
      - 'src/app/wm_compare/**'
      - 'src/os/compositor/**'
      - 'tools/electron-shell/**'
      - 'test/fixtures/famous_site_corpus/**'
      - 'test/baselines/html_compat/**'
      - 'test/baselines/famous_site_corpus/**'
      - 'test/system/wm_compare/**'
      - '.github/workflows/gui-hardening-evidence.yml'
  pull_request:
    branches: [main]
    paths:
      - 'scripts/check/check-gui-hardening-open-gates.shs'
      - 'src/lib/gc_async_mut/gpu/browser_engine/script/event_loop.spl'
      - 'src/lib/gc_async_mut/gpu/browser_engine/script/timer_api.spl'
      - 'test/fixtures/browser/event_loop_set_timeout_standalone.spl'
      - 'src/app/wm_compare/**'
      - 'src/os/compositor/**'
      - 'tools/electron-shell/**'
      - 'test/fixtures/famous_site_corpus/**'
      - 'test/baselines/html_compat/**'
      - 'test/baselines/famous_site_corpus/**'
      - 'test/system/wm_compare/**'
      - '.github/workflows/gui-hardening-evidence.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-chrome-corpus:
    name: Linux Chrome/corpus gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install browser evidence dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libgtk-3-0 \
            libnss3 \
            libxss1

      - name: Run Chrome/corpus evidence
        run: |
          REQUIRE_BROWSER_CORPUS=1 \
          REPORT_PATH=doc/09_report/gui_hardening_open_gates_ci.md \
          BUILD_DIR=build/gui_hardening_open_gates_ci \
            sh scripts/check/check-gui-hardening-open-gates.shs

      - name: Upload GUI hardening evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gui-hardening-linux-evidence
          path: |
            doc/09_report/gui_hardening_open_gates_ci.md
            build/gui_hardening_open_gates_ci/**
