name: Simple Strict Lints

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/compiler/90.tools/lint/**'
      - 'src/compiler/90.tools/fix/rules/**'
      - 'src/compiler_rust/compiler/src/lint/**'
      - 'src/compiler_rust/lib/std/src/**'
      - 'test/code_quality/**'
      - '.github/workflows/simple-strict-lints.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'src/compiler/90.tools/lint/**'
      - 'src/compiler/90.tools/fix/rules/**'
      - 'src/compiler_rust/compiler/src/lint/**'
      - 'src/compiler_rust/lib/std/src/**'
      - 'test/code_quality/**'
      - '.github/workflows/simple-strict-lints.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  strict-simple-lints:
    name: Strict Simple Lints
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build bootstrap runtime
        run: |
          cargo build --manifest-path src/compiler_rust/Cargo.toml --profile bootstrap -p simple-driver

      - name: Verify bootstrap runtime
        run: |
          test -x src/compiler_rust/target/bootstrap/simple
          src/compiler_rust/target/bootstrap/simple --version

      - name: Targeted deny-all lint gate
        run: |
          src/compiler_rust/target/bootstrap/simple lint test/code_quality/allow_suppressions_spec.spl --deny-all
          src/compiler_rust/target/bootstrap/simple lint test/code_quality/bare_bool_lint_spec.spl --deny-all
          src/compiler_rust/target/bootstrap/simple lint test/code_quality/primitive_api_lint_spec.spl --deny-all
          src/compiler_rust/target/bootstrap/simple lint test/code_quality/warning_allow_root_cause_cleanup_spec.spl --deny-all
