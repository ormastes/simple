name: Rust Bootstrap Multiplatform

on:
  push:
    paths:
      - 'src/compiler_rust/**'
      - 'src/compiler/**'
      - 'src/app/cli/**'
      - 'src/lib/**'
      - 'src/runtime/**'
      - 'scripts/check/check-core-runtime-smoke.shs'
      - '.github/workflows/rust-bootstrap-multiplatform.yml'
  pull_request:
    paths:
      - 'src/compiler_rust/**'
      - 'src/compiler/**'
      - 'src/app/cli/**'
      - 'src/lib/**'
      - 'src/runtime/**'
      - 'scripts/check/check-core-runtime-smoke.shs'
      - '.github/workflows/rust-bootstrap-multiplatform.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Native builds — compile and test on each platform
  native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x86_64
          - os: macos-latest
            name: macOS aarch64
          - os: macos-13
            name: macOS x86_64
          - os: windows-latest
            name: Windows x86_64
    runs-on: ${{ matrix.os }}
    name: Native — ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Fix MSVC linker PATH
        if: runner.os == 'Windows'
        shell: bash
        run: |
          if [ -f /usr/bin/link ]; then
            mv /usr/bin/link /usr/bin/link.bak
          fi

      - uses: dtolnay/rust-toolchain@nightly

      - name: Install FreeType (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libfreetype6-dev

      - name: Install FreeType (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install freetype
          echo "RUSTFLAGS=-L native=$(brew --prefix freetype)/lib" >> "$GITHUB_ENV"

      - name: Install FreeType (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install freetype:x64-windows
          "RUSTFLAGS=-L native=$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/lib" >> $env:GITHUB_ENV
          "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin" >> $env:GITHUB_PATH

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/compiler_rust/target
          key: ${{ runner.os }}-${{ runner.arch }}-bootstrap-${{ hashFiles('src/compiler_rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-bootstrap-

      - name: Build
        working-directory: src/compiler_rust
        run: cargo build --profile bootstrap -p simple-driver

      - name: Build native_all library
        working-directory: src/compiler_rust
        run: cargo build --profile bootstrap -p simple-native-all --features driver-compat

      - name: Test
        working-directory: src/compiler_rust
        run: cargo test --workspace --lib

      - name: Build pure-Simple Stage 2
        shell: bash
        env:
          SIMPLE_BOOTSTRAP: "1"
          SIMPLE_PROJECT_ROOT: ${{ github.workspace }}
        run: |
          suffix=""
          if [ "$RUNNER_OS" = "Windows" ]; then
            suffix=".exe"
            export SIMPLE_LINKER_FLAVOR=msvc
          fi

          seed="src/compiler_rust/target/bootstrap/simple${suffix}"
          stage="build/bootstrap/simple_stage2${suffix}"
          test -x "$seed"
          mkdir -p build/bootstrap
          "$seed" native-build \
            --source-dir src \
            --entry-closure \
            --entry src/app/cli/bootstrap_main.spl \
            --output "$stage"
          test -x "$stage"
          echo "SIMPLE_STAGE=$stage" >> "$GITHUB_ENV"

      - name: Smoke pure-Simple Stage 2
        shell: bash
        run: sh scripts/check/check-core-runtime-smoke.shs "$SIMPLE_STAGE"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: bootstrap-${{ matrix.name }}-${{ github.sha }}
          path: |
            src/compiler_rust/target/bootstrap/simple*
          retention-days: 7

  # Cross-compilation builds from Linux x86_64
  cross:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            name: Linux aarch64
            pkg: gcc-aarch64-linux-gnu
          - target: riscv64gc-unknown-linux-gnu
            name: Linux riscv64
            pkg: gcc-riscv64-linux-gnu
          - target: x86_64-pc-windows-gnu
            name: Windows x86_64 (MinGW)
            pkg: gcc-mingw-w64-x86-64
    name: Cross — ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation toolchain
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.pkg }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/compiler_rust/target
          key: cross-${{ matrix.target }}-${{ hashFiles('src/compiler_rust/Cargo.lock') }}
          restore-keys: |
            cross-${{ matrix.target }}-

      - name: Build
        working-directory: src/compiler_rust
        run: cargo build --profile bootstrap -p simple-driver --target ${{ matrix.target }}

  # FreeBSD build (VM-based)
  freebsd:
    runs-on: ubuntu-latest
    name: Native — FreeBSD x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Build on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y curl bash freetype2
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain nightly
          run: |
            . "$HOME/.cargo/env"
            export RUSTFLAGS="-L native=/usr/local/lib"
            cd src/compiler_rust
            cargo build --profile bootstrap -p simple-driver
            cargo test --workspace --lib
