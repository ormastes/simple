name: Rust Bootstrap Multiplatform

on:
  push:
    paths:
      - 'src/compiler_rust/**'
      - 'src/compiler/**'
      - 'src/app/cli/**'
      - 'src/app/mcp/**'
      - 'src/app/simple_lsp_mcp/**'
      - 'src/lib/**'
      - 'src/runtime/**'
      - 'scripts/bootstrap/bootstrap-from-scratch.sh'
      - 'scripts/check/cert/redeploy_gate/candidate_frontend_admission.shs'
      - 'scripts/check/cert/redeploy_gate/fixtures/p2_add.spl'
      - 'scripts/check/check-bootstrap-portability.shs'
      - 'scripts/check/check-llvm-simd-row-native-arch.shs'
      - 'scripts/check/check-mcp-native-smoke.shs'
      - 'scripts/check/check-cranelift-aot-aggregate-cross.shs'
      - 'scripts/check/check-native-seed-parity.shs'
      - 'scripts/check/native-smoke-matrix.shs'
      - 'scripts/setup/platform-detect.shs'
      - 'test/fixtures/compiler/llvm_simd_row_native_probe.spl'
      - 'test/fixtures/native_crossmodule_result_u8/**'
      - '.github/workflows/rust-bootstrap-multiplatform.yml'
  pull_request:
    paths:
      - 'src/compiler_rust/**'
      - 'src/compiler/**'
      - 'src/app/cli/**'
      - 'src/app/mcp/**'
      - 'src/app/simple_lsp_mcp/**'
      - 'src/lib/**'
      - 'src/runtime/**'
      - 'scripts/bootstrap/bootstrap-from-scratch.sh'
      - 'scripts/check/cert/redeploy_gate/candidate_frontend_admission.shs'
      - 'scripts/check/cert/redeploy_gate/fixtures/p2_add.spl'
      - 'scripts/check/check-bootstrap-portability.shs'
      - 'scripts/check/check-llvm-simd-row-native-arch.shs'
      - 'scripts/check/check-mcp-native-smoke.shs'
      - 'scripts/check/check-cranelift-aot-aggregate-cross.shs'
      - 'scripts/check/check-native-seed-parity.shs'
      - 'scripts/check/native-smoke-matrix.shs'
      - 'scripts/setup/platform-detect.shs'
      - 'test/fixtures/compiler/llvm_simd_row_native_probe.spl'
      - 'test/fixtures/native_crossmodule_result_u8/**'
      - '.github/workflows/rust-bootstrap-multiplatform.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Native builds — compile and test on each platform
  native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: Linux x86_64
            backend: llvm
          - os: ubuntu-latest
            name: Linux x86_64
            backend: cranelift
          - os: macos-latest
            name: macOS aarch64
            backend: llvm
          - os: macos-latest
            name: macOS aarch64
            backend: cranelift
          - os: macos-15-intel
            name: macOS x86_64
            backend: llvm
          - os: macos-15-intel
            name: macOS x86_64
            backend: cranelift
          - os: windows-latest
            name: Windows x86_64
            backend: llvm
          - os: windows-latest
            name: Windows x86_64
            backend: cranelift
    runs-on: ${{ matrix.os }}
    name: Native — ${{ matrix.name }} (${{ matrix.backend }})
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Fix MSVC linker PATH
        if: runner.os == 'Windows'
        shell: bash
        run: |
          if [ -f /usr/bin/link ]; then
            mv /usr/bin/link /usr/bin/link.bak
          fi

      - uses: dtolnay/rust-toolchain@nightly

      - name: Install FreeType (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang-18 lld-18 llvm-18-dev libfreetype6-dev

      - name: Install FreeType (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install freetype ${{ matrix.backend == 'llvm' && 'llvm@18' || '' }}
          echo "RUSTFLAGS=-L native=$(brew --prefix freetype)/lib" >> "$GITHUB_ENV"
          if [ "${{ matrix.backend }}" = "llvm" ]; then
            llvm_prefix=$(brew --prefix llvm@18)
            echo "$llvm_prefix/bin" >> "$GITHUB_PATH"
            echo "LLVM_SYS_180_PREFIX=$llvm_prefix" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install freetype:x64-windows
          "RUSTFLAGS=-L native=$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/lib" >> $env:GITHUB_ENV
          "$env:VCPKG_INSTALLATION_ROOT/installed/x64-windows/bin" >> $env:GITHUB_PATH
          if ("${{ matrix.backend }}" -eq "llvm") {
            choco install llvm --version=18.1.8 -y --no-progress
            "LLVM_SYS_180_PREFIX=C:\Program Files\LLVM" >> $env:GITHUB_ENV
            "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH
          }

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/compiler_rust/target
          key: ${{ runner.os }}-${{ runner.arch }}-bootstrap-${{ hashFiles('src/compiler_rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-bootstrap-

      - name: Build seed and native_all library
        shell: bash
        working-directory: src/compiler_rust
        run: |
          if [ "${{ matrix.backend }}" = "llvm" ]; then
            cargo build --profile bootstrap -p simple-driver --features llvm
            cargo build --profile bootstrap -p simple-native-all --features driver-compat,llvm
          else
            cargo build --profile bootstrap -p simple-driver
            cargo build --profile bootstrap -p simple-native-all --features driver-compat
          fi

      - name: Test
        working-directory: src/compiler_rust
        run: cargo test --workspace --lib

      - name: Build and sanity-check pure-Simple stages
        shell: bash
        env:
          SIMPLE_PROJECT_ROOT: ${{ github.workspace }}
          SIMPLE_NO_STUB_FALLBACK: "1"
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            export SIMPLE_LINKER_FLAVOR=msvc
          fi
          if [ "$RUNNER_OS" = "Linux" ] && [ "${{ matrix.backend }}" = "llvm" ]; then
            mcp_flag=--full-cli
          else
            mcp_flag=--no-mcp
          fi
          sh scripts/bootstrap/bootstrap-from-scratch.sh \
            --backend=${{ matrix.backend }} \
            --mode=dynload \
            "$mcp_flag" \
            --jobs=2

      - name: Run strict staged native smoke matrix
        shell: bash
        run: |
          stage3="$(find build/bootstrap/stage3 -type f \( -name simple -o -name simple.exe \) -print -quit)"
          test -n "$stage3"
          chmod +x "$stage3"
          SIMPLE_RUNTIME_PATH="$PWD/src/compiler_rust/target/bootstrap" \
            SIMPLE_BINARY="$stage3" \
            NATIVE_SMOKE_BACKEND=${{ matrix.backend }} \
            NATIVE_SMOKE_WORK_DIR="build/check/native-smoke-${{ matrix.backend }}" \
            sh scripts/check/native-smoke-matrix.shs

      - name: Run Windows strict dynload parity
        if: runner.os == 'Windows' && matrix.backend == 'llvm'
        shell: bash
        run: |
          stage3="$(find build/bootstrap/stage3 -type f \( -name simple -o -name simple.exe \) -print -quit)"
          test -n "$stage3"
          chmod +x "$stage3"
          SIMPLE_BINARY="$stage3" \
            NATIVE_PARITY_CASES=dynload_tagged_text \
            NATIVE_PARITY_FAIL_ON_XFAIL=1 \
            PARITY_WORK_DIR="build/check/native-parity-${{ matrix.backend }}" \
            sh scripts/check/check-native-seed-parity.shs

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-${{ matrix.name }}-${{ matrix.backend }}-${{ github.sha }}
          path: |
            build/bootstrap/stage2/**/simple*
            build/bootstrap/stage3/**/simple*
          retention-days: 7

  native-architectures:
    name: Pure Simple — ARM32 LLVM object + x86_64/AArch64/RISC-V dual backend
    runs-on: ubuntu-latest
    needs: native
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux pure-Simple stages
        uses: actions/download-artifact@v4
        with:
          name: bootstrap-Linux x86_64-llvm-${{ github.sha }}
          path: build/bootstrap-linux

      - name: Install LLVM cross-execution toolchains
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-18 lld-18 llvm-18-dev libfreetype6-dev \
            binutils-arm-linux-gnueabihf \
            gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu \
            gcc-riscv64-linux-gnu binutils-riscv64-linux-gnu qemu-user

      - name: Run strict pure-Simple architecture gate
        run: |
          compiler="$PWD/build/bootstrap-linux/stage3/x86_64-unknown-linux-gnu/simple"
          chmod +x "$compiler"
          test -x "$compiler"
          SIMPLE_NO_STUB_FALLBACK=1 SIMPLE_BIN="$compiler" \
            BUILD_DIR=build/check/llvm-simd-row-native-arch \
            sh scripts/check/check-llvm-simd-row-native-arch.shs

      - name: Run strict pure-Simple Cranelift cross-execution gate
        run: |
          compiler="$PWD/build/bootstrap-linux/stage3/x86_64-unknown-linux-gnu/simple"
          chmod +x "$compiler"
          CRANELIFT_CROSS_EXECUTE=1 SIMPLE_NO_STUB_FALLBACK=1 SIMPLE_BIN="$compiler" \
            BUILD_DIR=build/check/cranelift-aot-aggregate-cross \
            sh scripts/check/check-cranelift-aot-aggregate-cross.shs

  # Cross-compilation builds from Linux x86_64
  cross:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-unknown-linux-gnu
            name: Linux aarch64
            pkg: gcc-aarch64-linux-gnu
          - target: riscv64gc-unknown-linux-gnu
            name: Linux riscv64
            pkg: gcc-riscv64-linux-gnu
          - target: x86_64-pc-windows-gnu
            name: Windows x86_64 (MinGW)
            pkg: gcc-mingw-w64-x86-64
    name: Cross — ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation toolchain
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.pkg }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/compiler_rust/target
          key: cross-${{ matrix.target }}-${{ hashFiles('src/compiler_rust/Cargo.lock') }}
          restore-keys: |
            cross-${{ matrix.target }}-

      - name: Build
        working-directory: src/compiler_rust
        run: cargo build --profile bootstrap -p simple-driver --target ${{ matrix.target }}

  # FreeBSD build (VM-based)
  freebsd:
    runs-on: ubuntu-latest
    name: Native — FreeBSD x86_64
    steps:
      - uses: actions/checkout@v4

      - name: Build on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y curl bash freetype2
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain nightly
          run: |
            . "$HOME/.cargo/env"
            export RUSTFLAGS="-L native=/usr/local/lib"
            cd src/compiler_rust
            cargo build --profile bootstrap -p simple-driver
            cargo test --workspace --lib
