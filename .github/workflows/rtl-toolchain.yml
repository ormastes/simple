name: RTL Toolchain

on:
  push:
    paths:
      - "src/lib/hardware/**"
      - "src/lib/nogc_sync_mut/hardware/**"
      - "src/compiler/50.mir/hwir/**"
      - "src/compiler/60.mir_opt/hwir_opt/**"
      - "src/compiler/70.backend/backend/vhdl/**"
      - "examples/09_embedded/fpga_riscv/rtl/**"
      - "scripts/rtl/**"
      - ".github/workflows/rtl-toolchain.yml"
  pull_request:
    paths:
      - "src/lib/hardware/**"
      - "src/lib/nogc_sync_mut/hardware/**"
      - "src/compiler/50.mir/hwir/**"
      - "src/compiler/60.mir_opt/hwir_opt/**"
      - "src/compiler/70.backend/backend/vhdl/**"
      - "examples/09_embedded/fpga_riscv/rtl/**"
      - "scripts/rtl/**"
      - ".github/workflows/rtl-toolchain.yml"

jobs:
  ghdl-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install GHDL
        run: sudo apt-get update && sudo apt-get install -y ghdl
      - name: Analyze RTL examples
        run: REQUIRE_TOOLS=1 sh scripts/rtl/check-ghdl-analysis.shs

  yosys-ghdl-synth:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Yosys and GHDL
        run: sudo apt-get update && sudo apt-get install -y ghdl yosys
      - name: Synthesis smoke
        run: sh scripts/rtl/check-yosys-ghdl-synth.shs

  nextpnr-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install nextpnr
        run: sudo apt-get update && sudo apt-get install -y nextpnr-ice40
      - name: nextpnr availability smoke
        run: REQUIRE_TOOLS=1 sh scripts/rtl/check-nextpnr-smoke.shs
