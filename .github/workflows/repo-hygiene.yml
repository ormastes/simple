name: Repo Hygiene Gate

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-hygiene:
    name: Repo Hygiene Regression Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Repo hygiene regression gate
        run: |
          sh scripts/check-repo-hygiene.shs

      # CPU-lane per-element-loop hot-path gate (design §6.1 / plan W2). This is
      # the authoritative, non-bypassable enforcement lane: jj bypasses the
      # pre-commit git hook, so CI is where the gate is guaranteed to run. The
      # gate hard-depends on ripgrep; ensure it is present on the runner.
      - name: CPU-lane hot-loop hot-path gate
        run: |
          command -v rg >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y ripgrep)
          sh scripts/check/check-cpu-hotloop-idiom.shs
