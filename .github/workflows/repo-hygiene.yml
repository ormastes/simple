name: Repo Hygiene Gate

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # File-type hygiene content gate (forbidden .py/.sh, secrets, naming, staged
  # root-guard). Kept in its own job: it is currently RED on pre-existing debt
  # (tracked .py/.sh files that predate this workflow), so it must not gate the
  # green idiom/structural ratchets below — a shared job would mask their
  # per-gate pass/fail signal. Fixing that debt is a separate task.
  repo-hygiene:
    name: Repo Hygiene Regression Gate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Path fix: the script moved scripts/ -> scripts/check/ in 2c8b2e6138
      # (Jun 4); the old dead path aborted this job at step 1, which also made
      # the hot-loop gate (now relocated to the code-idiom-gates job) unreachable.
      - name: Repo hygiene regression gate
        run: |
          sh scripts/check/check-repo-hygiene.shs

  # Idiom / structural ratchet gates. Every gate here self-passes green on the
  # current tree and ratchets: a NEW violation fails its step and this job. This
  # is the authoritative, non-bypassable enforcement lane — jj bypasses the
  # pre-commit git hook and build-lint routes the CLI lane to clippy, so CI is
  # the only place these gates are guaranteed to run.
  code-idiom-gates:
    name: Code Idiom & Structural Ratchet Gates
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Most gates below hard-depend on ripgrep; install once for the job.
      - name: Install ripgrep
        run: |
          command -v rg >/dev/null 2>&1 || (sudo apt-get update && sudo apt-get install -y ripgrep)

      # CPU-lane per-element-loop hot-path gate (design §6.1 / plan W2).
      # Relocated here from the repo-hygiene job so it actually runs (that job
      # aborted at its first step, leaving this gate dead). Command unchanged.
      - name: CPU-lane hot-loop hot-path gate
        run: |
          sh scripts/check/check-cpu-hotloop-idiom.shs

      # UI backend-isolation: apps/examples/UI-libs must call rendering facades,
      # never declare/call rt_* backend externs or construct backend classes.
      # Baseline-ratcheted (scripts/check/ui_backend_isolation_baseline.txt).
      - name: UI backend-isolation ratchet gate
        run: |
          sh scripts/check/check-ui-backend-isolation.shs

      # Standalone TUI import-closure: the generated TUI lane must route through
      # the narrow app.ui.tui.screen facade and must not pull web/tauri/electron
      # or a hosted runtime bundle into the standalone binary.
      - name: TUI standalone-closure gate
        run: |
          sh scripts/check/check-tui-standalone-closure.shs

      # Workspace root write guard: enforces the root-directory placement policy
      # / FILE.md manifests across the tree (git + POSIX sh only, no rg needed).
      - name: Workspace root write guard
        run: |
          sh scripts/check-workspace-root-guard.shs
