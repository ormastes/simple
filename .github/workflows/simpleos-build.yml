name: SimpleOS Build & QEMU Smoke

on:
  push:
    branches: [main, master]
    paths:
      - 'examples/09_embedded/simple_os/**'
      - 'src/compiler/**'
      - 'src/lib/**'
      - 'src/compiler_rust/**'
      - 'src/runtime/**'
      - 'src/os/**'
      - 'src/lib/nogc_async_mut_noalloc/**'
      - 'scripts/bootstrap/**'
      - 'scripts/check-simpleos-bootstrap-qemu.shs'
      - 'scripts/check/check-simpleos-wm-fullscreen-evidence.shs'
      - 'scripts/os_qemu_test.shs'
      - 'scripts/os/**'
      - 'assets/fonts/google-fonts/ofl/notosansmono/**'
      - '.github/workflows/simpleos-build.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'examples/09_embedded/simple_os/**'
      - 'src/compiler/**'
      - 'src/lib/**'
      - 'src/compiler_rust/**'
      - 'src/runtime/**'
      - 'src/os/**'
      - 'src/lib/nogc_async_mut_noalloc/**'
      - 'scripts/bootstrap/**'
      - 'scripts/check-simpleos-bootstrap-qemu.shs'
      - 'scripts/check/check-simpleos-wm-fullscreen-evidence.shs'
      - 'scripts/os_qemu_test.shs'
      - 'scripts/os/**'
      - 'assets/fonts/google-fonts/ofl/notosansmono/**'
      - '.github/workflows/simpleos-build.yml'
  schedule:
    # Nightly at 04:00 UTC
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Bootstrap mode'
        required: false
        default: 'smoke'
        type: choice
        options:
          - smoke
          - full

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Smoke job: every PR + push. ~10 min budget.
  # Mirrors check-simpleos-bootstrap-qemu.shs --smoke locally.
  # ---------------------------------------------------------------------------
  smoke:
    name: SimpleOS x86_64 QEMU Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            src/compiler_rust/target
            ~/.cargo/registry
            ~/.cargo/git
          key: simpleos-rust-bootstrap-${{ hashFiles('src/compiler_rust/Cargo.lock') }}
          restore-keys: |
            simpleos-rust-bootstrap-

      - name: Build and deploy pure-Simple CLI
        id: pure_simple_bootstrap
        timeout-minutes: 60
        run: |
          sh scripts/bootstrap/bootstrap-from-scratch.sh \
            --full-bootstrap --backend=cranelift --jobs=2 --deploy --no-mcp
          test -x bin/simple
          version="$(bin/simple --version 2>&1)"
          case "$(printf '%s\n' "$version" | tr '[:upper:]' '[:lower:]')" in
            *rust*seed*|*bootstrap*seed*|*rust-built*) exit 1 ;;
          esac

      - name: Upload pure-Simple bootstrap failure logs
        if: failure() && steps.pure_simple_bootstrap.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: simpleos-${{ github.job }}-pure-bootstrap-failure-${{ github.sha }}
          path: build/bootstrap/logs/**
          if-no-files-found: error
          retention-days: 7

      - name: Install SimpleOS evidence dependencies
        timeout-minutes: 10
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            qemu-system-x86 llvm mtools dosfstools ovmf grub-efi-amd64-bin
          qemu-system-x86_64 --version | head -n 1
          llvm-objcopy --version | head -n 1

      - name: SimpleOS bootstrap smoke (--smoke)
        timeout-minutes: 25
        run: sh scripts/check-simpleos-bootstrap-qemu.shs --smoke

      - name: SimpleOS WM font/input evidence
        timeout-minutes: 35
        env:
          SIMPLE_BIN: ${{ github.workspace }}/bin/simple
          BUILD_DIR: build/simpleos-wm-fullscreen-evidence
          REPORT_PATH: build/simpleos-wm-fullscreen-evidence/report.md
        run: sh scripts/check/check-simpleos-wm-fullscreen-evidence.shs

      - name: Upload SimpleOS WM font/input evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simpleos-wm-font-input-evidence
          path: |
            build/simpleos-wm-fullscreen-evidence/report.md
            build/simpleos-wm-fullscreen-evidence/*.ppm
            build/simpleos-wm-fullscreen-evidence/*.rgb
            build/simpleos-wm-fullscreen-evidence/serial.log
            build/simpleos-wm-fullscreen-evidence/qemu.out
          retention-days: 7
          if-no-files-found: warn

      - name: Upload kernel ELF (smoke)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: simpleos-x86_64-kernel-smoke
          path: build/os/simpleos_x86_64.elf
          retention-days: 7
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Full job: nightly cron + tag pushes + manual --full dispatch.
  # Runs --full bootstrap + multi-tier QEMU validation. ~30+ min budget.
  # Uploads kernel + disk image as release assets on tag pushes.
  # ---------------------------------------------------------------------------
  full:
    name: SimpleOS x86_64 Full Bootstrap
    runs-on: ubuntu-latest
    timeout-minutes: 150
    needs: smoke
    if: |
      github.event_name == 'schedule' ||
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'full')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            src/compiler_rust/target
            ~/.cargo/registry
            ~/.cargo/git
          key: simpleos-rust-bootstrap-${{ hashFiles('src/compiler_rust/Cargo.lock') }}
          restore-keys: |
            simpleos-rust-bootstrap-

      - name: Build and deploy pure-Simple CLI
        id: pure_simple_bootstrap
        timeout-minutes: 60
        run: |
          sh scripts/bootstrap/bootstrap-from-scratch.sh \
            --full-bootstrap --backend=cranelift --jobs=2 --deploy --no-mcp
          test -x bin/simple
          version="$(bin/simple --version 2>&1)"
          case "$(printf '%s\n' "$version" | tr '[:upper:]' '[:lower:]')" in
            *rust*seed*|*bootstrap*seed*|*rust-built*) exit 1 ;;
          esac

      - name: Upload pure-Simple bootstrap failure logs
        if: failure() && steps.pure_simple_bootstrap.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: simpleos-${{ github.job }}-pure-bootstrap-failure-${{ github.sha }}
          path: build/bootstrap/logs/**
          if-no-files-found: error
          retention-days: 7

      - name: Install SimpleOS evidence dependencies
        timeout-minutes: 10
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            qemu-system-x86 llvm mtools dosfstools ovmf grub-efi-amd64-bin

      - name: SimpleOS full bootstrap (--full)
        timeout-minutes: 60
        run: sh scripts/check-simpleos-bootstrap-qemu.shs --full

      - name: Upload SimpleOS kernel ELF
        uses: actions/upload-artifact@v4
        with:
          name: simpleos-x86_64-kernel
          path: build/os/simpleos_x86_64.elf
          retention-days: 30
          if-no-files-found: warn

      - name: Upload SimpleOS disk images
        uses: actions/upload-artifact@v4
        with:
          name: simpleos-x86_64-images
          path: |
            build/os/*.img.zst
            build/os/initramfs.img.zst
          retention-days: 30
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Summary
  # ---------------------------------------------------------------------------
  summary:
    name: SimpleOS Build Summary
    runs-on: ubuntu-latest
    needs: [smoke, full]
    if: always()

    steps:
      - name: Generate summary
        run: |
          {
            echo "# SimpleOS Build Results"
            echo ""
            echo "| Job | Result |"
            echo "|-----|--------|"
            echo "| Smoke (x86_64) | ${{ needs.smoke.result }} |"
            echo "| Full (x86_64)  | ${{ needs.full.result }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Gate critical failures
        run: |
          echo "Smoke result: ${{ needs.smoke.result }}"
          echo "Full  result: ${{ needs.full.result }}"
          test "${{ needs.smoke.result }}" = "success"
