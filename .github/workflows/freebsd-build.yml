name: FreeBSD Build & Test

on:
  push:
    branches: [main, master]
    paths:
      - 'src/compiler_rust/**'
      - '.github/workflows/freebsd-build.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'src/compiler_rust/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  freebsd-x86_64-rust-seed:
    name: FreeBSD x86_64 Rust Seed (Cranelift)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust with FreeBSD target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-freebsd

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            src/compiler_rust/target
            ~/.cargo/registry
            ~/.cargo/git
          key: freebsd-x86_64-rust-seed-${{ hashFiles('src/compiler_rust/Cargo.lock') }}
          restore-keys: |
            freebsd-x86_64-rust-seed-

      - name: Download FreeBSD sysroot
        run: |
          curl -L -o /tmp/freebsd-base.txz \
            https://archive.freebsd.org/old-releases/amd64/14.1-RELEASE/base.txz
          sudo mkdir -p /opt/sysroots/freebsd
          sudo tar xf /tmp/freebsd-base.txz -C /opt/sysroots/freebsd \
            ./usr/include ./usr/lib ./lib
          sudo chmod -R a+rX /opt/sysroots/freebsd

      - name: Install LLD linker
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lld clang

      - name: Configure Cargo for FreeBSD cross-compilation
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml <<'CARGO_EOF'
          [target.x86_64-unknown-freebsd]
          linker = "clang"
          rustflags = [
            "-C", "link-arg=--target=x86_64-unknown-freebsd14.1",
            "-C", "link-arg=--sysroot=/opt/sysroots/freebsd",
            "-C", "link-arg=-fuse-ld=lld",
          ]
          CARGO_EOF
          cat ~/.cargo/config.toml

      - name: Build Stage 1 Rust seed for FreeBSD (Cranelift only)
        run: |
          cd src/compiler_rust
          # Build without LLVM feature - Cranelift backend works for cross-compilation
          cargo build --profile bootstrap -p simple-driver \
            --target x86_64-unknown-freebsd
        env:
          # Tell cc crate to use clang with FreeBSD target/sysroot
          CC_x86_64_unknown_freebsd: clang
          # -Wno-error=implicit-function-declaration needed for lzma-sys cross-compilation
          CFLAGS_x86_64_unknown_freebsd: "--target=x86_64-unknown-freebsd14.1 --sysroot=/opt/sysroots/freebsd -Wno-error=implicit-function-declaration"

      - name: Verify binary
        run: |
          BINARY="src/compiler_rust/target/x86_64-unknown-freebsd/bootstrap/simple"
          file "$BINARY"
          ls -lh "$BINARY"
          # Should be ELF FreeBSD binary
          file "$BINARY" | grep -i "FreeBSD" && echo "Binary is FreeBSD ELF" || echo "Warning: binary may not be FreeBSD format"

      - name: Upload FreeBSD seed binary
        uses: actions/upload-artifact@v4
        with:
          name: simple-freebsd-x86_64-seed
          path: src/compiler_rust/target/x86_64-unknown-freebsd/bootstrap/simple
          retention-days: 30

  freebsd-vm-test:
    name: FreeBSD VM Smoke Test
    needs: freebsd-x86_64-rust-seed
    runs-on: ubuntu-latest
    # Only run on manual dispatch or main branch push (VM tests are slow)
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download FreeBSD seed
        uses: actions/download-artifact@v4
        with:
          name: simple-freebsd-x86_64-seed
          path: /tmp/freebsd-bin

      - name: Install QEMU
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq qemu-system-x86 qemu-utils

      - name: FreeBSD VM smoke test
        timeout-minutes: 15
        run: |
          echo "FreeBSD VM testing would run here"
          echo "Binary available at:"
          ls -lh /tmp/freebsd-bin/simple
          file /tmp/freebsd-bin/simple
          # Full VM testing requires a FreeBSD disk image
          # For CI, we verify the binary format is correct
          file /tmp/freebsd-bin/simple | grep -q "ELF" && echo "OK: Valid ELF binary"
