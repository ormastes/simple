name: FreeBSD Build & Test

on:
  push:
    branches: [main, master]
    paths:
      - 'src/compiler/**'
      - 'src/compiler_rust/**'
      - 'src/app/**'
      - 'src/lib/**'
      - 'src/runtime/**'
      - 'scripts/bootstrap/**'
      - 'scripts/check/check-freebsd-bootstrap-qemu.shs'
      - 'scripts/check/native-smoke-matrix.shs'
      - 'scripts/check/check-native-seed-parity.shs'
      - 'test/fixtures/compiler/native_option_try_*_loud.spl'
      - 'scripts/check/check-native-crossmodule-result-u8.shs'
      - 'test/fixtures/native_crossmodule_result_u8/**'
      - '.github/workflows/freebsd-build.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'src/compiler/**'
      - 'src/compiler_rust/**'
      - 'src/app/**'
      - 'src/lib/**'
      - 'src/runtime/**'
      - 'scripts/bootstrap/**'
      - 'scripts/check/check-freebsd-bootstrap-qemu.shs'
      - 'scripts/check/native-smoke-matrix.shs'
      - 'scripts/check/check-native-seed-parity.shs'
      - 'test/fixtures/compiler/native_option_try_*_loud.spl'
      - 'scripts/check/check-native-crossmodule-result-u8.shs'
      - 'test/fixtures/native_crossmodule_result_u8/**'
      - '.github/workflows/freebsd-build.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  native-freebsd-bootstrap:
    name: Native FreeBSD pure-Simple bootstrap
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install QEMU prerequisites
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            genisoimage openssh-client qemu-system-x86 qemu-utils rsync xz-utils
          mkdir -p "$HOME/.ssh"
          ssh-keygen -q -t ed25519 -N '' -f "$HOME/.ssh/id_ed25519"

      - name: Bootstrap and verify inside native FreeBSD
        timeout-minutes: 90
        run: sh scripts/check/check-freebsd-bootstrap-qemu.shs --full --download
