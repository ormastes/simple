name: Build Binaries (Linux + MinGW)

on:
  push:
    branches: [main]
    paths:
      - 'src/compiler_rust/**'
      - 'src/compiler/**'
      - 'src/app/**'
      - 'src/lib/**'
  pull_request:
    paths:
      - 'src/compiler_rust/**'
      - 'src/compiler/**'
      - 'src/app/**'
      - 'src/lib/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Job 1: Build Rust bootstrap seed ──────────────────────────────────
  build-seed:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux
            rust-target: ""
            pkg: ""
            binary: simple
            name: Linux x86_64
          - target: mingw
            rust-target: x86_64-pc-windows-gnu
            pkg: gcc-mingw-w64-x86-64
            binary: simple.exe
            name: Windows MinGW x86_64
    runs-on: ubuntu-latest
    name: Seed — ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.rust-target || 'x86_64-unknown-linux-gnu' }}

      - name: Install cross-compilation toolchain
        if: matrix.pkg != ''
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.pkg }}

      - name: Get rustc nightly date
        id: rustc-date
        run: |
          echo "date=$(rustc +nightly --version --verbose | sed -n 's/^commit-date: //p')" >> "$GITHUB_OUTPUT"

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/compiler_rust/target
          key: seed-${{ matrix.target }}-${{ steps.rustc-date.outputs.date }}-${{ hashFiles('src/compiler_rust/Cargo.lock') }}
          restore-keys: |
            seed-${{ matrix.target }}-${{ steps.rustc-date.outputs.date }}-

      - name: Build seed
        working-directory: src/compiler_rust
        run: |
          if [ -n "${{ matrix.rust-target }}" ]; then
            cargo build --profile bootstrap -p simple-driver --target ${{ matrix.rust-target }}
          else
            cargo build --profile bootstrap -p simple-driver
          fi

      - name: Build native_all library (Linux only)
        if: matrix.target == 'linux'
        working-directory: src/compiler_rust
        run: cargo build --profile bootstrap -p simple-native-all

      - name: Verify seed binary
        run: |
          if [ -n "${{ matrix.rust-target }}" ]; then
            SEED="src/compiler_rust/target/${{ matrix.rust-target }}/bootstrap/${{ matrix.binary }}"
          else
            SEED="src/compiler_rust/target/bootstrap/${{ matrix.binary }}"
          fi

          if [ ! -f "$SEED" ]; then
            echo "::error::Seed binary not found at $SEED"
            exit 1
          fi
          echo "Seed binary size: $(wc -c < "$SEED") bytes"
          file "$SEED"

          # Only run --version for native (Linux) seed
          if [ "${{ matrix.target }}" = "linux" ]; then
            "$SEED" --version
          fi

      - name: Stage seed binary for upload
        run: |
          mkdir -p staging
          if [ -n "${{ matrix.rust-target }}" ]; then
            cp "src/compiler_rust/target/${{ matrix.rust-target }}/bootstrap/${{ matrix.binary }}" staging/
          else
            cp "src/compiler_rust/target/bootstrap/${{ matrix.binary }}" staging/
          fi
          ls -lh staging/

      - name: Upload seed artifact
        uses: actions/upload-artifact@v4
        with:
          name: seed-${{ matrix.target }}-x86_64-${{ github.sha }}
          path: staging/${{ matrix.binary }}
          retention-days: 7

  # ── Job 2: Build self-hosted binary (Stage 2) ────────────────────────
  build-native:
    needs: build-seed
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux
            name: Linux x86_64
          - target: mingw
            name: Windows MinGW x86_64
    runs-on: ubuntu-latest
    name: Stage 2 — ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      # ── Linux Stage 2 ──
      - name: Download Linux seed
        if: matrix.target == 'linux'
        uses: actions/download-artifact@v4
        with:
          name: seed-linux-x86_64-${{ github.sha }}
          path: seed-download

      - name: Install build tools (Linux)
        if: matrix.target == 'linux'
        run: sudo apt-get update && sudo apt-get install -y clang lld

      - name: Restore native_all library
        if: matrix.target == 'linux'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/compiler_rust/target
          key: seed-linux-${{ hashFiles('src/compiler_rust/Cargo.lock') }}
          restore-keys: |
            seed-linux-

      - name: Build Stage 2 (Linux)
        if: matrix.target == 'linux'
        run: |
          SEED="seed-download/simple"
          chmod +x "$SEED"
          echo "Seed binary:"
          "$SEED" --version
          ls -lh "$SEED"

          mkdir -p bin
          echo "Building Stage 2 self-hosted binary..."
          RUST_LOG=error SIMPLE_BOOTSTRAP=1 \
            "$SEED" native-build \
            --source-dir src \
            --entry src/app/cli/bootstrap_main.spl \
            --output bin/simple_stage2 \
            2>&1

          if [ ! -f bin/simple_stage2 ]; then
            echo "::error::Stage 2 binary not produced"
            exit 1
          fi

          chmod +x bin/simple_stage2
          echo "Stage 2 binary built:"
          file bin/simple_stage2
          ls -lh bin/simple_stage2

      - name: Smoke test Stage 2 (Linux)
        if: matrix.target == 'linux'
        run: |
          echo "=== --version ==="
          ./bin/simple_stage2 --version

          echo "=== --help ==="
          ./bin/simple_stage2 --help || true

          echo "=== basic expression ==="
          ./bin/simple_stage2 -c "print 42" || echo "Note: -c flag may not be supported in bootstrap binary"

          echo "Stage 2 smoke tests passed"

      - name: Upload Stage 2 (Linux)
        if: matrix.target == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: binary-linux-x86_64-${{ github.sha }}
          path: bin/simple_stage2
          retention-days: 14

      # ── Windows MinGW Stage 2 (cross-compile from Linux) ──
      - name: Download Linux seed (for MinGW cross)
        if: matrix.target == 'mingw'
        uses: actions/download-artifact@v4
        with:
          name: seed-linux-x86_64-${{ github.sha }}
          path: seed-download

      - name: Install cross-build tools (MinGW)
        if: matrix.target == 'mingw'
        run: sudo apt-get update && sudo apt-get install -y clang lld gcc-mingw-w64-x86-64

      - name: Restore native_all library (MinGW)
        if: matrix.target == 'mingw'
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/compiler_rust/target
          key: seed-linux-${{ hashFiles('src/compiler_rust/Cargo.lock') }}
          restore-keys: |
            seed-linux-

      - name: Build Stage 2 (MinGW cross-compile)
        if: matrix.target == 'mingw'
        continue-on-error: true
        run: |
          SEED="seed-download/simple"
          chmod +x "$SEED"
          echo "Using Linux seed for cross-compilation:"
          "$SEED" --version

          mkdir -p bin
          echo "Attempting Stage 2 cross-compile for Windows MinGW..."

          # Cross-native-build may not be fully supported yet
          RUST_LOG=error SIMPLE_BOOTSTRAP=1 \
            "$SEED" native-build \
            --source-dir src \
            --entry src/app/cli/bootstrap_main.spl \
            --output bin/simple_stage2.exe \
            --target x86_64-pc-windows-gnu \
            2>&1 || true

          if [ -f bin/simple_stage2.exe ]; then
            echo "Stage 2 MinGW binary built:"
            file bin/simple_stage2.exe
            ls -lh bin/simple_stage2.exe
          else
            echo "Cross-compile Stage 2 not produced (expected — still maturing)"
            echo "Falling back to seed-only for Windows"
          fi

      - name: Check Stage 2 result (MinGW)
        if: matrix.target == 'mingw'
        id: mingw-stage2
        run: |
          if [ -f bin/simple_stage2.exe ]; then
            echo "produced=true" >> "$GITHUB_OUTPUT"
          else
            echo "produced=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Stage 2 (MinGW)
        if: matrix.target == 'mingw' && steps.mingw-stage2.outputs.produced == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: binary-windows-mingw-x86_64-${{ github.sha }}
          path: bin/simple_stage2.exe
          retention-days: 14

      # Upload seed as fallback if Stage 2 wasn't produced
      - name: Download MinGW seed (fallback)
        if: matrix.target == 'mingw' && steps.mingw-stage2.outputs.produced == 'false'
        uses: actions/download-artifact@v4
        with:
          name: seed-mingw-x86_64-${{ github.sha }}
          path: seed-mingw-download

      - name: Upload MinGW seed as fallback
        if: matrix.target == 'mingw' && steps.mingw-stage2.outputs.produced == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: binary-windows-mingw-x86_64-${{ github.sha }}
          path: seed-mingw-download/simple.exe
          if-no-files-found: warn
          retention-days: 14

  # ── Job 3: Smoke tests ───────────────────────────────────────────────
  smoke-test:
    needs: build-native
    runs-on: ubuntu-latest
    name: Smoke Test — Linux Stage 2

    steps:
      - uses: actions/checkout@v4

      - name: Download Stage 2 binary
        uses: actions/download-artifact@v4
        with:
          name: binary-linux-x86_64-${{ github.sha }}
          path: bin

      - name: Run smoke tests
        run: |
          chmod +x bin/simple_stage2
          BINARY="./bin/simple_stage2"
          PASS=0
          FAIL=0

          echo "=== Smoke Test Suite ==="
          echo ""

          # Test 1: --version
          echo -n "1. --version ... "
          if $BINARY --version; then
            echo "PASS"
            PASS=$((PASS + 1))
          else
            echo "FAIL"
            FAIL=$((FAIL + 1))
          fi

          # Test 2: --help
          echo -n "2. --help ... "
          if $BINARY --help > /dev/null 2>&1; then
            echo "PASS"
            PASS=$((PASS + 1))
          else
            echo "FAIL"
            FAIL=$((FAIL + 1))
          fi

          # Test 3: interpret a simple expression
          echo -n "3. print expression ... "
          if $BINARY -c "print 42" 2>/dev/null | grep -q "42"; then
            echo "PASS"
            PASS=$((PASS + 1))
          else
            echo "SKIP (bootstrap binary may not support -c)"
            # Don't count as failure — -c flag is optional in bootstrap
          fi

          # Test 4: interpret a .spl file
          echo -n "4. interpret .spl file ... "
          echo 'print "hello from CI"' > /tmp/smoke_test.spl
          if $BINARY /tmp/smoke_test.spl 2>/dev/null | grep -q "hello from CI"; then
            echo "PASS"
            PASS=$((PASS + 1))
          else
            echo "SKIP (file interpretation may differ in bootstrap)"
          fi

          echo ""
          echo "=== Results: $PASS passed, $FAIL failed ==="

          if [ "$FAIL" -gt 0 ]; then
            echo "::error::$FAIL smoke test(s) failed"
            exit 1
          fi
