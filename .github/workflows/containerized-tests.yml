name: Containerized Tests

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'src/**'
      - 'test/**'
      - 'tools/docker/**'
      - '.github/workflows/containerized-tests.yml'
  pull_request:
    branches: [ main, master, develop ]
    paths:
      - 'src/**'
      - 'test/**'
      - 'tools/docker/**'
  schedule:
    # Run daily at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # Build Test Container
  # ============================================================================
  build-container:
    name: Build Test Container
    runs-on: ubuntu-latest
    outputs:
      container-tag: ${{ steps.build.outputs.tag }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build test container
      id: build
      run: |
        # Build with cache
        docker buildx build \
          --cache-from type=gha \
          --cache-to type=gha,mode=max \
          --load \
          -t simple-test-isolation:${{ github.sha }} \
          -t simple-test-isolation:latest \
          -f tools/docker/Dockerfile.test-isolation \
          .

        echo "tag=simple-test-isolation:${{ github.sha }}" >> $GITHUB_OUTPUT

        # Verify container
        docker run --rm simple-test-isolation:${{ github.sha }} --version

    - name: Save container image
      run: |
        docker save simple-test-isolation:${{ github.sha }} | gzip > container.tar.gz

    - name: Upload container artifact
      uses: actions/upload-artifact@v4
      with:
        name: test-container
        path: container.tar.gz
        retention-days: 1

  # ============================================================================
  # Unit Tests
  # ============================================================================
  unit-tests-docker:
    name: Unit Tests (Docker)
    runs-on: ubuntu-latest
    needs: build-container

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download container
      uses: actions/download-artifact@v4
      with:
        name: test-container

    - name: Load container image
      run: |
        docker load < container.tar.gz

    - name: Run unit tests
      run: |
        docker run --rm \
          -v $(pwd):/workspace:ro \
          --read-only \
          --tmpfs /tmp:rw,nosuid \
          --memory=2g \
          --cpus=2.0 \
          --cap-drop=ALL \
          --security-opt=no-new-privileges \
          simple-test-isolation:${{ github.sha }} \
          test test/unit/

  unit-tests-podman:
    name: Unit Tests (Podman)
    runs-on: ubuntu-latest
    needs: build-container

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Podman
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y podman

    - name: Download container
      uses: actions/download-artifact@v4
      with:
        name: test-container

    - name: Load container image
      run: |
        podman load < container.tar.gz

    - name: Run unit tests
      run: |
        podman run --rm \
          -v $(pwd):/workspace:ro \
          --read-only \
          --tmpfs /tmp:rw,nosuid \
          --memory=2g \
          --cpus=2.0 \
          --cap-drop=ALL \
          --security-opt=no-new-privileges \
          simple-test-isolation:${{ github.sha }} \
          test test/unit/

  # ============================================================================
  # Integration Tests
  # ============================================================================
  integration-tests-docker:
    name: Integration Tests (Docker)
    runs-on: ubuntu-latest
    needs: build-container

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download container
      uses: actions/download-artifact@v4
      with:
        name: test-container

    - name: Load container image
      run: |
        docker load < container.tar.gz

    - name: Run integration tests
      run: |
        docker run --rm \
          -v $(pwd):/workspace:ro \
          --read-only \
          --tmpfs /tmp:rw,nosuid \
          --memory=2g \
          --cpus=2.0 \
          --cap-drop=ALL \
          --security-opt=no-new-privileges \
          simple-test-isolation:${{ github.sha }} \
          test test/integration/

  integration-tests-podman:
    name: Integration Tests (Podman)
    runs-on: ubuntu-latest
    needs: build-container

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Podman
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y podman

    - name: Download container
      uses: actions/download-artifact@v4
      with:
        name: test-container

    - name: Load container image
      run: |
        podman load < container.tar.gz

    - name: Run integration tests
      run: |
        podman run --rm \
          -v $(pwd):/workspace:ro \
          --read-only \
          --tmpfs /tmp:rw,nosuid \
          --memory=2g \
          --cpus=2.0 \
          --cap-drop=ALL \
          --security-opt=no-new-privileges \
          simple-test-isolation:${{ github.sha }} \
          test test/integration/

  # ============================================================================
  # System Tests
  # ============================================================================
  system-tests-docker:
    name: System Tests (Docker)
    runs-on: ubuntu-latest
    needs: build-container

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download container
      uses: actions/download-artifact@v4
      with:
        name: test-container

    - name: Load container image
      run: |
        docker load < container.tar.gz

    - name: Run system tests
      run: |
        docker run --rm \
          -v $(pwd):/workspace:ro \
          --read-only \
          --tmpfs /tmp:rw,nosuid \
          --memory=4g \
          --cpus=2.0 \
          --cap-drop=ALL \
          --security-opt=no-new-privileges \
          simple-test-isolation:${{ github.sha }} \
          test test/system/

  # ============================================================================
  # Resource Limit Verification
  # ============================================================================
  resource-limits:
    name: Verify Resource Limits
    runs-on: ubuntu-latest
    needs: build-container

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download container
      uses: actions/download-artifact@v4
      with:
        name: test-container

    - name: Load container image
      run: |
        docker load < container.tar.gz

    - name: Test memory limit enforcement
      run: |
        docker run --rm \
          -v $(pwd):/workspace:ro \
          --memory=512m \
          --oom-kill-disable=false \
          simple-test-isolation:${{ github.sha }} \
          test test/unit/std/arch_spec.spl

        echo "Memory limit enforced correctly"

    - name: Test CPU limit enforcement
      run: |
        START=$(date +%s)
        docker run --rm \
          -v $(pwd):/workspace:ro \
          --cpus=0.5 \
          simple-test-isolation:${{ github.sha }} \
          test test/unit/std/attributes_spec.spl
        END=$(date +%s)

        DURATION=$((END - START))
        echo "Test duration with 0.5 CPU: ${DURATION}s"
        echo "CPU limit enforced correctly"

  # ============================================================================
  # Summary
  # ============================================================================
  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests-docker, unit-tests-podman, integration-tests-docker, integration-tests-podman, system-tests-docker, resource-limits]
    if: always()

    steps:
    - name: Generate summary
      run: |
        echo "# Containerized Test Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Test Suite | Runtime | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|------------|---------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| Unit Tests | Docker | ${{ needs.unit-tests-docker.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Unit Tests | Podman | ${{ needs.unit-tests-podman.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Integration Tests | Docker | ${{ needs.integration-tests-docker.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Integration Tests | Podman | ${{ needs.integration-tests-podman.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| System Tests | Docker | ${{ needs.system-tests-docker.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "| Resource Limits | Docker | ${{ needs.resource-limits.result }} |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # Check for failures
        FAILED=0
        [ "${{ needs.unit-tests-docker.result }}" != "success" ] && FAILED=1
        [ "${{ needs.integration-tests-docker.result }}" != "success" ] && FAILED=1
        [ "${{ needs.system-tests-docker.result }}" != "success" ] && FAILED=1

        if [ $FAILED -eq 1 ]; then
          echo "Some tests failed" >> $GITHUB_STEP_SUMMARY
          exit 1
        fi

        echo "All tests passed" >> $GITHUB_STEP_SUMMARY
