# Codex CLI configuration for Simple Language project
# AGENTS.md is read natively — no fallback needed
# Add CLAUDE.md as fallback for shared project knowledge
project_doc_fallback_filenames = ["CLAUDE.md"]

# MCP Servers
#
# Register local wrapper-based MCP servers through setup/install scripts instead
# of project config. Codex resolves relative stdio launch paths from its own CWD,
# so project-local entries like `bin/codex_stitch_mcp.js` are brittle.
#
# Use one of:
#   sh scripts/setup.sh
#   sh config/mcp/install.shs
#
# Those scripts install absolute global Codex entries for:
#   - chrome-devtools
#   - stitch-mcp
#   - simple-mcp
#   - simple-lsp-mcp
