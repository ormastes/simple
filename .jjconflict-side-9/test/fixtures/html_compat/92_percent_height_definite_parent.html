<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>percent height definite parent</title>
<style>
html, body { margin: 0; padding: 0; }
.shell {
  width: 200px;
  height: 120px;
  padding: 10px;
  background: #eeeeee;
}
.child {
  width: 40px;
  height: 50%;
  background: #bfdbfe;
}
.after {
  width: 20px;
  height: 10px;
  background: #fed7aa;
}
</style>
</head>
<body>
<section class="shell" id="percent_height_shell" data-geom-label="percent_height_shell">
  <div class="child" id="percent_height_child" data-geom-label="percent_height_child"></div>
  <div class="after" id="percent_height_after" data-geom-label="percent_height_after"></div>
</section>
</body>
</html>
