name: Play Tests

on:
  push:
    branches: [ main ]
    paths:
      - 'src/lib/nogc_sync_mut/play/**'
      - 'src/app/play/**'
      - 'test/unit/lib/play/**'
      - '.github/workflows/play-tests.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/lib/nogc_sync_mut/play/**'
      - 'src/app/play/**'
      - 'test/unit/lib/play/**'
      - '.github/workflows/play-tests.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Play unit tests on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup xvfb (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb

      - name: Bootstrap Simple
        run: scripts/bootstrap/bootstrap-from-scratch.sh --deploy

      - name: Check play files
        run: |
          bin/simple check src/lib/nogc_sync_mut/play/types.spl
          bin/simple check src/lib/nogc_sync_mut/play/xvfb.spl
          bin/simple check src/lib/nogc_sync_mut/play/trace.spl
          bin/simple check src/lib/nogc_sync_mut/play/launcher.spl
          bin/simple check src/lib/nogc_sync_mut/play/cdp/client.spl
          bin/simple check src/lib/nogc_sync_mut/play/cdp/domains.spl
          bin/simple check src/lib/nogc_sync_mut/play/cdp/session.spl
          bin/simple check src/lib/nogc_sync_mut/play/keyboard.spl
          bin/simple check src/lib/nogc_sync_mut/play/mouse.spl
          bin/simple check src/lib/nogc_sync_mut/play/locator.spl
          bin/simple check src/lib/nogc_sync_mut/play/page.spl
          bin/simple check src/lib/nogc_sync_mut/play/electron_application.spl
          bin/simple check src/lib/nogc_sync_mut/play/expect.spl
          bin/simple check src/lib/nogc_sync_mut/play/mod.spl
          bin/simple check src/lib/nogc_sync_mut/play/sdl2_backend.spl
          bin/simple check src/lib/nogc_sync_mut/play/wm/mod.spl
          bin/simple check src/app/play/main.spl
          bin/simple check src/app/play/session_store.spl
          bin/simple check src/app/play/orchestrator.spl

      - name: Run play unit tests
        run: |
          bin/simple test test/unit/lib/play/types_spec.spl
          bin/simple test test/unit/lib/play/launcher_spec.spl
          bin/simple test test/unit/lib/play/expect_spec.spl
          bin/simple test test/unit/lib/play/xvfb_spec.spl
          bin/simple test test/unit/lib/play/session_store_spec.spl

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: play-test-results-${{ matrix.os }}
          path: doc/08_tracking/test/play/
