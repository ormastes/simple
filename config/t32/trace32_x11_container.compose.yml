services:
  trace32-stm:
    build:
      context: ../..
      dockerfile: config/t32/trace32_x11_container.Dockerfile
    image: simple-trace32-x11:latest
    working_dir: /workspace
    privileged: true
    ports:
      - "20000:20000"
    volumes:
      - ../..:/workspace
      - /opt/t32:/opt/t32:ro
      - /dev/lauterbach:/dev/lauterbach
      - /dev/bus/usb:/dev/bus/usb
    environment:
      T32_CONFIG: /workspace/config/t32/t32_stm_headless.t32
      HOME: /tmp
      XAPPLRESDIR: /opt/t32
    healthcheck:
      test: ["/opt/t32/bin/pc_linux64/t32rem", "localhost", "port=20000", "PING"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    restart: "no"
