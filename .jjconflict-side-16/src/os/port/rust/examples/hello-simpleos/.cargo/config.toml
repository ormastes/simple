# ---------------------------------------------------------------------------
# Offline / vendored-sources configuration for hello-simpleos
# ---------------------------------------------------------------------------
# SimpleOS has no fork/exec, so cargo cannot hit the network at build
# time. Populate ./vendor/ on the host with `cargo vendor` and commit
# the result. All builds must use `cargo build --offline`.
# ---------------------------------------------------------------------------

[source.crates-io]
replace-with = "vendored-sources"

[source.vendored-sources]
directory = "vendor"

[build]
target = "../../../../../toolchain/rust/x86_64-unknown-simpleos.json"

[unstable]
build-std = ["core", "alloc", "compiler_builtins"]
build-std-features = ["compiler-builtins-mem"]
