# FT4232H → Arduino UNO Q STM32U585 (Cortex-M33) via SWD
# Channel A (ADBUS0..7): SWCLK=ADBUS0, SWDIO=ADBUS2, nRESET=ADBUS4

adapter driver ftdi
ftdi vid_pid 0x0403 0x6011
ftdi channel 0

ftdi layout_init 0x0000 0x000b
ftdi layout_signal nSRST -data 0x0010 -oe 0x0010
ftdi layout_signal SWD_EN -data 0
ftdi layout_signal SWDIO_OE -data 0

adapter speed 1000

transport select swd
