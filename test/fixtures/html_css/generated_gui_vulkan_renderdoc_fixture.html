<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Simple Web Generated GUI HTML/CSS Vulkan Fixture</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      font-family: sans-serif;
    }
    main.app {
      display: flex;
      flex-direction: column;
      width: 760px;
      height: 560px;
      padding: 12px;
      border: 4px solid #0f172a;
      background-color: #e0f2fe;
      color: #111827;
      font-size: 16px;
    }
    header.bar {
      display: flex;
      gap: 8px;
      background-color: #1d4ed8;
      color: #ffffff;
      padding: 8px;
    }
    section.content {
      display: block;
      margin-top: 10px;
      background-color: #dcfce7;
      width: 300px;
      min-height: 44px;
    }
    fieldset.formbox {
      display: block;
      width: 280px;
      height: 76px;
      padding: 8px;
      border: 2px solid #334155;
      background-color: #f8fafc;
    }
    input, select, progress {
      display: block;
      width: 160px;
      height: 18px;
      margin-top: 4px;
      background-color: #fde68a;
      color: #111827;
    }
    .stage {
      display: block;
      width: 320px;
      height: 72px;
      overflow: hidden;
      background-color: #f1f5f9;
    }
    .tile {
      display: inline-block;
      width: 48px;
      height: 36px;
      margin: 4px;
      background-color: #c4b5fd;
      border: 2px solid #4c1d95;
    }
    .fallback {
      display: block;
      width: 220px;
      height: 24px;
      background-color: #fed7aa;
      color: #111827;
    }
    .widget-fixture-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
      margin-top: 10px;
      width: 724px;
    }
    .widget-fixture {
      display: block;
      min-width: 0;
      height: 22px;
      padding: 2px 4px;
      overflow: hidden;
      border: 1px solid #334155;
      background-color: #ffffff;
      color: #0f172a;
      font-size: 11px;
      line-height: 18px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .widget-panel, .widget-card, .widget-dialog, .widget-sheet-modal {
      background-color: #bfdbfe;
    }
    .widget-button, .widget-switch, .widget-segmented-control, .widget-selection-pill {
      background-color: #bbf7d0;
    }
    .widget-input, .widget-textfield, .widget-textarea, .widget-search-bar {
      background-color: #fde68a;
    }
    .widget-toast, .widget-tooltip, .widget-status-chip, .widget-empty-state {
      background-color: #fecaca;
    }
  </style>
</head>
<body>
  <main id="app" class="app">
    <header class="bar"><button>Run</button><span>Status</span></header>
    <section class="content">Ready</section>
    <form>
      <fieldset class="formbox">
        <legend>Prefs</legend>
        <label>Name<input value="Ada"></label>
        <select><option>One</option></select>
        <progress value="1" max="2"></progress>
      </fieldset>
    </form>
    <section class="stage">
      <canvas class="tile"></canvas>
      <picture><source srcset="x"><img class="tile" alt="image"></picture>
      <video class="tile"></video>
      <object class="tile"></object>
      <div class="fallback">media fallback</div>
    </section>
    <section class="widget-fixture-grid" aria-label="Widget fixture coverage">
      <div class="widget-fixture widget-panel" data-widget="panel">panel</div>
      <div class="widget-fixture widget-text" data-widget="text">text</div>
      <div class="widget-fixture widget-list" data-widget="list">list</div>
      <div class="widget-fixture widget-table" data-widget="table">table</div>
      <div class="widget-fixture widget-progress" data-widget="progress">progress</div>
      <div class="widget-fixture widget-menubar" data-widget="menubar">menubar</div>
      <div class="widget-fixture widget-statusbar" data-widget="statusbar">statusbar</div>
      <div class="widget-fixture widget-input" data-widget="input">input</div>
      <div class="widget-fixture widget-tabs" data-widget="tabs">tabs</div>
      <button class="widget-fixture widget-button" data-widget="button">button</button>
      <label class="widget-fixture widget-checkbox" data-widget="checkbox"><input type="checkbox" checked> checkbox</label>
      <label class="widget-fixture widget-radio" data-widget="radio"><input type="radio" checked> radio</label>
      <select class="widget-fixture widget-dropdown" data-widget="dropdown"><option>dropdown</option></select>
      <input class="widget-fixture widget-textfield" data-widget="textfield" value="textfield">
      <img class="widget-fixture widget-image" data-widget="image" alt="image">
      <div class="widget-fixture widget-divider" data-widget="divider">divider</div>
      <div class="widget-fixture widget-dialog" data-widget="dialog">dialog</div>
      <div class="widget-fixture widget-tooltip" data-widget="tooltip">tooltip</div>
      <div class="widget-fixture widget-tree" data-widget="tree">tree</div>
      <div class="widget-fixture tree-node" data-widget="treenode">treenode</div>
      <div class="widget-fixture widget-scroll" data-widget="scroll">scroll</div>
      <textarea class="widget-fixture widget-textarea" data-widget="textarea">textarea</textarea>
      <h2 class="widget-fixture widget-heading" data-widget="heading">heading</h2>
      <label class="widget-fixture widget-text" data-widget="label">label</label>
      <nav class="widget-fixture widget-navigation-bar" data-widget="navigation_bar">navigation</nav>
      <div class="widget-fixture widget-tab-bar" data-widget="tab_bar">tab bar</div>
      <div class="widget-fixture widget-card" data-widget="card">card</div>
      <button class="widget-fixture widget-switch" data-widget="switch">switch</button>
      <div class="widget-fixture widget-segmented-control" data-widget="segmented_control">segments</div>
      <input class="widget-fixture widget-search-bar" data-widget="search_bar" value="search">
      <div class="widget-fixture widget-glass-title-bar" data-widget="glass_title_bar">title bar</div>
      <aside class="widget-fixture widget-sidebar" data-widget="sidebar">sidebar</aside>
      <div class="widget-fixture widget-command-bar" data-widget="command_bar">command bar</div>
      <div class="widget-fixture widget-workspace-tabs" data-widget="workspace_tabs">workspace tabs</div>
      <div class="widget-fixture widget-command-palette" data-widget="command_palette">palette</div>
      <div class="widget-fixture widget-toast" data-widget="toast">toast</div>
      <div class="widget-fixture widget-sheet-modal" data-widget="sheet_modal">sheet modal</div>
      <menu class="widget-fixture widget-context-menu" data-widget="context_menu">context</menu>
      <aside class="widget-fixture widget-inspector" data-widget="inspector">inspector</aside>
      <nav class="widget-fixture widget-utility-rail" data-widget="utility_rail">rail</nav>
      <div class="widget-fixture widget-status-chip" data-widget="status_chip">status chip</div>
      <button class="widget-fixture widget-selection-pill" data-widget="selection_pill">selection</button>
      <div class="widget-fixture widget-empty-state" data-widget="empty_state">empty</div>
    </section>
  </main>
</body>
</html>
