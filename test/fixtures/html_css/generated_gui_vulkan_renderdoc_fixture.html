<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Simple Web Generated GUI HTML/CSS Vulkan Fixture</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      font-family: sans-serif;
    }
    main.app {
      display: flex;
      flex-direction: column;
      width: 360px;
      height: 220px;
      padding: 12px;
      border: 4px solid #0f172a;
      background-color: #e0f2fe;
      color: #111827;
      font-size: 16px;
    }
    header.bar {
      display: flex;
      gap: 8px;
      background-color: #1d4ed8;
      color: #ffffff;
      padding: 8px;
    }
    section.content {
      display: block;
      margin-top: 10px;
      background-color: #dcfce7;
      width: 300px;
      height: 64px;
    }
    fieldset.formbox {
      display: block;
      width: 280px;
      height: 76px;
      padding: 8px;
      border: 2px solid #334155;
      background-color: #f8fafc;
    }
    input, select, progress {
      display: block;
      width: 160px;
      height: 18px;
      margin-top: 4px;
      background-color: #fde68a;
      color: #111827;
    }
    .stage {
      display: block;
      width: 320px;
      height: 72px;
      overflow: hidden;
      background-color: #f1f5f9;
    }
    .tile {
      display: inline-block;
      width: 48px;
      height: 36px;
      margin: 4px;
      background-color: #c4b5fd;
      border: 2px solid #4c1d95;
    }
    .fallback {
      display: block;
      width: 220px;
      height: 24px;
      background-color: #fed7aa;
      color: #111827;
    }
  </style>
</head>
<body>
  <main id="app" class="app">
    <header class="bar"><button>Run</button><span>Status</span></header>
    <section class="content">Ready</section>
    <form>
      <fieldset class="formbox">
        <legend>Prefs</legend>
        <label>Name<input value="Ada"></label>
        <select><option>One</option></select>
        <progress value="1" max="2"></progress>
      </fieldset>
    </form>
    <section class="stage">
      <canvas class="tile"></canvas>
      <picture><source srcset="x"><img class="tile" alt="image"></picture>
      <video class="tile"></video>
      <object class="tile"></object>
      <div class="fallback">media fallback</div>
    </section>
  </main>
</body>
</html>
