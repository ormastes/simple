<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
html,body{margin:0;width:80px;height:50px;background:#fff1f2;}
body[data-state="final"] .one{height:20px;background:#fff1f2;}
body[data-state="final"] .two{height:16px;background:#fb7185;}
body[data-state="final"] .three{height:14px;background:#be123c;}
.one{width:80px;height:8px;background:#fff1f2;}
.two{width:80px;height:18px;background:#fb7185;}
.three{width:80px;height:24px;background:#be123c;}
</style>
</head>
<body data-state="final">
<div class="one"></div><div class="two"></div><div class="three"></div>
<script>document.addEventListener('DOMContentLoaded',function(){document.body.setAttribute('data-state','final');});</script>
</body>
</html>
