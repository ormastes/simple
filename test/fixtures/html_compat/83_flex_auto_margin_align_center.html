<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>flex auto margin align center</title>
<style>
html, body { margin: 0; padding: 0; }
.wrap {
  display: flex;
  width: 190px;
  height: 90px;
  padding: 10px;
  align-items: center;
  background: #eeeeee;
}
.a { width: 40px; height: 20px; background: #dd3333; }
.b { width: 40px; height: 50px; margin-left: auto; background: #33aa33; }
.c { width: 40px; height: 30px; margin-left: 10px; background: #3333dd; }
</style>
</head>
<body>
<div class="wrap" id="auto_margin_align_shell" data-geom-label="auto_margin_align_shell">
  <div class="a" id="auto_margin_align_a" data-geom-label="auto_margin_align_a"></div>
  <div class="b" id="auto_margin_align_b" data-geom-label="auto_margin_align_b"></div>
  <div class="c" id="auto_margin_align_c" data-geom-label="auto_margin_align_c"></div>
</div>
</body>
</html>
