<!doctype html>
<html>
<head><meta charset="utf-8"><title>box sizing border box</title></head>
<body style="margin:0; background-color:#ffffff;">
<section id="box_sizing_shell" data-geom-label="box_sizing_shell" style="margin:16px; padding:4px; width:220px; background-color:#e2e8f0;">
  <div id="box_sizing_content" data-geom-label="box_sizing_content" style="width:80px; height:20px; padding:10px; border:5px solid #2563eb; background-color:#bfdbfe;"></div>
  <div id="box_sizing_border" data-geom-label="box_sizing_border" style="margin-top:6px; box-sizing:border-box; width:80px; height:40px; padding:10px; border:5px solid #f97316; background-color:#fed7aa;"></div>
</section>
</body>
</html>
