<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>percent margin basic</title>
<style>
html, body { margin: 0; padding: 0; }
.shell {
  display: flex;
  width: 200px;
  height: 40px;
  background: #eeeeee;
}
.child {
  width: 40px;
  height: 20px;
  margin-left: 10%;
  margin-right: 5%;
  margin-top: 6px;
  background: #bfdbfe;
}
.after {
  width: 20px;
  height: 10px;
  background: #fed7aa;
}
</style>
</head>
<body>
<section class="shell" id="percent_margin_shell" data-geom-label="percent_margin_shell">
  <div class="child" id="percent_margin_child" data-geom-label="percent_margin_child"></div>
  <div class="after" id="percent_margin_after" data-geom-label="percent_margin_after"></div>
</section>
</body>
</html>
