<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>flex row cross auto margin align center</title>
<style>
html, body { margin: 0; padding: 0; }
.wrap {
  display: flex;
  width: 190px;
  height: 90px;
  padding: 10px;
  align-items: center;
  background: #eeeeee;
}
.a { width: 40px; height: 20px; background: #dd3333; }
.b { width: 40px; height: 50px; margin-top: auto; background: #33aa33; }
.c { width: 40px; height: 30px; margin-bottom: auto; background: #3333dd; }
</style>
</head>
<body>
<div class="wrap" id="row_cross_auto_margin_shell" data-geom-label="row_cross_auto_margin_shell">
  <div class="a" id="row_cross_auto_margin_a" data-geom-label="row_cross_auto_margin_a"></div>
  <div class="b" id="row_cross_auto_margin_b" data-geom-label="row_cross_auto_margin_b"></div>
  <div class="c" id="row_cross_auto_margin_c" data-geom-label="row_cross_auto_margin_c"></div>
</div>
</body>
</html>
