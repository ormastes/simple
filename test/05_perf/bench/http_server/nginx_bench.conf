# nginx benchmark config — equivalent to Simple async HTTP server bench
#
# Usage:
#   nginx -c $(pwd)/test/perf/bench/http_server/nginx_bench.conf
#
# This config mirrors the Simple server benchmark settings:
#   - Same worker count (auto = CPU count)
#   - Same keepalive timeout (65s)
#   - Same connection limit (10K per worker)
#   - Same static file root (/tmp/simple_bench_data)
#   - sendfile enabled
#   - TCP_NOPUSH + TCP_NODELAY

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 10000;
    use epoll;
    multi_accept on;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 10000;

    access_log off;
    error_log /tmp/nginx_bench_error.log warn;

    types {
        text/html  html;
        text/plain txt;
        application/octet-stream bin;
    }
    default_type application/octet-stream;

    server {
        listen 9091 reuseport;
        server_name localhost;
        root /tmp/simple_bench_data;

        location / {
            try_files $uri =404;
        }
    }
}

# PID file location
pid /tmp/nginx_bench.pid;
# Daemon mode off for easy Ctrl+C
daemon off;
