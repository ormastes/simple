# nginx HTTPS benchmark config
#
# Usage:
#   nginx -c $(pwd)/test/perf/bench/http_server/nginx_bench_https.conf
#
# Port 9443: HTTPS static files (direct nginx)
# Port 9444: HTTPS reverse proxy to Simple raw TCP server on port 9090

worker_processes 1;
worker_rlimit_nofile 65535;

events {
    worker_connections 10000;
    use epoll;
    multi_accept on;
}

http {
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 10000;

    access_log off;
    error_log /tmp/nginx_bench_https_error.log warn;

    types {
        text/html  html;
        text/plain txt;
        application/octet-stream bin;
    }
    default_type application/octet-stream;

    # HTTPS static file serving (nginx direct)
    server {
        listen 9443 ssl http2 reuseport;
        server_name localhost;
        root /tmp/simple_bench_data;

        ssl_certificate /tmp/simple_bench_data/cert.pem;
        ssl_certificate_key /tmp/simple_bench_data/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache shared:SSL:1m;
        ssl_session_tickets on;

        location / {
            try_files $uri =404;
        }
    }

    # HTTPS reverse proxy to Simple raw TCP server
    server {
        listen 9444 ssl reuseport;
        server_name localhost;

        ssl_certificate /tmp/simple_bench_data/cert.pem;
        ssl_certificate_key /tmp/simple_bench_data/key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache shared:SSL2:1m;
        ssl_session_tickets on;

        location / {
            proxy_pass http://127.0.0.1:9090;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}

pid /tmp/nginx_bench_https.pid;
daemon off;
