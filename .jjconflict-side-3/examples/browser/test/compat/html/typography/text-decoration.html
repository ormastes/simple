<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="typography">
<meta name="test-feature" content="text-decoration">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white; font-family: sans-serif; font-size: 20px; color: #333;">
<div style="padding: 20px;">
  <div style="text-decoration: none; margin-bottom: 15px;">No decoration</div>
  <div style="text-decoration: underline; margin-bottom: 15px;">Underlined text</div>
  <div style="text-decoration: overline; margin-bottom: 15px;">Overlined text</div>
  <div style="text-decoration: line-through; margin-bottom: 15px;">Strikethrough text</div>
  <div style="text-decoration: underline overline; margin-bottom: 15px;">Under and over</div>
  <div style="text-decoration: underline; text-decoration-color: red; margin-bottom: 15px;">Red underline</div>
  <div style="text-decoration: underline; text-decoration-style: wavy; text-decoration-color: #F44336; margin-bottom: 15px;">Wavy red underline</div>
</div>
</body>
</html>
