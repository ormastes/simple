<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>absolute percent height bottom</title>
<style>
html, body { margin: 0; padding: 0; }
.shell {
  position: relative;
  width: 200px;
  height: 120px;
  padding: 10px;
  border: 2px solid #334155;
  background: #eeeeee;
}
.child {
  position: absolute;
  left: 20px;
  bottom: 15px;
  width: 40px;
  height: 50%;
  background: #bfdbfe;
}
.after {
  width: 20px;
  height: 10px;
  background: #fed7aa;
}
</style>
</head>
<body>
<section class="shell" id="abs_percent_height_bottom_shell" data-geom-label="abs_percent_height_bottom_shell">
  <div class="child" id="abs_percent_height_bottom_child" data-geom-label="abs_percent_height_bottom_child"></div>
  <div class="after" id="abs_percent_height_bottom_after" data-geom-label="abs_percent_height_bottom_after"></div>
</section>
</body>
</html>
