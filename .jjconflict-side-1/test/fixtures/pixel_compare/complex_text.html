<!doctype html>
<meta charset="utf-8">
<style>
html, body {
  margin: 0;
  padding: 0;
  width: 320px;
  height: 240px;
  overflow: hidden;
  background: #ffffff;
}
h1 {
  margin: 8px;
  padding: 0;
  font-family: "Liberation Sans", Arial, sans-serif;
  font-size: 24px;
  line-height: 28px;
  color: #1a1a1a;
}
p {
  margin: 4px 8px;
  padding: 0;
  font-family: "Liberation Serif", "Times New Roman", serif;
  font-size: 14px;
  line-height: 18px;
  color: #333333;
}
.highlight {
  color: #2563eb;
  font-weight: bold;
}
.small {
  font-size: 10px;
  line-height: 12px;
  color: #666666;
}
</style>
<body>
<h1>Complex Text</h1>
<p>This is a <span class="highlight">paragraph</span> with mixed styles.</p>
<p class="small">Small text at 10px with different line height.</p>
<p>Another line of body text for comparison.</p>
</body>
</html>
