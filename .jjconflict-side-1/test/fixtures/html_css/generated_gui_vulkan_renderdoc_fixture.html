<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Simple Web Generated GUI HTML/CSS Vulkan Fixture</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      font-family: sans-serif;
    }
    main.app, main.app * {
      color: transparent !important;
      text-shadow: none !important;
    }
    main.app {
      display: flex;
      flex-direction: column;
      width: 760px;
      height: 560px;
      padding: 12px;
      border: 4px solid #0f172a;
      background-color: #e0f2fe;
      color: #111827;
      font-size: 16px;
    }
    header.bar {
      display: flex;
      gap: 8px;
      background-color: #1d4ed8;
      color: #ffffff;
      padding: 8px;
    }
    header.bar button {
      border-radius: 0;
    }
    section.content {
      display: block;
      margin-top: 10px;
      background-color: #dcfce7;
      width: 300px;
      min-height: 44px;
    }
    fieldset.formbox {
      display: block;
      width: 280px;
      height: 76px;
      padding: 8px;
      border: 2px solid #334155;
      background-color: #f8fafc;
    }
    input, select, progress {
      appearance: none;
      -webkit-appearance: none;
      display: block;
      width: 160px;
      height: 18px;
      margin-top: 4px;
      background-color: #fde68a;
      border: 0;
      border-radius: 0;
      color: transparent;
    }
    progress::-webkit-progress-bar {
      background-color: #fde68a;
    }
    progress::-webkit-progress-value {
      background-color: #fde68a;
    }
    .stage {
      display: block;
      width: 320px;
      height: 72px;
      overflow: hidden;
      background-color: #f1f5f9;
    }
    .tile {
      display: inline-block;
      width: 48px;
      height: 36px;
      margin: 4px;
      background-color: #c4b5fd;
      border: 2px solid #4c1d95;
    }
    .fallback {
      display: block;
      width: 220px;
      height: 24px;
      background-color: #fed7aa;
      color: #111827;
    }
    .widget-fixture-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 5px;
      margin-top: 10px;
      width: 724px;
    }
    .widget-fixture {
      display: block;
      min-width: 0;
      height: 22px;
      padding: 2px 4px;
      overflow: hidden;
      border: 1px solid #334155;
      background-color: #ffffff;
      color: #0f172a;
      font-size: 11px;
      line-height: 18px;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .widget-panel, .widget-card, .widget-dialog, .widget-sheet-modal {
      background-color: #bfdbfe;
    }
    .widget-button, .widget-switch, .widget-segmented-control, .widget-selection-pill {
      background-color: #bbf7d0;
    }
    .widget-input, .widget-textfield, .widget-textarea, .widget-search-bar {
      background-color: #fde68a;
    }
    .widget-toast, .widget-tooltip, .widget-status-chip, .widget-empty-state {
      background-color: #fecaca;
    }
    @keyframes rdoc-capture-pulse {
      from { transform: translateX(0); opacity: 0.68; }
      to { transform: translateX(18px); opacity: 1; }
    }
    #rdoc-frame-pulse {
      display: none;
      position: fixed;
      right: -1000px;
      bottom: -1000px;
      width: 32px;
      height: 32px;
      background-color: #2363eb;
    }
    #rdoc-webgl-pulse {
      display: none;
      position: fixed;
      right: -1000px;
      bottom: -1000px;
      width: 32px;
      height: 32px;
      background-color: #2363eb;
    }
  </style>
</head>
<body>
  <main id="app" class="app">
    <header class="bar"><button>Run</button><span>Status</span></header>
    <section class="content">Ready</section>
    <form>
      <fieldset class="formbox">
        <legend>Prefs</legend>
        <label>Name<input value="Ada"></label>
        <select><option>One</option></select>
        <progress value="1" max="2"></progress>
      </fieldset>
    </form>
    <section class="stage">
      <canvas class="tile"></canvas>
      <picture><source srcset="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw=="><img class="tile" alt="image" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw=="></picture>
      <video class="tile"></video>
      <object class="tile"></object>
      <div class="fallback">media fallback</div>
    </section>
    <section class="widget-fixture-grid" aria-label="Widget fixture coverage">
      <div class="widget-fixture widget-panel" data-widget="panel" data-render-feature="container-surface">panel</div>
      <div class="widget-fixture widget-text" data-widget="text" data-render-feature="text-run">text</div>
      <div class="widget-fixture widget-list" data-widget="list" data-render-feature="list-rows">list</div>
      <div class="widget-fixture widget-table" data-widget="table" data-render-feature="tabular-grid">table</div>
      <div class="widget-fixture widget-progress" data-widget="progress" data-render-feature="meter-fill">progress</div>
      <div class="widget-fixture widget-menubar" data-widget="menubar" data-render-feature="menu-actions">menubar</div>
      <div class="widget-fixture widget-statusbar" data-widget="statusbar" data-render-feature="status-line">statusbar</div>
      <div class="widget-fixture widget-input" data-widget="input" data-render-feature="form-input">input</div>
      <div class="widget-fixture widget-tabs" data-widget="tabs" data-render-feature="tab-selection">tabs</div>
      <button class="widget-fixture widget-button" data-widget="button" data-render-feature="command-action">button</button>
      <label class="widget-fixture widget-checkbox" data-widget="checkbox" data-render-feature="binary-choice"><input type="checkbox" checked> checkbox</label>
      <label class="widget-fixture widget-radio" data-widget="radio" data-render-feature="exclusive-choice"><input type="radio" checked> radio</label>
      <select class="widget-fixture widget-dropdown" data-widget="dropdown" data-render-feature="option-select"><option>dropdown</option></select>
      <input class="widget-fixture widget-textfield" data-widget="textfield" data-render-feature="single-line-edit" value="textfield">
      <img class="widget-fixture widget-image" data-widget="image" data-render-feature="media-image" alt="image" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==">
      <div class="widget-fixture widget-divider" data-widget="divider" data-render-feature="separator-line">divider</div>
      <div class="widget-fixture widget-dialog" data-widget="dialog" data-render-feature="modal-surface">dialog</div>
      <div class="widget-fixture widget-tooltip" data-widget="tooltip" data-render-feature="hover-help">tooltip</div>
      <div class="widget-fixture widget-tree" data-widget="tree" data-render-feature="hierarchy-root">tree</div>
      <div class="widget-fixture tree-node" data-widget="treenode" data-render-feature="hierarchy-node">treenode</div>
      <div class="widget-fixture widget-scroll" data-widget="scroll" data-render-feature="scroll-region">scroll</div>
      <textarea class="widget-fixture widget-textarea" data-widget="textarea" data-render-feature="multi-line-edit">textarea</textarea>
      <h2 class="widget-fixture widget-heading" data-widget="heading" data-render-feature="section-title">heading</h2>
      <label class="widget-fixture widget-text" data-widget="label" data-render-feature="field-label">label</label>
      <nav class="widget-fixture widget-navigation-bar" data-widget="navigation_bar" data-render-feature="primary-navigation">navigation</nav>
      <div class="widget-fixture widget-tab-bar" data-widget="tab_bar" data-render-feature="tab-navigation">tab bar</div>
      <div class="widget-fixture widget-card" data-widget="card" data-render-feature="content-card">card</div>
      <button class="widget-fixture widget-switch" data-widget="switch" data-render-feature="toggle-control">switch</button>
      <div class="widget-fixture widget-segmented-control" data-widget="segmented_control" data-render-feature="segmented-choice">segments</div>
      <input class="widget-fixture widget-search-bar" data-widget="search_bar" data-render-feature="search-input" value="search">
      <div class="widget-fixture widget-glass-title-bar" data-widget="glass_title_bar" data-render-feature="window-titlebar">title bar</div>
      <aside class="widget-fixture widget-sidebar" data-widget="sidebar" data-render-feature="side-navigation">sidebar</aside>
      <div class="widget-fixture widget-command-bar" data-widget="command_bar" data-render-feature="command-actions">command bar</div>
      <div class="widget-fixture widget-workspace-tabs" data-widget="workspace_tabs" data-render-feature="workspace-tab-strip">workspace tabs</div>
      <div class="widget-fixture widget-command-palette" data-widget="command_palette" data-render-feature="command-search">palette</div>
      <div class="widget-fixture widget-toast" data-widget="toast" data-render-feature="transient-message">toast</div>
      <div class="widget-fixture widget-sheet-modal" data-widget="sheet_modal" data-render-feature="sheet-modal">sheet modal</div>
      <menu class="widget-fixture widget-context-menu" data-widget="context_menu" data-render-feature="context-actions">context</menu>
      <aside class="widget-fixture widget-inspector" data-widget="inspector" data-render-feature="property-inspector">inspector</aside>
      <nav class="widget-fixture widget-utility-rail" data-widget="utility_rail" data-render-feature="utility-navigation">rail</nav>
      <div class="widget-fixture widget-status-chip" data-widget="status_chip" data-render-feature="status-indicator">status chip</div>
      <button class="widget-fixture widget-selection-pill" data-widget="selection_pill" data-render-feature="selection-token">selection</button>
      <div class="widget-fixture widget-empty-state" data-widget="empty_state" data-render-feature="empty-feedback">empty</div>
    </section>
  </main>
  <div id="rdoc-frame-pulse" aria-hidden="true"></div>
  <canvas id="rdoc-webgl-pulse" width="32" height="32" aria-hidden="true"></canvas>
  <script>
    (function () {
      var pulse = document.getElementById('rdoc-frame-pulse');
      var canvas = document.getElementById('rdoc-webgl-pulse');
      var gl = canvas ? (canvas.getContext('webgl2') || canvas.getContext('webgl')) : null;
      if (pulse) {
        pulse.style.setProperty('--rdoc-pulse-r', '35');
      }
      if (gl) {
        gl.viewport(0, 0, gl.drawingBufferWidth, gl.drawingBufferHeight);
        gl.clearColor(35 / 255, 99 / 255, 235 / 255, 1);
        gl.clear(gl.COLOR_BUFFER_BIT);
      }
    }());
  </script>
</body>
</html>
