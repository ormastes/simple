{{#layout "application"}}

<h1>Checkout</h1>

<div class="card">
    <h2>Total: ${{total_display}}</h2>
</div>

<form method="POST" action="/checkout/{{order_id}}" class="form">
    <input type="hidden" name="csrf_token" value="{{csrf_token}}">

    <div class="form-group">
        <label for="email">Email (for receipt)</label>
        <input type="email" id="email" name="email" placeholder="you@example.com">
    </div>

    <div class="form-group">
        <label for="card_number">Card Number</label>
        <input type="text" id="card_number" name="card_number" placeholder="4242424242424242" required>
        <span class="help-text">Mock: cards starting with 4 succeed</span>
    </div>

    <div class="form-group">
        <label for="card_expiry">Expiry (MM/YY)</label>
        <input type="text" id="card_expiry" name="card_expiry" placeholder="12/28">
    </div>

    <div class="form-group">
        <label for="card_cvc">CVC</label>
        <input type="text" id="card_cvc" name="card_cvc" placeholder="123">
    </div>

    <button type="submit" class="btn btn-primary">Pay Now</button>
</form>

{{/layout}}
