<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="box-model">
<meta name="test-feature" content="box-sizing-content">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<!-- content-box: width=200 means content is 200, total = 200 + 20 padding + 4 border = 224 -->
<div style="box-sizing: content-box; width: 200px; height: 60px; padding: 10px; border: 2px solid #333; margin: 15px; background: #FFCDD2;"></div>
<div style="box-sizing: content-box; width: 200px; height: 60px; padding: 20px; border: 5px solid #4CAF50; margin: 15px; background: #C8E6C9;"></div>
<!-- Reference: same width, no padding/border for size comparison -->
<div style="width: 200px; height: 60px; margin: 15px; background: #BBDEFB;"></div>
</body>
</html>
