<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="box-model">
<meta name="test-feature" content="overflow-scroll">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="width: 200px; height: 120px; overflow: auto; border: 2px solid #333; margin: 20px; background: #f5f5f5;">
  <div style="width: 100%; height: 40px; background: #F44336; margin-bottom: 5px;"></div>
  <div style="width: 100%; height: 40px; background: #4CAF50; margin-bottom: 5px;"></div>
  <div style="width: 100%; height: 40px; background: #2196F3; margin-bottom: 5px;"></div>
  <div style="width: 100%; height: 40px; background: #FF9800; margin-bottom: 5px;"></div>
  <div style="width: 100%; height: 40px; background: #9C27B0;"></div>
</div>
<div style="width: 200px; height: 100px; overflow: scroll; border: 2px solid #333; margin: 20px; background: #f5f5f5;">
  <div style="width: 500px; height: 300px; background: linear-gradient(135deg, #009688, #FF5722);"></div>
</div>
</body>
</html>
