<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="box-model">
<meta name="test-feature" content="border-radius-basic">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="display: flex; gap: 20px; padding: 20px; flex-wrap: wrap;">
  <div style="width: 100px; height: 100px; background: #F44336; border-radius: 0;"></div>
  <div style="width: 100px; height: 100px; background: #4CAF50; border-radius: 5px;"></div>
  <div style="width: 100px; height: 100px; background: #2196F3; border-radius: 10px;"></div>
  <div style="width: 100px; height: 100px; background: #FF9800; border-radius: 20px;"></div>
  <div style="width: 100px; height: 100px; background: #9C27B0; border-radius: 50%;"></div>
  <div style="width: 150px; height: 80px; background: #009688; border-radius: 50%;"></div>
</div>
</body>
</html>
