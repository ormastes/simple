<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="grid">
<meta name="test-feature" content="grid-auto-flow">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<!-- Auto-flow row (default) -->
<div style="display: grid; grid-template-columns: 80px 80px 80px; grid-auto-rows: 50px; grid-auto-flow: row; gap: 5px; padding: 15px; background: #E8EAF6; width: 280px; margin: 15px;">
  <div style="background: #F44336;"></div>
  <div style="background: #4CAF50;"></div>
  <div style="background: #2196F3;"></div>
  <div style="background: #FF9800;"></div>
  <div style="background: #9C27B0;"></div>
</div>
<!-- Auto-flow column -->
<div style="display: grid; grid-template-rows: 60px 60px 60px; grid-auto-columns: 80px; grid-auto-flow: column; gap: 5px; padding: 15px; background: #FFF3E0; height: 230px; margin: 15px;">
  <div style="background: #F44336;"></div>
  <div style="background: #4CAF50;"></div>
  <div style="background: #2196F3;"></div>
  <div style="background: #FF9800;"></div>
  <div style="background: #9C27B0;"></div>
</div>
</body>
</html>
