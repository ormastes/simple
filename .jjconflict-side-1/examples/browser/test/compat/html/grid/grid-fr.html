<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="grid">
<meta name="test-feature" content="grid-fr">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<!-- Equal fr units -->
<div style="display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 60px; gap: 5px; padding: 20px; background: #E8EAF6; width: 600px; margin: 15px;">
  <div style="background: #F44336;"></div>
  <div style="background: #4CAF50;"></div>
  <div style="background: #2196F3;"></div>
</div>
<!-- Proportional fr units: 1:2:3 -->
<div style="display: grid; grid-template-columns: 1fr 2fr 3fr; grid-template-rows: 60px; gap: 5px; padding: 20px; background: #FFF3E0; width: 600px; margin: 15px;">
  <div style="background: #F44336;"></div>
  <div style="background: #4CAF50;"></div>
  <div style="background: #2196F3;"></div>
</div>
<!-- Mixed: fixed + fr -->
<div style="display: grid; grid-template-columns: 100px 1fr 1fr; grid-template-rows: 60px; gap: 5px; padding: 20px; background: #E8F5E9; width: 600px; margin: 15px;">
  <div style="background: #F44336;"></div>
  <div style="background: #4CAF50;"></div>
  <div style="background: #2196F3;"></div>
</div>
</body>
</html>
