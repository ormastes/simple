<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="transform">
<meta name="test-feature" content="scale">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="display: flex; gap: 60px; padding: 60px; flex-wrap: wrap; align-items: center;">
  <div style="width: 60px; height: 60px; background: #F44336; transform: scale(0.5);"></div>
  <div style="width: 60px; height: 60px; background: #4CAF50; transform: scale(1.0);"></div>
  <div style="width: 60px; height: 60px; background: #2196F3; transform: scale(1.5);"></div>
  <div style="width: 60px; height: 60px; background: #FF9800; transform: scale(2.0);"></div>
  <!-- Non-uniform scale -->
  <div style="width: 60px; height: 60px; background: #9C27B0; transform: scale(2.0, 0.5);"></div>
</div>
</body>
</html>
