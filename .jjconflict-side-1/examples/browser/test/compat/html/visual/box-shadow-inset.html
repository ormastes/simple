<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="visual">
<meta name="test-feature" content="box-shadow-inset">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="padding: 40px; display: flex; gap: 40px; flex-wrap: wrap;">
  <div style="width: 150px; height: 100px; background: #f5f5f5; box-shadow: inset 0 2px 8px rgba(0,0,0,0.3);"></div>
  <div style="width: 150px; height: 100px; background: #f5f5f5; box-shadow: inset 4px 4px 10px rgba(0,0,0,0.2);"></div>
  <div style="width: 150px; height: 100px; background: #E8EAF6; box-shadow: inset 0 0 20px rgba(63,81,181,0.4);"></div>
  <!-- Both inset and outset -->
  <div style="width: 150px; height: 100px; background: white; box-shadow: inset 0 2px 5px rgba(0,0,0,0.2), 0 4px 10px rgba(0,0,0,0.15);"></div>
</div>
</body>
</html>
