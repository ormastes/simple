<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="visual">
<meta name="test-feature" content="gradient-linear">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="display: flex; flex-wrap: wrap; gap: 15px; padding: 20px;">
  <div style="width: 150px; height: 100px; background: linear-gradient(#F44336, #2196F3);"></div>
  <div style="width: 150px; height: 100px; background: linear-gradient(to right, #F44336, #FF9800, #FFEB3B);"></div>
  <div style="width: 150px; height: 100px; background: linear-gradient(to bottom right, #4CAF50, #2196F3);"></div>
  <div style="width: 150px; height: 100px; background: linear-gradient(#000, #fff);"></div>
  <div style="width: 150px; height: 100px; background: linear-gradient(red, orange, yellow, green, blue, indigo, violet);"></div>
</div>
</body>
</html>
