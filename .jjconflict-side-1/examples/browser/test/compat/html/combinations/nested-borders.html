<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="combinations">
<meta name="test-feature" content="nested-borders">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="padding: 20px;">
  <div style="border: 4px solid #F44336; border-radius: 20px; padding: 15px; width: 400px;">
    <div style="border: 3px solid #4CAF50; border-radius: 12px; padding: 15px;">
      <div style="border: 2px solid #2196F3; border-radius: 8px; padding: 15px;">
        <div style="border: 1px solid #FF9800; border-radius: 4px; padding: 15px;">
          <div style="width: 100%; height: 40px; background: #E8EAF6; border-radius: 4px;"></div>
        </div>
      </div>
    </div>
  </div>
  <!-- Different border styles nested -->
  <div style="border: 3px dashed #9C27B0; padding: 10px; margin-top: 20px; width: 300px;">
    <div style="border: 3px dotted #009688; padding: 10px;">
      <div style="border: 3px double #795548; padding: 10px;">
        <div style="width: 100%; height: 30px; background: #FFF3E0;"></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
