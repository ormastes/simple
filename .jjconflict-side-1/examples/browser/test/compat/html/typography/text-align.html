<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="typography">
<meta name="test-feature" content="text-align">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white; font-family: sans-serif; font-size: 16px; color: #333;">
<div style="width: 500px; padding: 20px;">
  <div style="text-align: left; background: #FFCDD2; padding: 10px; margin-bottom: 10px;">Left aligned text</div>
  <div style="text-align: center; background: #C8E6C9; padding: 10px; margin-bottom: 10px;">Center aligned text</div>
  <div style="text-align: right; background: #BBDEFB; padding: 10px; margin-bottom: 10px;">Right aligned text</div>
  <div style="text-align: justify; background: #FFF3E0; padding: 10px; margin-bottom: 10px;">
    Justified text spreads words evenly across the line. This sentence has enough words to demonstrate justification behavior when text wraps to multiple lines in the container.
  </div>
</div>
</body>
</html>
