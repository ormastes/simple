name: Core + MCP Dev Pipeline

on:
  push:
    branches: [main, master, develop]
    paths:
      - 'src/compiler/**'
      - 'src/lib/**'
      - 'src/runtime/**'
      - 'src/compiler_rust/compiler/src/codegen/**'
      - 'src/compiler_rust/parser/src/expressions/postfix.rs'
      - 'src/compiler_rust/compiler/src/interpreter_call/core/class_instantiation.rs'
      - 'src/compiler_rust/driver/**'
      - 'src/compiler_rust/runtime/**'
      - 'scripts/check/check-cranelift-aot-aggregates.shs'
      - 'scripts/check/check-cranelift-aot-aggregate-cross.shs'
      - 'test/fixtures/compiler/stage4_struct_enum_array_probe.spl'
      - 'test/fixtures/compiler/cranelift_array_oob.spl'
      - 'test/fixtures/compiler/native_runtime_local_name_collision.spl'
      - 'test/fixtures/compiler/native_runtime_local_name_collision_non_generic.spl'
      - 'test/fixtures/compiler/native_runtime_generic_call_origin_collision_repro.spl'
      - 'test/01_unit/lib/nogc_sync_mut/io/process_governor_standalone_crash_spec.spl'
      - 'test/01_unit/lib/gpu/engine2d/engine2d_color_simd_blend_parity_spec.spl'
      - 'test/01_unit/compiler/hir/statement_payload_types_source_spec.spl'
      - 'test/01_unit/compiler/frontend/interp_fragment_sticky_error_spec.spl'
      - 'test/01_unit/lib/core/list_constructor_hardening_spec.spl'
      - 'src/app/mcp/**'
      - 'src/app/simple_lsp_mcp/**'
      - 'tools/mcp-registry/**'
      - 'tools/lsp-mcp-registry/**'
      - 'scripts/deploy-marketplaces.shs'
      - '.github/workflows/core-mcp-dev-pipeline.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - 'src/compiler/**'
      - 'src/lib/**'
      - 'src/runtime/**'
      - 'src/compiler_rust/compiler/src/codegen/**'
      - 'src/compiler_rust/parser/src/expressions/postfix.rs'
      - 'src/compiler_rust/compiler/src/interpreter_call/core/class_instantiation.rs'
      - 'src/compiler_rust/driver/**'
      - 'src/compiler_rust/runtime/**'
      - 'scripts/check/check-cranelift-aot-aggregates.shs'
      - 'scripts/check/check-cranelift-aot-aggregate-cross.shs'
      - 'test/fixtures/compiler/stage4_struct_enum_array_probe.spl'
      - 'test/fixtures/compiler/cranelift_array_oob.spl'
      - 'test/fixtures/compiler/native_runtime_local_name_collision.spl'
      - 'test/fixtures/compiler/native_runtime_local_name_collision_non_generic.spl'
      - 'test/fixtures/compiler/native_runtime_generic_call_origin_collision_repro.spl'
      - 'test/01_unit/lib/nogc_sync_mut/io/process_governor_standalone_crash_spec.spl'
      - 'test/01_unit/lib/gpu/engine2d/engine2d_color_simd_blend_parity_spec.spl'
      - 'test/01_unit/compiler/hir/statement_payload_types_source_spec.spl'
      - 'test/01_unit/compiler/frontend/interp_fragment_sticky_error_spec.spl'
      - 'test/01_unit/lib/core/list_constructor_hardening_spec.spl'
      - 'src/app/mcp/**'
      - 'src/app/simple_lsp_mcp/**'
      - 'tools/mcp-registry/**'
      - 'tools/lsp-mcp-registry/**'
      - 'scripts/deploy-marketplaces.shs'
      - '.github/workflows/core-mcp-dev-pipeline.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core-mcp-guard:
    name: Core + MCP Guard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src/compiler_rust/target
          key: core-mcp-guard-${{ runner.os }}-${{ hashFiles('src/compiler_rust/Cargo.lock') }}
          restore-keys: |
            core-mcp-guard-${{ runner.os }}-

      - name: Build bootstrap runtime + native_all
        working-directory: src/compiler_rust
        run: |
          cargo build --profile bootstrap -p simple-driver
          cargo build --profile bootstrap -p simple-native-all --features driver-compat

      - name: Verify runtime exists
        run: |
          test -x src/compiler_rust/target/bootstrap/simple
          src/compiler_rust/target/bootstrap/simple --version

      - name: Core runtime smoke
        env:
          SIMPLE_BINARY: ${{ github.workspace }}/src/compiler_rust/target/bootstrap/simple
        run: |
          "$SIMPLE_BINARY" check src/compiler
          "$SIMPLE_BINARY" check src/lib

      - name: Focused library regressions
        env:
          SIMPLE_BINARY: ${{ github.workspace }}/src/compiler_rust/target/bootstrap/simple
        run: |
          mkdir -p build/tmp
          ln -sfn "$SIMPLE_BINARY" bin/simple
          SIMPLE_LIB=src "$SIMPLE_BINARY" test test/01_unit/lib/nogc_sync_mut/io/process_governor_standalone_crash_spec.spl --mode=interpreter
          SIMPLE_LIB=src "$SIMPLE_BINARY" test test/01_unit/lib/gpu/engine2d/engine2d_color_simd_blend_parity_spec.spl --mode=interpreter
          SIMPLE_LIB=src "$SIMPLE_BINARY" test test/01_unit/compiler/hir/statement_payload_types_source_spec.spl --mode=interpreter
          SIMPLE_LIB=src "$SIMPLE_BINARY" test test/01_unit/compiler/frontend/interp_fragment_sticky_error_spec.spl --mode=interpreter
          SIMPLE_LIB=src "$SIMPLE_BINARY" test test/01_unit/lib/core/list_constructor_hardening_spec.spl --mode=interpreter
          SIMPLE_LIB=src "$SIMPLE_BINARY" run src/compiler/10.frontend/core/interpreter/test_interp.spl >build/tmp/core-interpreter.actual
          grep -Fx 'Fail: 0' build/tmp/core-interpreter.actual
          grep -Fx 'ALL TESTS PASSED' build/tmp/core-interpreter.actual

      - name: Native MCP/LSP smoke
        env:
          SIMPLE_BINARY: ${{ github.workspace }}/src/compiler_rust/target/bootstrap/simple
        run: |
          "$SIMPLE_BINARY" check src/app/mcp
          "$SIMPLE_BINARY" check src/app/simple_lsp_mcp
          SIMPLE_LIB=src "$SIMPLE_BINARY" test test/integration/app/mcp_stdio_integration_spec.spl --mode=interpreter

      - name: Cranelift aggregate ABI
        env:
          SIMPLE_BIN: ${{ github.workspace }}/src/compiler_rust/target/bootstrap/simple
        run: |
          sh scripts/check/check-cranelift-aot-aggregates.shs
          sh scripts/check/check-cranelift-aot-aggregate-cross.shs
