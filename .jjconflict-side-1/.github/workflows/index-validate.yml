# Template: Registry Index Validation
# For the simple-lang/registry repo
# Validates index entries on PRs

name: Validate Index

on:
  pull_request:
    paths:
      - 'index/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Simple bootstrap
        run: |
          cargo build --manifest-path src/compiler_rust/Cargo.toml --profile bootstrap -p simple-driver
          sudo install -m 0755 src/compiler_rust/target/bootstrap/simple /usr/local/bin/simple

      - name: Validate changed index entries
        run: |
          # Get list of changed .sdn files
          changed=$(git diff --name-only origin/main...HEAD -- 'index/**/*.sdn')
          for file in $changed; do
            echo "Validating: $file"
            simple src/tools/validate_index_entry.spl "$file"
          done

      - name: Verify OCI references exist
        run: |
          changed=$(git diff --name-only origin/main...HEAD -- 'index/**/*.sdn')
          for file in $changed; do
            echo "Checking OCI refs in: $file"
            simple src/tools/verify_oci_refs.spl "$file"
          done

      - name: Check for duplicate versions
        run: |
          changed=$(git diff --name-only origin/main...HEAD -- 'index/**/*.sdn')
          for file in $changed; do
            simple src/tools/check_duplicates.spl "$file"
          done
