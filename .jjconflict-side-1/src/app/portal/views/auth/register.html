{{#layout "layouts/application"}}

<div class="auth-page">
    <div class="auth-card">
        <h1>Create Account</h1>
        <p class="auth-subtitle">Join the Simple language community.</p>

        {{#if error_message}}
        <div class="flash flash-error">{{error_message}}</div>
        {{/if}}

        <form action="/register" method="post" class="auth-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" value="{{username}}" required autofocus class="form-input" minlength="3" maxlength="40">
                <small class="form-hint">3-40 characters, letters and numbers</small>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{email}}" required class="form-input">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required class="form-input" minlength="8">
                <small class="form-hint">At least 8 characters</small>
            </div>

            <div class="form-group">
                <label for="password_confirm">Confirm Password</label>
                <input type="password" id="password_confirm" name="password_confirm" required class="form-input">
            </div>

            <button type="submit" class="btn btn-primary btn-block">Create Account</button>
        </form>

        <div class="auth-footer">
            <p>Already have an account? <a href="/login">Log in</a></p>
        </div>
    </div>
</div>

{{/layout}}
