<header class="site-header">
    <nav class="nav-bar container">
        <a href="/" class="nav-brand">Simple Portal</a>
        <div class="nav-links">
            <a href="/packages" class="nav-link">Packages</a>
            <a href="/docs" class="nav-link">Docs</a>
        </div>
        <div class="nav-search">
            <form action="/packages" method="get" class="search-form">
                <input type="text" name="q" placeholder="Search packages..." class="search-input" autocomplete="off" id="search-input">
                <button type="submit" class="search-btn">Search</button>
            </form>
        </div>
        <div class="nav-auth">
            {{#if current_user_id}}
            <a href="/dashboard" class="nav-link">Dashboard</a>
            <a href="/profile" class="nav-link">Profile</a>
            <form action="/logout" method="post" class="inline-form">
                <button type="submit" class="btn btn-text">Log Out</button>
            </form>
            {{else}}
            <a href="/login" class="nav-link">Log In</a>
            <a href="/register" class="btn btn-primary btn-sm">Sign Up</a>
            {{/if}}
        </div>
    </nav>
</header>
