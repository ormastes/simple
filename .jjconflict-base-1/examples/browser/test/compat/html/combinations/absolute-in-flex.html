<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="combinations">
<meta name="test-feature" content="absolute-in-flex">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="display: flex; gap: 10px; padding: 20px; position: relative; width: 600px; height: 200px; background: #E8EAF6;">
  <div style="width: 100px; height: 80px; background: #F44336;"></div>
  <div style="width: 100px; height: 80px; background: #4CAF50;"></div>
  <!-- Absolute positioned, taken out of flex flow -->
  <div style="position: absolute; top: 10px; right: 10px; width: 80px; height: 80px; background: #2196F3; opacity: 0.8;"></div>
  <div style="width: 100px; height: 80px; background: #FF9800;"></div>
  <!-- Absolute overlapping flex items -->
  <div style="position: absolute; bottom: 10px; left: 50%; width: 120px; height: 40px; background: rgba(156,39,176,0.7); margin-left: -60px;"></div>
</div>
</body>
</html>
