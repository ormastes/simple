<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
html,body{margin:0;width:80px;height:50px;background:#ecfeff;}
body[data-state="final"] .one{height:18px;background:#ecfeff;}
body[data-state="final"] .two{height:18px;background:#06b6d4;}
body[data-state="final"] .three{height:14px;background:#155e75;}
.one{width:80px;height:14px;background:#ecfeff;}
.two{width:80px;height:14px;background:#06b6d4;}
.three{width:80px;height:22px;background:#155e75;}
</style>
</head>
<body data-state="final">
<div class="one"></div><div class="two"></div><div class="three"></div>
<script>document.addEventListener('DOMContentLoaded',function(){document.body.setAttribute('data-state','final');});</script>
</body>
</html>
