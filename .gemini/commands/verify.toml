description = "Production readiness verification. Checks tests, implementation, requirements, NFR, and docs."
prompt = """
Run production readiness verification. Self-sufficient — any LLM can run independently.

Check scope: current changes (default), specific file, or --all for full project.

Phase 1: Scope Detection — identify spec files, source files, doc files in scope.

Phase 2: SPipe Tests — every it block has real assertions (not pass_todo, not expect(true).to_equal(true)).
Scenario-oriented generated docs under doc/06_spec/... must read as manuals,
with primary steps visible and executable SPipe folded by default. Shared
interface/manual helper names must match design/spec/manual references, and
placeholder helpers must fail explicitly with assert(false) or fail(...).
Broad lanes must complete the recorded lower-model sidecar plan or mark it N/A,
then pass normal/highest-capability review of generated-manual quality,
findings, coverage, exclusions, and done marks before PASS.
CUDA font production trust must satisfy the canonical artifact rule in
.codex/skills/system_test/SKILL.md before PASS.
Shared-font interpreter diagnostics must use `build_interpreter_result_wrapper`.
The fail and empty fixtures must each exit 1 with their distinct canonical
failure marker; reject 2/124/139 and retain commands, binary SHA-256, and logs.
Native evidence remains authoritative.

Phase 3: Implementation — no stub functions, no hardcoded returns, complete error handling.

Phase 4: Feature Requirements — every REQ-NNN traced to code + test.

Phase 5: NFR — performance benchmarks, security, reliability, observability.
Metal/Vulkan/8K claims require matching evidence: native Metal raw readback on
macOS, metal-requires-macos for Linux Metal, the GUI/web/2D Vulkan gate for
Vulkan, and a retained 8K row or explicit blocker in doc/09_report /
doc/10_metrics for 8K performance.
SimpleOS mission-critical release verification must run
`sh scripts/check/check-simpleos-mission-critical-release.shs`; matrix readiness
is not release completion while that gate reports blocked or failed, and PASS
requires `release_blockers=none`. If blocked, run
`sh scripts/check/check-simpleos-mission-critical-prereqs.shs` for the host
dependency list and `sh scripts/setup/setup-simpleos-formal-env.shs --print-install`
for setup commands. Treat `sidecar-contract-failed`, `missing-artifact`, and
`sby-run-failed` as release-failing RTL evidence problems, not missing-tool
blockers.

Phase 6: Architecture & Design Docs — doc/04_architecture/ and doc/05_design/ updated.
Every final verification must audit whether workflow/tooling, evidence-wrapper,
generated-spec-shape, or verification-contract changes refreshed matching
doc/07_guide, doc/06_spec, .codex/skills/, .agents/skills/, .claude/skills/,
.claude/agents/spipe/, and .gemini/commands/ instructions. Stale process docs
block PASS.
For simple_context or context-mode changes, verify the MCP/tooling guide,
generated manuals, and skill/command docs mention any new --sql/--db behavior,
--source-filter/MCP source_filter, file-optional SQL query shape, embedded
SQLite facade boundary, and explicit absence statuses. Run
scripts/check/check-llm-tooling-public-absence-rendering.shs.

Report: [PASS], [FAIL], [WARN] per item, summary table at end.
Must show STATUS: PASS before release.
Run `sh scripts/audit/direct-env-runtime-guard.shs --working` and
`sh scripts/audit/direct-env-runtime-guard.shs --staged`; app leaf and
src/lib/gc_async_mut env reads or process-run calls outside owner modules must
use env/process facades, not local rt_env_get, rt_process_run, or
rt_process_run_timeout.
Fail wrapper verification if a production MCP or LSP launcher executes raw source instead of a cached compiled artifact.
Audit hot request paths for repeated scans, repeated rereads, per-request subprocesses, and missing cache invalidation on writes.
Require startup and representative request perf evidence for performance-sensitive tooling changes.
"""
