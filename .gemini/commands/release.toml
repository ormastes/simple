description = "Version bump and release. Args: major/first, minor/second, patch/third (default), or exact X.Y.Z."
prompt = """
Perform a version bump and release.

Parse argument:
- Empty or patch/third: bump patch (Z+1)
- minor/second: bump minor (Y+1, reset Z)
- major/first: bump major (X+1, reset Y and Z)
- X.Y.Z pattern: set exact version

Steps:
1. Read current version from the root VERSION file
2. Calculate new version
3. Update all locations:
   - VERSION file
   - src/app/cli/main_part1.spl (hardcoded fallback in get_version())
   - src/app/cli/bootstrap_main.spl (hardcoded in bootstrap_version())
4. Update CHANGELOG.md with new section header
5. Commit with jj: `jj commit -m "chore: release vX.Y.Z"`
6. Tag: `git tag -a vX.Y.Z -m "Release vX.Y.Z"`
7. Ask before push — do NOT push without user approval. If approved, use jj
   linear sync with file-count safety:
   - `FILE_COUNT_BEFORE=$(git ls-files | wc -l | tr -d ' ')`
   - `jj git fetch`
   - `jj rebase -d main@origin`
   - `FILE_COUNT_AFTER=$(git ls-files | wc -l | tr -d ' ')`
   - `test "$FILE_COUNT_AFTER" -ge "$FILE_COUNT_BEFORE"`
   - `jj bookmark set main -r @-`
   - `env -u GITHUB_TOKEN -u GH_TOKEN jj git push --bookmark main`
   - `env -u GITHUB_TOKEN -u GH_TOKEN git push --tags`
   If HTTPS auth fails, do not print tokens or put them in remote URLs; run
   `env -u GITHUB_TOKEN -u GH_TOKEN gh auth setup-git` when the stored GitHub
   CLI credential should be used.

Prerequisite: /verify must show STATUS: PASS first. Release consumes verified
SPipe evidence; it must not create, rewrite, weaken, or accept SPipe/manual
quality or lower-model sidecar-review gaps after verify. If generated manuals,
sidecar review, or SPipe coverage are missing or stale, stop and return to
verify/implementation. Workflow/tooling/evidence/spec/verification contract docs
must already be fresh from verify; release must not repair stale doc/07_guide,
doc/06_spec, .codex/skills, .agents/skills, .claude/skills,
.claude/agents/spipe, or .gemini/commands instructions. Before release, confirm
`find doc/06_spec -name '*_spec.spl' | wc -l` returns `0`. For SimpleOS
mission-critical releases, also run
`sh scripts/check/check-simpleos-mission-critical-release.shs`; do not release
while it reports blocked or failed, and PASS requires `release_blockers=none`.
After bootstrap, `bin/simple test test --whole --mode=interpreter` must pass;
this release gate includes all specs/long tests, .spl comment doctests, and
configured Markdown code fences.
"""
