description = "Implement a feature end-to-end. Self-sufficient — if research/design missing, creates them first."
prompt = """
Implement the given feature. Self-sufficient — if prior artifacts missing, create them first.

Check what exists and skip completed phases:
- doc/01_research/local/<feature>.md → skip research
- doc/02_requirements/feature/<feature>.md → skip requirements
- doc/04_architecture/<feature>.md → skip architecture
- doc/05_design/<feature>.md → skip design

Phases:
1-3: Research + Requirements (skip if exist)
4-5: Plan + Design + Architecture (skip if exist)
6-7: System Test + Doc Consistency
8: Implementation in src/**/<feature>.spl
9-10: Unit + IT Tests (80%+ coverage) + Doctest
11-13: Bug Reports + Duplication Check + Refactoring
14: Full Test Suite (bin/simple test test --whole --mode=interpreter + bin/simple lint <changed .spl files>)
15: Run /verify + VCS Sync

All code in .spl — no Python, no Bash.
Stub Prevention: no pass_todo in final code.
Shared-font work follows $sp_dev “Shared multilingual font work”: preserve
FontRenderer, transient FontRenderBatch, WebIR, DrawIrComposition, and the
plan-defined frozen SSpec vocabulary; keep secondary detail steps folded.
For broad SPipe implementation lanes, complete the recorded lower-model sidecar
plan, such as Codex Spark, Claude Haiku, or Claude Sonnet, or mark it N/A, then
require normal/highest-capability review before claiming coverage,
generated-manual quality, done marks, or broad exclusions. Shared interface and
manual setup/checker placeholders must fail explicitly with assert(false) or
fail(...); silent helper passes are not valid coverage.
For scenario-oriented specs, run `bin/simple spipe-docgen <spec> --output doc/06_spec --no-index`,
read the result as a manual, and revise steps/captures/visibility until primary
flows are understandable without opening the source spec.
When implementation changes workflow/tooling, evidence wrappers, generated
specs, or verification contracts, update matching doc/07_guide, doc/06_spec,
.codex/skills/, .agents/skills/, .claude/skills/, .claude/agents/spipe/, and
.gemini/commands/ instructions before /verify.
For simple_context or context-mode changes, keep the MCP/tooling guide and
mirrored generated manuals current. SQL-backed context paths must document
--sql/--db/--source-filter, MCP source_filter, the file-optional sql=true plus
non-empty query contract, the embedded SQLite facade boundary, explicit absence
statuses, and the public-absence guard.
Production MCP or LSP wrappers must use cached compiled artifacts.
Avoid full-tree scans and per-request subprocesses in hot request handlers when a cache or index is viable.
If cached or indexed data depends on writable files, implement explicit invalidation on mutation paths.
Add perf smoke checks for startup and representative tool requests when touching performance-sensitive tooling.
"""
