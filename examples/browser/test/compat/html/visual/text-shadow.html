<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="visual">
<meta name="test-feature" content="text-shadow">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white; font-family: sans-serif;">
<div style="padding: 20px;">
  <div style="font-size: 32px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); margin-bottom: 20px; color: #333;">Subtle shadow</div>
  <div style="font-size: 32px; text-shadow: 3px 3px 0 #F44336; margin-bottom: 20px; color: #333;">Hard red shadow</div>
  <div style="font-size: 32px; text-shadow: 0 0 10px #2196F3; margin-bottom: 20px; color: #333;">Blue glow</div>
  <div style="font-size: 32px; text-shadow: 1px 1px 0 #F44336, 2px 2px 0 #4CAF50, 3px 3px 0 #2196F3; margin-bottom: 20px; color: #333;">Multi-shadow</div>
  <div style="font-size: 48px; text-shadow: 0 0 5px #fff, 0 0 10px #fff, 0 0 20px #FF9800, 0 0 30px #FF9800; color: #333; background: #222; padding: 10px;">Neon glow</div>
</div>
</body>
</html>
