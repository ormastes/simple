<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="visual">
<meta name="test-feature" content="filter-sepia">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="display: flex; gap: 15px; padding: 20px; flex-wrap: wrap;">
  <div style="width: 120px; height: 80px; background: linear-gradient(135deg, #4CAF50, #2196F3, #9C27B0); filter: sepia(0%);"></div>
  <div style="width: 120px; height: 80px; background: linear-gradient(135deg, #4CAF50, #2196F3, #9C27B0); filter: sepia(25%);"></div>
  <div style="width: 120px; height: 80px; background: linear-gradient(135deg, #4CAF50, #2196F3, #9C27B0); filter: sepia(50%);"></div>
  <div style="width: 120px; height: 80px; background: linear-gradient(135deg, #4CAF50, #2196F3, #9C27B0); filter: sepia(75%);"></div>
  <div style="width: 120px; height: 80px; background: linear-gradient(135deg, #4CAF50, #2196F3, #9C27B0); filter: sepia(100%);"></div>
</div>
</body>
</html>
