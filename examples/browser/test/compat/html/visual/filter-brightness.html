<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="visual">
<meta name="test-feature" content="filter-brightness">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="display: flex; gap: 15px; padding: 20px; flex-wrap: wrap;">
  <div style="width: 120px; height: 80px; background: #2196F3; filter: brightness(0.5);"></div>
  <div style="width: 120px; height: 80px; background: #2196F3; filter: brightness(0.75);"></div>
  <div style="width: 120px; height: 80px; background: #2196F3; filter: brightness(1.0);"></div>
  <div style="width: 120px; height: 80px; background: #2196F3; filter: brightness(1.5);"></div>
  <div style="width: 120px; height: 80px; background: #2196F3; filter: brightness(2.0);"></div>
</div>
</body>
</html>
