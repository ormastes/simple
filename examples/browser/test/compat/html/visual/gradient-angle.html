<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="visual">
<meta name="test-feature" content="gradient-angle">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="display: flex; flex-wrap: wrap; gap: 15px; padding: 20px;">
  <div style="width: 120px; height: 120px; background: linear-gradient(0deg, #F44336, #2196F3);"></div>
  <div style="width: 120px; height: 120px; background: linear-gradient(45deg, #F44336, #2196F3);"></div>
  <div style="width: 120px; height: 120px; background: linear-gradient(90deg, #F44336, #2196F3);"></div>
  <div style="width: 120px; height: 120px; background: linear-gradient(135deg, #F44336, #2196F3);"></div>
  <div style="width: 120px; height: 120px; background: linear-gradient(180deg, #F44336, #2196F3);"></div>
  <div style="width: 120px; height: 120px; background: linear-gradient(225deg, #F44336, #2196F3);"></div>
  <div style="width: 120px; height: 120px; background: linear-gradient(270deg, #F44336, #2196F3);"></div>
  <div style="width: 120px; height: 120px; background: linear-gradient(315deg, #F44336, #2196F3);"></div>
</div>
</body>
</html>
