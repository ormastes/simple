<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="visual">
<meta name="test-feature" content="opacity-range">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="display: flex; gap: 10px; padding: 20px; background: repeating-conic-gradient(#ddd 0% 25%, white 0% 50%) 0 0 / 20px 20px;">
  <div style="width: 80px; height: 80px; background: #F44336; opacity: 0.0;"></div>
  <div style="width: 80px; height: 80px; background: #F44336; opacity: 0.25;"></div>
  <div style="width: 80px; height: 80px; background: #F44336; opacity: 0.5;"></div>
  <div style="width: 80px; height: 80px; background: #F44336; opacity: 0.75;"></div>
  <div style="width: 80px; height: 80px; background: #F44336; opacity: 1.0;"></div>
</div>
</body>
</html>
