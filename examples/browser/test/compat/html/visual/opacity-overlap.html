<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="visual">
<meta name="test-feature" content="opacity-overlap">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="position: relative; width: 400px; height: 300px; margin: 20px;">
  <div style="position: absolute; top: 0; left: 0; width: 200px; height: 200px; background: #F44336; opacity: 0.5;"></div>
  <div style="position: absolute; top: 50px; left: 50px; width: 200px; height: 200px; background: #4CAF50; opacity: 0.5;"></div>
  <div style="position: absolute; top: 100px; left: 100px; width: 200px; height: 200px; background: #2196F3; opacity: 0.5;"></div>
</div>
</body>
</html>
