<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="visual">
<meta name="test-feature" content="filter-blur">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="display: flex; gap: 20px; padding: 20px; flex-wrap: wrap;">
  <div style="width: 120px; height: 80px; background: linear-gradient(135deg, #F44336, #2196F3); filter: blur(0);"></div>
  <div style="width: 120px; height: 80px; background: linear-gradient(135deg, #F44336, #2196F3); filter: blur(2px);"></div>
  <div style="width: 120px; height: 80px; background: linear-gradient(135deg, #F44336, #2196F3); filter: blur(5px);"></div>
  <div style="width: 120px; height: 80px; background: linear-gradient(135deg, #F44336, #2196F3); filter: blur(10px);"></div>
</div>
</body>
</html>
