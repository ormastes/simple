<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="box-model">
<meta name="test-feature" content="overflow-hidden">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="width: 200px; height: 100px; overflow: hidden; border: 2px solid #333; margin: 20px; background: #f5f5f5;">
  <div style="width: 400px; height: 300px; background: linear-gradient(135deg, #F44336, #2196F3);"></div>
</div>
<div style="width: 150px; height: 80px; overflow: hidden; border: 2px solid #333; margin: 20px; background: #f5f5f5; font-family: sans-serif; font-size: 14px;">
  This is a long text that overflows the container and should be clipped by overflow hidden. It keeps going and going.
</div>
</body>
</html>
