<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="box-model">
<meta name="test-feature" content="border-styles">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="width: 250px; height: 60px; border: 3px dotted #333; margin: 15px; background: #f5f5f5;"></div>
<div style="width: 250px; height: 60px; border: 3px dashed #F44336; margin: 15px; background: #f5f5f5;"></div>
<div style="width: 250px; height: 60px; border: 4px double #4CAF50; margin: 15px; background: #f5f5f5;"></div>
<div style="width: 250px; height: 60px; border: 3px groove #999; margin: 15px; background: #f5f5f5;"></div>
<div style="width: 250px; height: 60px; border: 3px ridge #999; margin: 15px; background: #f5f5f5;"></div>
</body>
</html>
