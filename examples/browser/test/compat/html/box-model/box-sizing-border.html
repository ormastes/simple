<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="box-model">
<meta name="test-feature" content="box-sizing-border">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<!-- border-box: width=200 includes padding+border, total stays 200 -->
<div style="box-sizing: border-box; width: 200px; height: 60px; padding: 10px; border: 2px solid #333; margin: 15px; background: #FFCDD2;"></div>
<div style="box-sizing: border-box; width: 200px; height: 60px; padding: 20px; border: 5px solid #4CAF50; margin: 15px; background: #C8E6C9;"></div>
<!-- Reference: same width, no padding/border — should be same total width as above -->
<div style="width: 200px; height: 60px; margin: 15px; background: #BBDEFB;"></div>
</body>
</html>
