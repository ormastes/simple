<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="flexbox">
<meta name="test-feature" content="flex-order">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white; font-family: sans-serif;">
<!-- Items reordered: visual order should be blue(1), red(2), green(3), orange(4) -->
<div style="display: flex; gap: 10px; padding: 20px; background: #E8EAF6; margin: 20px;">
  <div style="order: 2; width: 100px; height: 60px; background: #F44336; color: white; display: flex; align-items: center; justify-content: center;">A (o:2)</div>
  <div style="order: 4; width: 100px; height: 60px; background: #FF9800; color: white; display: flex; align-items: center; justify-content: center;">B (o:4)</div>
  <div style="order: 1; width: 100px; height: 60px; background: #2196F3; color: white; display: flex; align-items: center; justify-content: center;">C (o:1)</div>
  <div style="order: 3; width: 100px; height: 60px; background: #4CAF50; color: white; display: flex; align-items: center; justify-content: center;">D (o:3)</div>
</div>
<!-- Negative order -->
<div style="display: flex; gap: 10px; padding: 20px; background: #FFF3E0; margin: 20px;">
  <div style="order: 0; width: 100px; height: 60px; background: #F44336;"></div>
  <div style="order: -1; width: 100px; height: 60px; background: #4CAF50;"></div>
  <div style="order: 1; width: 100px; height: 60px; background: #2196F3;"></div>
</div>
</body>
</html>
