<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="flexbox">
<meta name="test-feature" content="flex-gap">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<!-- Row gap + column gap via shorthand -->
<div style="display: flex; flex-wrap: wrap; gap: 10px; width: 400px; padding: 10px; background: #E8EAF6; margin: 20px;">
  <div style="width: 100px; height: 60px; background: #F44336;"></div>
  <div style="width: 100px; height: 60px; background: #4CAF50;"></div>
  <div style="width: 100px; height: 60px; background: #2196F3;"></div>
  <div style="width: 100px; height: 60px; background: #FF9800;"></div>
</div>
<!-- Separate row-gap and column-gap -->
<div style="display: flex; flex-wrap: wrap; row-gap: 20px; column-gap: 5px; width: 400px; padding: 10px; background: #FFF3E0; margin: 20px;">
  <div style="width: 100px; height: 60px; background: #F44336;"></div>
  <div style="width: 100px; height: 60px; background: #4CAF50;"></div>
  <div style="width: 100px; height: 60px; background: #2196F3;"></div>
  <div style="width: 100px; height: 60px; background: #FF9800;"></div>
</div>
</body>
</html>
