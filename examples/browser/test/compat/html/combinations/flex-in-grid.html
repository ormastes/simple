<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="combinations">
<meta name="test-feature" content="flex-in-grid">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 20px; width: 600px;">
  <div style="display: flex; gap: 5px; background: #FFCDD2; padding: 10px;">
    <div style="width: 40px; height: 40px; background: #F44336;"></div>
    <div style="width: 40px; height: 40px; background: #E91E63;"></div>
    <div style="width: 40px; height: 40px; background: #9C27B0;"></div>
  </div>
  <div style="display: flex; flex-direction: column; gap: 5px; background: #C8E6C9; padding: 10px;">
    <div style="height: 30px; background: #4CAF50;"></div>
    <div style="height: 30px; background: #8BC34A;"></div>
  </div>
  <div style="display: flex; justify-content: space-between; background: #BBDEFB; padding: 10px;">
    <div style="width: 50px; height: 50px; background: #2196F3;"></div>
    <div style="width: 50px; height: 50px; background: #03A9F4;"></div>
  </div>
  <div style="display: flex; align-items: center; justify-content: center; background: #FFF3E0; padding: 10px; min-height: 80px;">
    <div style="width: 60px; height: 40px; background: #FF9800;"></div>
  </div>
</div>
</body>
</html>
