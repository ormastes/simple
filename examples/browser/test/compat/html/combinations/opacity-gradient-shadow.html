<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="combinations">
<meta name="test-feature" content="opacity-gradient-shadow">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="padding: 40px; display: flex; gap: 30px; flex-wrap: wrap;">
  <div style="width: 180px; height: 120px; background: linear-gradient(135deg, #F44336, #FF9800); box-shadow: 0 8px 20px rgba(244,67,54,0.4); border-radius: 12px; opacity: 0.9;"></div>
  <div style="width: 180px; height: 120px; background: linear-gradient(135deg, #4CAF50, #8BC34A); box-shadow: 0 8px 20px rgba(76,175,80,0.4); border-radius: 12px; opacity: 0.7;"></div>
  <div style="width: 180px; height: 120px; background: linear-gradient(135deg, #2196F3, #00BCD4); box-shadow: 0 8px 20px rgba(33,150,243,0.4); border-radius: 12px; opacity: 0.5;"></div>
  <div style="width: 180px; height: 120px; background: linear-gradient(135deg, #9C27B0, #E91E63); box-shadow: inset 0 0 15px rgba(0,0,0,0.3), 0 8px 20px rgba(156,39,176,0.4); border-radius: 12px; opacity: 0.8;"></div>
</div>
</body>
</html>
