<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="combinations">
<meta name="test-feature" content="stacking-contexts">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="position: relative; width: 500px; height: 400px; margin: 20px;">
  <!-- Context A: z-index 1, opacity creates stacking context -->
  <div style="position: absolute; top: 0; left: 0; z-index: 1; opacity: 0.95; width: 250px; height: 200px; background: rgba(244,67,54,0.2);">
    <div style="position: absolute; top: 10px; left: 10px; z-index: 100; width: 120px; height: 120px; background: #F44336;"></div>
  </div>
  <!-- Context B: z-index 2, transform creates stacking context -->
  <div style="position: absolute; top: 50px; left: 100px; z-index: 2; transform: translateZ(0); width: 250px; height: 200px; background: rgba(76,175,80,0.2);">
    <div style="position: absolute; top: 10px; left: 10px; z-index: 1; width: 120px; height: 120px; background: #4CAF50;"></div>
  </div>
  <!-- Context C: z-index 3 -->
  <div style="position: absolute; top: 100px; left: 200px; z-index: 3; width: 250px; height: 200px; background: rgba(33,150,243,0.2);">
    <div style="position: absolute; top: 10px; left: 10px; z-index: 1; width: 120px; height: 120px; background: #2196F3;"></div>
  </div>
</div>
</body>
</html>
