<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="combinations">
<meta name="test-feature" content="overflow-transform">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="padding: 30px; display: flex; gap: 30px;">
  <!-- Overflow hidden clips transformed child -->
  <div style="width: 150px; height: 150px; overflow: hidden; border: 2px solid #333; background: #f5f5f5;">
    <div style="width: 100px; height: 100px; background: #F44336; transform: rotate(30deg) translate(20px, 20px);"></div>
  </div>
  <!-- Overflow visible allows transform to escape -->
  <div style="width: 150px; height: 150px; overflow: visible; border: 2px solid #333; background: #f5f5f5;">
    <div style="width: 100px; height: 100px; background: #4CAF50; transform: rotate(30deg) translate(20px, 20px);"></div>
  </div>
  <!-- Scaled child clipped -->
  <div style="width: 150px; height: 150px; overflow: hidden; border: 2px solid #333; background: #f5f5f5;">
    <div style="width: 150px; height: 150px; background: linear-gradient(135deg, #2196F3, #FF9800); transform: scale(1.5);"></div>
  </div>
</div>
</body>
</html>
