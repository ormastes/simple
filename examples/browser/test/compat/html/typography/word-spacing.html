<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="typography">
<meta name="test-feature" content="word-spacing">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white; font-family: sans-serif; font-size: 16px; color: #333;">
<div style="padding: 20px; width: 500px;">
  <div style="word-spacing: normal; background: #E8EAF6; padding: 10px; margin-bottom: 10px;">Word spacing normal between words here</div>
  <div style="word-spacing: 5px; background: #C8E6C9; padding: 10px; margin-bottom: 10px;">Word spacing 5px between words here</div>
  <div style="word-spacing: 10px; background: #BBDEFB; padding: 10px; margin-bottom: 10px;">Word spacing 10px between words here</div>
  <div style="word-spacing: 20px; background: #FFF3E0; padding: 10px; margin-bottom: 10px;">Word spacing 20px between words here</div>
  <div style="word-spacing: -2px; background: #FFCDD2; padding: 10px;">Word spacing -2px between words here</div>
</div>
</body>
</html>
