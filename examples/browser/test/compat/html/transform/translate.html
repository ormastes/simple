<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="transform">
<meta name="test-feature" content="translate">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="padding: 20px;">
  <!-- Ghost showing original position -->
  <div style="width: 100px; height: 60px; background: #eee; border: 1px dashed #999; margin-bottom: -60px;"></div>
  <div style="width: 100px; height: 60px; background: #F44336; transform: translate(50px, 30px); margin-bottom: 40px;"></div>
  <div style="width: 100px; height: 60px; background: #eee; border: 1px dashed #999; margin-bottom: -60px;"></div>
  <div style="width: 100px; height: 60px; background: #4CAF50; transform: translate(100px, 0);  margin-bottom: 20px;"></div>
  <div style="width: 100px; height: 60px; background: #eee; border: 1px dashed #999; margin-bottom: -60px;"></div>
  <div style="width: 100px; height: 60px; background: #2196F3; transform: translate(-20px, 20px);"></div>
</div>
</body>
</html>
