<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="transform">
<meta name="test-feature" content="rotate">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="display: flex; gap: 40px; padding: 40px; flex-wrap: wrap; align-items: center;">
  <div style="width: 80px; height: 80px; background: #F44336; transform: rotate(0deg);"></div>
  <div style="width: 80px; height: 80px; background: #4CAF50; transform: rotate(15deg);"></div>
  <div style="width: 80px; height: 80px; background: #2196F3; transform: rotate(45deg);"></div>
  <div style="width: 80px; height: 80px; background: #FF9800; transform: rotate(90deg);"></div>
  <div style="width: 80px; height: 80px; background: #9C27B0; transform: rotate(180deg);"></div>
  <div style="width: 80px; height: 80px; background: #009688; transform: rotate(-30deg);"></div>
</div>
</body>
</html>
