<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="transform">
<meta name="test-feature" content="skew">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="display: flex; gap: 40px; padding: 40px; flex-wrap: wrap; align-items: center;">
  <div style="width: 100px; height: 60px; background: #F44336; transform: skew(0deg);"></div>
  <div style="width: 100px; height: 60px; background: #4CAF50; transform: skew(10deg, 0deg);"></div>
  <div style="width: 100px; height: 60px; background: #2196F3; transform: skew(0deg, 10deg);"></div>
  <div style="width: 100px; height: 60px; background: #FF9800; transform: skew(10deg, 5deg);"></div>
  <div style="width: 100px; height: 60px; background: #9C27B0; transform: skew(-15deg, 0deg);"></div>
</div>
</body>
</html>
