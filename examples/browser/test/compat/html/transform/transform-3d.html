<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="transform">
<meta name="test-feature" content="transform-3d">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="display: flex; gap: 50px; padding: 50px; flex-wrap: wrap;">
  <div style="perspective: 500px;">
    <div style="width: 100px; height: 100px; background: #F44336; transform: rotateY(0deg);"></div>
  </div>
  <div style="perspective: 500px;">
    <div style="width: 100px; height: 100px; background: #4CAF50; transform: rotateY(30deg);"></div>
  </div>
  <div style="perspective: 500px;">
    <div style="width: 100px; height: 100px; background: #2196F3; transform: rotateY(60deg);"></div>
  </div>
  <div style="perspective: 500px;">
    <div style="width: 100px; height: 100px; background: #FF9800; transform: rotateX(30deg);"></div>
  </div>
  <div style="perspective: 300px;">
    <div style="width: 100px; height: 100px; background: #9C27B0; transform: rotateX(20deg) rotateY(20deg);"></div>
  </div>
</div>
</body>
</html>
