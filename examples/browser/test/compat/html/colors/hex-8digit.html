<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="colors">
<meta name="test-feature" content="hex-8digit">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<!-- Checkerboard background to show alpha -->
<div style="background: repeating-conic-gradient(#ddd 0% 25%, white 0% 50%) 0 0 / 20px 20px; padding: 10px;">
  <div style="display: flex; flex-wrap: wrap; gap: 5px;">
    <div style="width: 80px; height: 80px; background: #FF0000FF;"></div>
    <div style="width: 80px; height: 80px; background: #FF0000CC;"></div>
    <div style="width: 80px; height: 80px; background: #FF000099;"></div>
    <div style="width: 80px; height: 80px; background: #FF000066;"></div>
    <div style="width: 80px; height: 80px; background: #FF000033;"></div>
    <div style="width: 80px; height: 80px; background: #0000FFCC;"></div>
    <div style="width: 80px; height: 80px; background: #00FF0099;"></div>
    <div style="width: 80px; height: 80px; background: #FFFF0066;"></div>
  </div>
</div>
</body>
</html>
