<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="colors">
<meta name="test-feature" content="transparent">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="background: repeating-conic-gradient(#ddd 0% 25%, white 0% 50%) 0 0 / 20px 20px; padding: 20px;">
  <!-- transparent background — checkerboard shows through -->
  <div style="width: 200px; height: 80px; background: transparent; border: 3px solid #333; margin-bottom: 15px;"></div>
  <!-- transparent border — background visible but no border color -->
  <div style="width: 200px; height: 80px; background: #F44336; border: 10px solid transparent; margin-bottom: 15px;"></div>
  <!-- transparent color text (invisible text) -->
  <div style="width: 200px; height: 80px; background: #E8EAF6; color: transparent; font-family: sans-serif; font-size: 24px; padding: 20px;">Hidden text</div>
</div>
</body>
</html>
