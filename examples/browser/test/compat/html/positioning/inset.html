<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="positioning">
<meta name="test-feature" content="inset">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="position: relative; width: 400px; height: 300px; background: #E8EAF6; margin: 20px;">
  <!-- top + left -->
  <div style="position: absolute; top: 10px; left: 10px; width: 80px; height: 40px; background: #F44336;"></div>
  <!-- top + right -->
  <div style="position: absolute; top: 10px; right: 10px; width: 80px; height: 40px; background: #4CAF50;"></div>
  <!-- bottom + left + right (stretches horizontally) -->
  <div style="position: absolute; bottom: 10px; left: 10px; right: 10px; height: 40px; background: #2196F3;"></div>
  <!-- top + bottom + left (stretches vertically) -->
  <div style="position: absolute; top: 60px; bottom: 60px; left: 150px; width: 40px; background: #FF9800;"></div>
  <!-- All four insets -->
  <div style="position: absolute; top: 80px; right: 60px; bottom: 80px; left: 220px; background: #9C27B0; opacity: 0.7;"></div>
</div>
</body>
</html>
