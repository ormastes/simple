<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="positioning">
<meta name="test-feature" content="pos-relative">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<!-- The grey box shows where the element would be without offset -->
<div style="padding: 20px;">
  <div style="width: 100px; height: 60px; background: #ccc;"></div>
  <div style="position: relative; top: -30px; left: 50px; width: 100px; height: 60px; background: #F44336; opacity: 0.8;"></div>
  <div style="position: relative; top: 20px; left: 20px; width: 100px; height: 60px; background: #4CAF50;"></div>
  <div style="width: 100px; height: 60px; background: #2196F3;"></div>
</div>
</body>
</html>
