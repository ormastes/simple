<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="positioning">
<meta name="test-feature" content="pos-sticky">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<!-- Sticky header — sticks to top:0 when scrolling -->
<div style="height: 400px; overflow: auto; border: 2px solid #333; margin: 20px; width: 400px;">
  <div style="position: sticky; top: 0; background: #F44336; color: white; padding: 10px; font-family: sans-serif; font-size: 16px;">Sticky Header</div>
  <div style="height: 80px; background: #E8EAF6; margin: 5px;"></div>
  <div style="height: 80px; background: #C8E6C9; margin: 5px;"></div>
  <div style="height: 80px; background: #FFECB3; margin: 5px;"></div>
  <div style="height: 80px; background: #BBDEFB; margin: 5px;"></div>
  <div style="height: 80px; background: #F8BBD0; margin: 5px;"></div>
  <div style="height: 80px; background: #D1C4E9; margin: 5px;"></div>
</div>
</body>
</html>
