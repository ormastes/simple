<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="positioning">
<meta name="test-feature" content="pos-absolute">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="position: relative; width: 400px; height: 300px; background: #E8EAF6; margin: 20px;">
  <div style="position: absolute; top: 10px; left: 10px; width: 80px; height: 80px; background: #F44336;"></div>
  <div style="position: absolute; top: 10px; right: 10px; width: 80px; height: 80px; background: #4CAF50;"></div>
  <div style="position: absolute; bottom: 10px; left: 10px; width: 80px; height: 80px; background: #2196F3;"></div>
  <div style="position: absolute; bottom: 10px; right: 10px; width: 80px; height: 80px; background: #FF9800;"></div>
  <div style="position: absolute; top: 50%; left: 50%; width: 60px; height: 60px; background: #9C27B0; margin-top: -30px; margin-left: -30px;"></div>
</div>
</body>
</html>
