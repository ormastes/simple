<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>헤어 체인저 | Hair Changer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/slider.css">
    <link rel="stylesheet" href="css/gallery.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1 class="logo" data-i18n="app_title">✨ 헤어 체인저</h1>
            <div class="lang-switcher">
                <button class="lang-btn active" data-lang="ko">한국어</button>
                <button class="lang-btn" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="ja">日本語</button>
            </div>
        </div>
    </header>

    <main class="main">
        <!-- Upload Section -->
        <section class="upload-section">
            <h2 data-i18n="upload_title">사진 업로드</h2>
            <div class="upload-grid">
                <div class="upload-box" id="face-upload">
                    <div class="upload-placeholder" id="face-placeholder">
                        <div class="upload-icon">👤</div>
                        <p data-i18n="upload_face">내 사진을 올려주세요</p>
                        <span class="upload-hint" data-i18n="upload_hint">클릭 또는 드래그</span>
                    </div>
                    <img class="upload-preview hidden" id="face-preview" alt="Face">
                    <input type="file" id="face-input" accept="image/*" hidden>
                </div>
                <div class="upload-box" id="hair-upload">
                    <div class="upload-placeholder" id="hair-placeholder">
                        <div class="upload-icon">💇</div>
                        <p data-i18n="upload_hair">헤어 레퍼런스를 올려주세요</p>
                        <span class="upload-hint" data-i18n="upload_hint">클릭 또는 드래그</span>
                    </div>
                    <img class="upload-preview hidden" id="hair-preview" alt="Hair Reference">
                    <input type="file" id="hair-input" accept="image/*" hidden>
                </div>
            </div>
        </section>

        <!-- Options Section -->
        <section class="options-section">
            <h2 data-i18n="options_title">헤어 옵션</h2>

            <div class="option-group">
                <label class="option-label" data-i18n="current_length">현재 머리 길이</label>
                <div class="radio-group" data-name="current_length">
                    <label class="radio-pill"><input type="radio" name="current_length" value="shaved"><span data-i18n="length_shaved">삭발</span></label>
                    <label class="radio-pill"><input type="radio" name="current_length" value="short"><span data-i18n="length_short">숏</span></label>
                    <label class="radio-pill"><input type="radio" name="current_length" value="medium" checked><span data-i18n="length_medium">미디엄</span></label>
                    <label class="radio-pill"><input type="radio" name="current_length" value="long"><span data-i18n="length_long">롱</span></label>
                </div>
            </div>

            <div class="option-group">
                <label class="option-label" data-i18n="target_length">원하는 길이</label>
                <div class="radio-group" data-name="target_length">
                    <label class="radio-pill"><input type="radio" name="target_length" value="short"><span data-i18n="length_short">숏</span></label>
                    <label class="radio-pill"><input type="radio" name="target_length" value="medium" checked><span data-i18n="length_medium">미디엄</span></label>
                    <label class="radio-pill"><input type="radio" name="target_length" value="long"><span data-i18n="length_long">롱</span></label>
                </div>
            </div>

            <div class="option-group">
                <label class="option-label" data-i18n="hair_type">머리 타입</label>
                <div class="radio-group" data-name="hair_type">
                    <label class="radio-pill"><input type="radio" name="hair_type" value="straight" checked><span data-i18n="type_straight">생머리</span></label>
                    <label class="radio-pill"><input type="radio" name="hair_type" value="wavy"><span data-i18n="type_wavy">웨이브</span></label>
                    <label class="radio-pill"><input type="radio" name="hair_type" value="curly"><span data-i18n="type_curly">곱슬</span></label>
                </div>
            </div>

            <div class="option-group">
                <label class="option-label" data-i18n="hair_color">머리 색상</label>
                <div class="radio-group" data-name="color">
                    <label class="radio-pill"><input type="radio" name="color" value="natural" checked><span data-i18n="color_natural">자연색</span></label>
                    <label class="radio-pill"><input type="radio" name="color" value="blonde"><span data-i18n="color_blonde">금발</span></label>
                    <label class="radio-pill"><input type="radio" name="color" value="ash_brown"><span data-i18n="color_ash_brown">애쉬브라운</span></label>
                    <label class="radio-pill"><input type="radio" name="color" value="red"><span data-i18n="color_red">레드</span></label>
                    <label class="radio-pill"><input type="radio" name="color" value="platinum"><span data-i18n="color_platinum">플래티넘</span></label>
                </div>
            </div>

            <div class="option-group">
                <label class="option-label" data-i18n="treatments">시술 옵션</label>
                <div class="checkbox-group">
                    <label class="check-pill"><input type="checkbox" name="dye" value="true"><span data-i18n="treat_dye">염색</span></label>
                    <label class="check-pill"><input type="checkbox" name="treatment" value="highlights"><span data-i18n="treat_highlights">하이라이트</span></label>
                    <label class="check-pill"><input type="checkbox" name="treatment" value="balayage"><span data-i18n="treat_balayage">발라야쥬</span></label>
                    <label class="check-pill"><input type="checkbox" name="perm" value="true"><span data-i18n="treat_perm">펌</span></label>
                </div>
            </div>

            <div class="option-group">
                <label class="option-label" data-i18n="bangs_label">앞머리</label>
                <div class="radio-group" data-name="bangs">
                    <label class="radio-pill"><input type="radio" name="bangs" value="none" checked><span data-i18n="bangs_none">없음</span></label>
                    <label class="radio-pill"><input type="radio" name="bangs" value="curtain"><span data-i18n="bangs_curtain">커튼뱅</span></label>
                    <label class="radio-pill"><input type="radio" name="bangs" value="side"><span data-i18n="bangs_side">사이드뱅</span></label>
                    <label class="radio-pill"><input type="radio" name="bangs" value="blunt"><span data-i18n="bangs_blunt">풀뱅</span></label>
                </div>
            </div>

            <!-- Feasibility Warning -->
            <div class="feasibility-warning hidden" id="feasibility-warning">
                <span class="warning-icon">⚠️</span>
                <p id="feasibility-message"></p>
            </div>
        </section>

        <!-- Generate Button -->
        <div class="generate-section">
            <button class="generate-btn" id="generate-btn" disabled>
                <span class="btn-text" data-i18n="generate_btn">✨ 변환하기</span>
                <span class="btn-loading hidden" data-i18n="generating">변환 중...</span>
            </button>
        </div>

        <!-- Result Section -->
        <section class="result-section hidden" id="result-section">
            <h2 data-i18n="result_title">변환 결과</h2>
            <div class="comparison-slider" id="comparison-slider">
                <div class="comparison-before">
                    <img id="result-before" alt="Before">
                    <span class="comparison-label" data-i18n="before_label">BEFORE</span>
                </div>
                <div class="comparison-after">
                    <img id="result-after" alt="After">
                    <span class="comparison-label" data-i18n="after_label">AFTER</span>
                </div>
                <div class="comparison-handle" id="comparison-handle">
                    <div class="handle-line"></div>
                    <div class="handle-circle">◀▶</div>
                    <div class="handle-line"></div>
                </div>
            </div>
            <div class="result-actions">
                <button class="download-btn" id="download-btn" data-i18n="download_btn">📥 다운로드</button>
                <button class="retry-btn" id="retry-btn" data-i18n="retry_btn">🔄 다시 생성</button>
            </div>
        </section>

        <!-- Gallery Section -->
        <section class="gallery-section">
            <h2 data-i18n="gallery_title">스타일 갤러리</h2>
            <div class="gallery-tabs" id="gallery-tabs">
                <button class="tab-btn active" data-category="all" data-i18n="cat_all">전체</button>
                <button class="tab-btn" data-category="short" data-i18n="cat_short">숏컷</button>
                <button class="tab-btn" data-category="medium" data-i18n="cat_medium">미디엄</button>
                <button class="tab-btn" data-category="long" data-i18n="cat_long">롱</button>
                <button class="tab-btn" data-category="color" data-i18n="cat_color">염색</button>
                <button class="tab-btn" data-category="perm" data-i18n="cat_perm">펌</button>
            </div>
            <div class="gallery-grid" id="gallery-grid">
                <!-- Populated by JS -->
            </div>
        </section>
    </main>

    <footer class="footer">
        <p data-i18n="footer_text">Powered by Gemini 2.5 Flash Image</p>
    </footer>

    <script src="js/i18n.js"></script>
    <script src="js/upload.js"></script>
    <script src="js/options.js"></script>
    <script src="js/slider.js"></script>
    <script src="js/gallery.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
