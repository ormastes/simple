[build]
target = "../../src/os/toolchain/rust/x86_64-unknown-simpleos.json"

[unstable]
build-std = ["core", "alloc", "compiler_builtins"]
build-std-features = ["compiler-builtins-mem"]

[net]
offline = true

[source.crates-io]
replace-with = "vendored-sources"

[source.vendored-sources]
directory = "../../src/compiler_rust/vendor"
