{{#layout "layouts/application"}}

<div class="auth-container">
    <div class="form-card auth-card">
        <h1 class="auth-title">Create Account</h1>
        <p class="auth-subtitle">Sign up to start managing your todos.</p>

        <form method="POST" action="/register" class="form">
            <input type="hidden" name="csrf_token" value="{{csrf_token}}">

            <div class="form-group">
                <label for="username" class="form-label">Username <span class="required">*</span></label>
                <input type="text" id="username" name="username" class="form-input"
                       placeholder="Choose a username (min 3 characters)" required autofocus
                       minlength="3" maxlength="50"
                       autocomplete="username">
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Email <span class="required">*</span></label>
                <input type="email" id="email" name="email" class="form-input"
                       placeholder="your@email.com" required
                       autocomplete="email">
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password <span class="required">*</span></label>
                <input type="password" id="password" name="password" class="form-input"
                       placeholder="At least 8 characters" required
                       minlength="8"
                       autocomplete="new-password">
            </div>

            <div class="form-group">
                <label for="password_confirm" class="form-label">Confirm Password <span class="required">*</span></label>
                <input type="password" id="password_confirm" name="password_confirm" class="form-input"
                       placeholder="Repeat your password" required
                       minlength="8"
                       autocomplete="new-password">
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary btn-block">Create Account</button>
            </div>
        </form>

        <p class="auth-footer">
            Already have an account? <a href="/login">Log in</a>
        </p>
    </div>
</div>

{{/layout}}
