<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="typography">
<meta name="test-feature" content="letter-spacing">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white; font-family: sans-serif; font-size: 18px; color: #333;">
<div style="padding: 20px;">
  <div style="letter-spacing: -1px; background: #FFCDD2; padding: 10px; margin-bottom: 10px;">Letter spacing -1px tighter</div>
  <div style="letter-spacing: 0; background: #E8EAF6; padding: 10px; margin-bottom: 10px;">Letter spacing 0px normal</div>
  <div style="letter-spacing: 2px; background: #C8E6C9; padding: 10px; margin-bottom: 10px;">Letter spacing 2px wider</div>
  <div style="letter-spacing: 5px; background: #BBDEFB; padding: 10px; margin-bottom: 10px;">Letter spacing 5px wide</div>
  <div style="letter-spacing: 10px; background: #FFF3E0; padding: 10px;">Letter spacing 10px very wide</div>
</div>
</body>
</html>
