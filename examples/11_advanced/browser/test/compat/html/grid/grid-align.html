<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="grid">
<meta name="test-feature" content="grid-align">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<!-- align-items: center, justify-items: center -->
<div style="display: grid; grid-template-columns: 150px 150px; grid-template-rows: 100px 100px; gap: 5px; align-items: center; justify-items: center; padding: 15px; background: #E8EAF6; width: 340px; margin: 15px;">
  <div style="width: 60px; height: 40px; background: #F44336;"></div>
  <div style="width: 80px; height: 60px; background: #4CAF50;"></div>
  <div style="width: 50px; height: 50px; background: #2196F3;"></div>
  <div style="width: 100px; height: 30px; background: #FF9800;"></div>
</div>
<!-- align-items: end, justify-items: start -->
<div style="display: grid; grid-template-columns: 150px 150px; grid-template-rows: 100px; gap: 5px; align-items: end; justify-items: start; padding: 15px; background: #FFF3E0; width: 340px; margin: 15px;">
  <div style="width: 60px; height: 40px; background: #F44336;"></div>
  <div style="width: 80px; height: 60px; background: #4CAF50;"></div>
</div>
</body>
</html>
