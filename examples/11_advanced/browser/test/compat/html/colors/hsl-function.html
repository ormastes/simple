<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="colors">
<meta name="test-feature" content="hsl-function">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="display: flex; flex-wrap: wrap; gap: 5px; padding: 10px;">
  <!-- Hue sweep at 100% saturation, 50% lightness -->
  <div style="width: 60px; height: 60px; background: hsl(0, 100%, 50%);"></div>
  <div style="width: 60px; height: 60px; background: hsl(30, 100%, 50%);"></div>
  <div style="width: 60px; height: 60px; background: hsl(60, 100%, 50%);"></div>
  <div style="width: 60px; height: 60px; background: hsl(90, 100%, 50%);"></div>
  <div style="width: 60px; height: 60px; background: hsl(120, 100%, 50%);"></div>
  <div style="width: 60px; height: 60px; background: hsl(150, 100%, 50%);"></div>
  <div style="width: 60px; height: 60px; background: hsl(180, 100%, 50%);"></div>
  <div style="width: 60px; height: 60px; background: hsl(210, 100%, 50%);"></div>
  <div style="width: 60px; height: 60px; background: hsl(240, 100%, 50%);"></div>
  <div style="width: 60px; height: 60px; background: hsl(270, 100%, 50%);"></div>
  <div style="width: 60px; height: 60px; background: hsl(300, 100%, 50%);"></div>
  <div style="width: 60px; height: 60px; background: hsl(330, 100%, 50%);"></div>
  <!-- Lightness variations -->
  <div style="width: 60px; height: 60px; background: hsl(200, 80%, 20%);"></div>
  <div style="width: 60px; height: 60px; background: hsl(200, 80%, 40%);"></div>
  <div style="width: 60px; height: 60px; background: hsl(200, 80%, 60%);"></div>
  <div style="width: 60px; height: 60px; background: hsl(200, 80%, 80%);"></div>
  <!-- Saturation variations -->
  <div style="width: 60px; height: 60px; background: hsl(0, 0%, 50%);"></div>
  <div style="width: 60px; height: 60px; background: hsl(0, 25%, 50%);"></div>
  <div style="width: 60px; height: 60px; background: hsl(0, 50%, 50%);"></div>
  <div style="width: 60px; height: 60px; background: hsl(0, 75%, 50%);"></div>
</div>
</body>
</html>
