<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="colors">
<meta name="test-feature" content="currentcolor">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<!-- currentColor inherits from the color property -->
<div style="color: #F44336; padding: 20px;">
  <div style="width: 200px; height: 60px; border: 4px solid currentColor; margin-bottom: 10px;"></div>
  <div style="width: 200px; height: 60px; background: currentColor; margin-bottom: 10px;"></div>
</div>
<div style="color: #2196F3; padding: 20px;">
  <div style="width: 200px; height: 60px; border: 4px solid currentColor; margin-bottom: 10px;"></div>
  <div style="width: 200px; height: 60px; background: currentColor; margin-bottom: 10px;"></div>
</div>
<div style="color: #4CAF50; padding: 20px;">
  <div style="width: 200px; height: 60px; border: 4px solid currentColor;"></div>
</div>
</body>
</html>
