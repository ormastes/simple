<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="transform">
<meta name="test-feature" content="transform-combined">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="display: flex; gap: 60px; padding: 60px; flex-wrap: wrap; align-items: center;">
  <div style="width: 80px; height: 80px; background: #F44336; transform: translate(10px, 10px) rotate(30deg);"></div>
  <div style="width: 80px; height: 80px; background: #4CAF50; transform: rotate(45deg) scale(1.2);"></div>
  <div style="width: 80px; height: 80px; background: #2196F3; transform: scale(0.8) rotate(15deg) translate(20px, 0);"></div>
  <div style="width: 80px; height: 80px; background: #FF9800; transform: skew(5deg) rotate(-10deg) scale(1.1);"></div>
</div>
</body>
</html>
