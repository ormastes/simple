<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>flex column auto margin align center</title>
<style>
html, body { margin: 0; padding: 0; }
.wrap {
  display: flex;
  flex-direction: column;
  width: 90px;
  height: 190px;
  padding: 10px;
  align-items: center;
  background: #eeeeee;
}
.a { width: 20px; height: 40px; background: #dd3333; }
.b { width: 50px; height: 40px; margin-top: auto; background: #33aa33; }
.c { width: 30px; height: 40px; margin-top: 10px; background: #3333dd; }
</style>
</head>
<body>
<div class="wrap" id="col_auto_margin_align_shell" data-geom-label="col_auto_margin_align_shell">
  <div class="a" id="col_auto_margin_align_a" data-geom-label="col_auto_margin_align_a"></div>
  <div class="b" id="col_auto_margin_align_b" data-geom-label="col_auto_margin_align_b"></div>
  <div class="c" id="col_auto_margin_align_c" data-geom-label="col_auto_margin_align_c"></div>
</div>
</body>
</html>
