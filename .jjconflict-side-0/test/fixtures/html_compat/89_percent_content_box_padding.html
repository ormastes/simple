<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>percent content box padding</title>
<style>
html, body { margin: 0; padding: 0; }
.shell {
  width: 200px;
  padding: 10px;
  background: #eeeeee;
}
.content {
  width: 50%;
  height: 20px;
  padding: 10px;
  border: 5px solid #2563eb;
  background: #bfdbfe;
}
.bordered {
  box-sizing: border-box;
  width: 50%;
  height: 40px;
  padding: 10px;
  border: 5px solid #f97316;
  margin-top: 6px;
  background: #fed7aa;
}
</style>
</head>
<body>
<section class="shell" id="percent_box_shell" data-geom-label="percent_box_shell">
  <div class="content" id="percent_content_box" data-geom-label="percent_content_box"></div>
  <div class="bordered" id="percent_border_box" data-geom-label="percent_border_box"></div>
</section>
</body>
</html>
