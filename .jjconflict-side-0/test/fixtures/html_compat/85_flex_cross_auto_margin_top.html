<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>flex cross auto margin top</title>
<style>
html, body { margin: 0; padding: 0; }
.wrap {
  display: flex;
  flex-direction: row;
  width: 140px;
  height: 90px;
  padding: 10px;
  gap: 10px;
  align-items: center;
  background: #eeeeee;
}
.a { width: 30px; height: 20px; background: #dd3333; }
.b { width: 30px; height: 30px; margin-top: auto; background: #33aa33; }
.c { width: 30px; height: 40px; background: #3333dd; }
</style>
</head>
<body>
<div class="wrap" id="cross_auto_margin_top_shell" data-geom-label="cross_auto_margin_top_shell">
  <div class="a" id="cross_auto_margin_top_a" data-geom-label="cross_auto_margin_top_a"></div>
  <div class="b" id="cross_auto_margin_top_b" data-geom-label="cross_auto_margin_top_b"></div>
  <div class="c" id="cross_auto_margin_top_c" data-geom-label="cross_auto_margin_top_c"></div>
</div>
</body>
</html>
