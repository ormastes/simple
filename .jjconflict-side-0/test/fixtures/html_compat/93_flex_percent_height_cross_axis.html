<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>flex percent height cross axis</title>
<style>
html, body { margin: 0; padding: 0; }
.shell {
  display: flex;
  width: 200px;
  height: 120px;
  padding: 10px;
  background: #eeeeee;
}
.child {
  width: 40px;
  height: 50%;
  background: #bfdbfe;
}
.after {
  width: 20px;
  height: 10px;
  background: #fed7aa;
}
</style>
</head>
<body>
<section class="shell" id="flex_percent_height_cross_shell" data-geom-label="flex_percent_height_cross_shell">
  <div class="child" id="flex_percent_height_cross_child" data-geom-label="flex_percent_height_cross_child"></div>
  <div class="after" id="flex_percent_height_cross_after" data-geom-label="flex_percent_height_cross_after"></div>
</section>
</body>
</html>
