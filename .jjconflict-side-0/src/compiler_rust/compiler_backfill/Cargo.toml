[package]
name = "simple-compiler-backfill"
version.workspace = true
edition.workspace = true
license.workspace = true
build = "build.rs"

[lib]
name = "simple_compiler_backfill"
crate-type = ["staticlib"]

[dependencies]
cranelift-codegen = { version = "0.116", default-features = false, features = ["std", "unwind", "x86", "arm64", "riscv64"] }
cranelift-frontend = "0.116"
cranelift-module = "0.116"
cranelift-object = "0.116"
cranelift-jit = "0.116"
target-lexicon = "0.13"
lazy_static = "1.4"

[dev-dependencies]
tempfile = "3"

[lints]
workspace = true
