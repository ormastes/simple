{{#layout "application"}}

<h1>Request Delivery &mdash; Order #{{order_id}}</h1>

<form method="POST" action="/delivery/{{order_id}}/request" class="form">
    <input type="hidden" name="csrf_token" value="{{csrf_token}}">

    <div class="form-group">
        <label for="customer_name">Your Name</label>
        <input type="text" id="customer_name" name="customer_name" required>
    </div>

    <div class="form-group">
        <label for="customer_phone">Phone</label>
        <input type="tel" id="customer_phone" name="customer_phone" required>
    </div>

    <div class="form-group">
        <label for="customer_email">Email</label>
        <input type="email" id="customer_email" name="customer_email">
    </div>

    <div class="form-group">
        <label for="address">Delivery Address</label>
        <textarea id="address" name="address" rows="3" required></textarea>
    </div>

    <div class="form-group">
        <label for="delivery_notes">Notes</label>
        <textarea id="delivery_notes" name="delivery_notes" rows="2"></textarea>
    </div>

    <button type="submit" class="btn btn-primary">Request Delivery</button>
</form>

{{/layout}}
