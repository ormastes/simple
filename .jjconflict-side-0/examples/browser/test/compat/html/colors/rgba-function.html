<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="colors">
<meta name="test-feature" content="rgba-function">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="background: repeating-conic-gradient(#ddd 0% 25%, white 0% 50%) 0 0 / 20px 20px; padding: 10px;">
  <div style="display: flex; flex-wrap: wrap; gap: 5px;">
    <div style="width: 80px; height: 80px; background: rgba(255, 0, 0, 1.0);"></div>
    <div style="width: 80px; height: 80px; background: rgba(255, 0, 0, 0.8);"></div>
    <div style="width: 80px; height: 80px; background: rgba(255, 0, 0, 0.6);"></div>
    <div style="width: 80px; height: 80px; background: rgba(255, 0, 0, 0.4);"></div>
    <div style="width: 80px; height: 80px; background: rgba(255, 0, 0, 0.2);"></div>
    <div style="width: 80px; height: 80px; background: rgba(0, 0, 255, 0.7);"></div>
    <div style="width: 80px; height: 80px; background: rgba(0, 128, 0, 0.5);"></div>
    <div style="width: 80px; height: 80px; background: rgba(255, 165, 0, 0.3);"></div>
  </div>
</div>
</body>
</html>
