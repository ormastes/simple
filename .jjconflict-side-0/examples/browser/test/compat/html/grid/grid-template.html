<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="grid">
<meta name="test-feature" content="grid-template">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<!-- Fixed pixel columns -->
<div style="display: grid; grid-template-columns: 100px 200px 100px; grid-template-rows: 60px 80px; padding: 20px; background: #E8EAF6; width: 440px; margin: 20px;">
  <div style="background: #F44336;"></div>
  <div style="background: #4CAF50;"></div>
  <div style="background: #2196F3;"></div>
  <div style="background: #FF9800;"></div>
  <div style="background: #9C27B0;"></div>
  <div style="background: #009688;"></div>
</div>
<!-- Percentage columns -->
<div style="display: grid; grid-template-columns: 25% 50% 25%; grid-template-rows: 60px; padding: 20px; background: #FFF3E0; width: 500px; margin: 20px;">
  <div style="background: #F44336;"></div>
  <div style="background: #4CAF50;"></div>
  <div style="background: #2196F3;"></div>
</div>
</body>
</html>
