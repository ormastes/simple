<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="grid">
<meta name="test-feature" content="grid-area">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 60px 120px 40px; gap: 5px; padding: 20px; width: 500px; background: #E8EAF6; margin: 20px;">
  <!-- Header spans all columns -->
  <div style="grid-column: 1 / 4; background: #F44336;"></div>
  <!-- Sidebar -->
  <div style="grid-row: 2 / 3; background: #4CAF50;"></div>
  <!-- Main content spans 2 columns -->
  <div style="grid-column: 2 / 4; grid-row: 2 / 3; background: #2196F3;"></div>
  <!-- Footer spans all columns -->
  <div style="grid-column: 1 / 4; background: #FF9800;"></div>
</div>
</body>
</html>
