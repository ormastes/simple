<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="positioning">
<meta name="test-feature" content="pos-fixed">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<!-- Fixed positioning relative to viewport -->
<div style="position: fixed; top: 0; left: 0; width: 100%; height: 50px; background: #F44336; opacity: 0.9;"></div>
<div style="position: fixed; bottom: 0; left: 0; width: 100%; height: 40px; background: #2196F3; opacity: 0.9;"></div>
<div style="position: fixed; top: 60px; right: 10px; width: 80px; height: 80px; background: #4CAF50; border-radius: 50%;"></div>
<!-- Some content to prove fixed stays put -->
<div style="padding: 70px 20px 60px 20px;">
  <div style="width: 300px; height: 100px; background: #E8EAF6; margin-bottom: 10px;"></div>
  <div style="width: 300px; height: 100px; background: #FFF3E0; margin-bottom: 10px;"></div>
  <div style="width: 300px; height: 100px; background: #E8F5E9;"></div>
</div>
</body>
</html>
