<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="positioning">
<meta name="test-feature" content="z-index-context">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<!-- Parent A creates stacking context with z-index: 1 -->
<div style="position: relative; z-index: 1; width: 250px; height: 200px; margin: 20px; background: rgba(244,67,54,0.3);">
  <!-- Child of A with z-index: 999 — still behind Parent B -->
  <div style="position: absolute; z-index: 999; top: 20px; left: 20px; width: 200px; height: 100px; background: #F44336;"></div>
</div>
<!-- Parent B creates stacking context with z-index: 2 — above A and all its children -->
<div style="position: relative; z-index: 2; width: 250px; height: 200px; margin-top: -150px; margin-left: 60px; background: rgba(33,150,243,0.3);">
  <div style="position: absolute; z-index: 1; top: 20px; left: 20px; width: 200px; height: 100px; background: #2196F3;"></div>
</div>
</body>
</html>
