<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="positioning">
<meta name="test-feature" content="z-index-basic">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="position: relative; width: 300px; height: 250px; margin: 20px;">
  <!-- z-index: 1 — bottom layer -->
  <div style="position: absolute; z-index: 1; top: 0; left: 0; width: 150px; height: 150px; background: #F44336;"></div>
  <!-- z-index: 3 — top layer -->
  <div style="position: absolute; z-index: 3; top: 40px; left: 40px; width: 150px; height: 150px; background: #4CAF50;"></div>
  <!-- z-index: 2 — middle layer -->
  <div style="position: absolute; z-index: 2; top: 80px; left: 80px; width: 150px; height: 150px; background: #2196F3;"></div>
</div>
</body>
</html>
