<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="box-model">
<meta name="test-feature" content="min-max-sizing">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<!-- min-width: 200px, width: 100px — should show as 200px -->
<div style="min-width: 200px; width: 100px; height: 50px; background: #F44336; margin: 10px;"></div>
<!-- max-width: 150px, width: 300px — should show as 150px -->
<div style="max-width: 150px; width: 300px; height: 50px; background: #4CAF50; margin: 10px;"></div>
<!-- min-height: 80px, height: 30px — should show as 80px tall -->
<div style="width: 200px; min-height: 80px; height: 30px; background: #2196F3; margin: 10px;"></div>
<!-- max-height: 40px, height: 200px — should show as 40px tall -->
<div style="width: 200px; max-height: 40px; height: 200px; background: #FF9800; margin: 10px; overflow: hidden;"></div>
<!-- Combined: min-width + max-width -->
<div style="min-width: 100px; max-width: 400px; width: 50%; height: 50px; background: #9C27B0; margin: 10px;"></div>
</body>
</html>
