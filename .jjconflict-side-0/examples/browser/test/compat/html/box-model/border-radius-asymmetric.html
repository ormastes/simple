<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="box-model">
<meta name="test-feature" content="border-radius-asymmetric">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="display: flex; gap: 20px; padding: 20px; flex-wrap: wrap;">
  <div style="width: 120px; height: 80px; background: #F44336; border-radius: 20px 0 0 0;"></div>
  <div style="width: 120px; height: 80px; background: #4CAF50; border-radius: 0 20px 0 0;"></div>
  <div style="width: 120px; height: 80px; background: #2196F3; border-radius: 0 0 20px 0;"></div>
  <div style="width: 120px; height: 80px; background: #FF9800; border-radius: 0 0 0 20px;"></div>
  <div style="width: 120px; height: 80px; background: #9C27B0; border-radius: 30px 10px 30px 10px;"></div>
  <div style="width: 120px; height: 80px; background: #009688; border-radius: 50% 0 50% 0;"></div>
</div>
</body>
</html>
