<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="box-model">
<meta name="test-feature" content="border-solid">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="width: 200px; height: 60px; border: 1px solid #333; margin: 10px; background: #f5f5f5;"></div>
<div style="width: 200px; height: 60px; border: 3px solid #F44336; margin: 10px; background: #f5f5f5;"></div>
<div style="width: 200px; height: 60px; border: 5px solid #4CAF50; margin: 10px; background: #f5f5f5;"></div>
<div style="width: 200px; height: 60px; border-top: 3px solid red; border-right: 5px solid green; border-bottom: 3px solid blue; border-left: 5px solid orange; margin: 10px; background: #f5f5f5;"></div>
</body>
</html>
