<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="typography">
<meta name="test-feature" content="text-transform">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white; font-family: sans-serif; font-size: 18px; color: #333;">
<div style="padding: 20px;">
  <div style="text-transform: none; background: #E8EAF6; padding: 10px; margin-bottom: 10px;">none: The Quick Brown Fox Jumps</div>
  <div style="text-transform: uppercase; background: #FFCDD2; padding: 10px; margin-bottom: 10px;">uppercase: The Quick Brown Fox Jumps</div>
  <div style="text-transform: lowercase; background: #C8E6C9; padding: 10px; margin-bottom: 10px;">lowercase: The Quick Brown Fox Jumps</div>
  <div style="text-transform: capitalize; background: #BBDEFB; padding: 10px; margin-bottom: 10px;">capitalize: the quick brown fox jumps</div>
</div>
</body>
</html>
