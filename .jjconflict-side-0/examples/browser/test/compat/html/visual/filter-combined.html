<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="visual">
<meta name="test-feature" content="filter-combined">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="display: flex; flex-wrap: wrap; gap: 20px; padding: 20px;">
  <!-- Original -->
  <div style="width: 150px; height: 100px; background: linear-gradient(135deg, #F44336, #FF9800, #4CAF50, #2196F3);"></div>
  <!-- Blur + brightness -->
  <div style="width: 150px; height: 100px; background: linear-gradient(135deg, #F44336, #FF9800, #4CAF50, #2196F3); filter: blur(2px) brightness(1.3);"></div>
  <!-- Grayscale + contrast -->
  <div style="width: 150px; height: 100px; background: linear-gradient(135deg, #F44336, #FF9800, #4CAF50, #2196F3); filter: grayscale(100%) contrast(150%);"></div>
  <!-- Sepia + brightness -->
  <div style="width: 150px; height: 100px; background: linear-gradient(135deg, #F44336, #FF9800, #4CAF50, #2196F3); filter: sepia(80%) brightness(1.1);"></div>
  <!-- All filters -->
  <div style="width: 150px; height: 100px; background: linear-gradient(135deg, #F44336, #FF9800, #4CAF50, #2196F3); filter: blur(1px) brightness(1.2) contrast(110%) sepia(20%);"></div>
</div>
</body>
</html>
