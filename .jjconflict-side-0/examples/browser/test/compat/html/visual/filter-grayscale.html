<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="test-category" content="visual">
<meta name="test-feature" content="filter-grayscale">
<meta name="viewport" content="width=800,height=600">
<style>* { margin: 0; padding: 0; box-sizing: border-box; }</style>
</head>
<body style="margin: 0; padding: 0; background: white;">
<div style="display: flex; gap: 15px; padding: 20px; flex-wrap: wrap;">
  <div style="width: 120px; height: 80px; background: linear-gradient(135deg, #F44336, #FF9800, #FFEB3B, #4CAF50, #2196F3); filter: grayscale(0%);"></div>
  <div style="width: 120px; height: 80px; background: linear-gradient(135deg, #F44336, #FF9800, #FFEB3B, #4CAF50, #2196F3); filter: grayscale(25%);"></div>
  <div style="width: 120px; height: 80px; background: linear-gradient(135deg, #F44336, #FF9800, #FFEB3B, #4CAF50, #2196F3); filter: grayscale(50%);"></div>
  <div style="width: 120px; height: 80px; background: linear-gradient(135deg, #F44336, #FF9800, #FFEB3B, #4CAF50, #2196F3); filter: grayscale(75%);"></div>
  <div style="width: 120px; height: 80px; background: linear-gradient(135deg, #F44336, #FF9800, #FFEB3B, #4CAF50, #2196F3); filter: grayscale(100%);"></div>
</div>
</body>
</html>
